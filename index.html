<script type="application/json" id="biletData">{"1": [{"savol_raqami": 1, "savol": "Adabiyot o‘qitish metodikasining fan sifatida shakllanishi haqida ma’lumot bering?", "javob": "Adabiyot o‘qitish metodikasi — pedagogika va filologiya fanlari tutashuvida yuzaga kelgan, badiiy adabiyotni o‘quvchilarga yetkazish qonuniyatlarini o‘rganuvchi mustaqil fandir. Uning maqsadi — yoshlarda estetik did, tanqidiy fikrlash va milliy g‘oyaga sodiqlikni shakllantirishdan iborat. Tarixiy ildizlari va shakllanishiSharq mutafakkirlari qarashlari: Garchi mustaqil fan sifatida XX asrda shakllangan bo‘lsa-da, uning metodik asoslari Yusuf Xos Hojib, Alisher Navoiy va Husayn Voiz Koshifiy kabi allomalarning asarlarida o‘z aksini topgan. Ular badiiy asar mazmunini tushuntirish, matn ustida ishlash va ma'naviy tarbiya berish masalalariga katta e'tibor qaratishgan.XIX asr oxiri – XX asr boshlari: Jadidchilik harakati davrida Munavvarqori Abdurashidxonov, Mahmudxo‘ja Behbudiy va Abdulla Avloniy kabi ma’rifatparvarlar tomonidan maktablarda adabiyotni yangicha usullarda, hayot bilan bog‘lab o‘qitish g‘oyalari ilgari surilgan. Bu darslik va qo‘llanmalar metodik fikr rivojiga poydevor bo‘ldi.Fan sifatida rasman shakllanishi: Adabiyot o‘qitish metodikasi XX asrning 20-yillaridan boshlab mustaqil fan sifatida tan olindi. Sovet davrida bu fan asosan rus metodik maktabi ta’sirida (V.Golubkov va boshqalar) shakllangan bo‘lsa, O‘zbekiston mustaqillikka erishgach, milliy mentalitetga, xalq pedagogikasiga va jahon tajribalariga tayangan holda tubdan yangilandi. Asosiy vazifalari va tamoyillariAdabiyotshunoslik bilan bog‘liqlik: Asarning g‘oyaviy-badiiy tahlili, janr xususiyatlari va yozuvchi uslubini o‘quvchiga yoshiga mos ravishda yetkazish.Pedagogik yondashuv: O‘quvchilarda badiiy asarga muhabbat uyg‘otish, kitobxonlik madaniyatini shakllantirish va mustaqil fikrlash ko‘nikmalarini rivojlantirish. O‘zbekistonda ushbu fanning ilmiy-nazariy asoslarini yaratishda va uni rivojlantirishda professorlar B.To‘xliyev, Q.Yo‘ldoshev kabi olimlarning ilmiy ishlari muhim o‘rin tutadi. Hozirgi kunda darslarda faol qo‘llanilayotgan interfaol metodlar ham aynan shu fanning mehnati hisoblanadi. O‘zbekiston Respublikasi Xalq ta’limi vazirligi va Respublika ta’lim markazining rasmiy portallarida fanning joriy o‘quv dasturlari va talablari bilan tanishishingiz mumkin."}, {"savol_raqami": 2, "savol": "2. Kasbiy kompetensiya nima va uning sifatlari haqida nimalarni bilasiz?", "javob": "2. Kasbiy kompetensiya nima va uning sifatlari haqida nimalarni bilasiz?Kompetensiya (lotincha com’etens – munosib, mos, ke rakli,layoqatli, biladigan ma’nolarini anglatadi) – shaxs tomonidanhayotning muayyan tarmoqlarida samarali faoliyat yuritish uchunzarur bo‘ladigan bilim, ko‘nikma, malaka va tajriba mavjudliginianglatadigan tushuncha.Kompetentlilik – kompetensiyaga egalik. Odamning muayyansohalarda samarali faoliyat ko‘rsatishi uchun zarur bo‘lganbilim, ko‘nikma, malaka va tajribaga egaligi bilan uning shaxsliksifatlari o‘rtasidagi uyg‘unlikni anglatadi.Kasbiy kompetentlilik esa – mutaxassis tomonidan kasbiyfaoliyatni amalga oshirish uchun zarur bo‘lgan bilim, ko‘nikmava malakalarning egallanishi hamda ularni amalda yuqori dara-jada qo‘llay olinishini anglatadi. Kasbiy kompetentlilik mutaxassistomonidan faqat alohida bilim, ko‘nikma, malaka hamda shaxsiysifatlarning egallanishigina emas, balki o‘ziga zarur yo‘nalishlarbo‘yicha integrativ bilimlar hamda harakatlarning o‘zlashtirilishiniham qamrab oladi. Shuningdek, kompetensiya mutaxassislik bilimlarinidoimo boyitib borishni, yangi axborotlarni o‘rganishni,muhim ijtimoiy talablarni anglay olishni, yangi ma’lumotlarniizlab topish, ularni qayta ishlash va o‘z faoliyatida qo‘llay bilishniham taqozo etadi.Kasbiy kompetentlilik darajasi quyidagi holatlarda namoyonbo‘ladi:–murakkab vaziyatlar vujudga kelganda;–favqulodda vazifalarni bajarishda;––bir-biriga zid ma’lumotlardan o‘rni bilan foydalanishda.Kasbiy kompetensiyaga ega mutaxassis:o‘z bilimlarini izchil boyitib boradi;–yangi axborotlarni o‘zlashtiradi;–davr talablarini chuqur anglaydi;–yangi bilimlarni izlab topadi;–ularni qayta ishlaydi va o‘z amaliy faoliyatida samaraliqo‘llaydi."}, {"savol_raqami": 3, "savol": "badiiy asar tahlili (epik, lirik, dramatik).", "javob": "Badiiy asar tahlili – asarning g‘oyaviy-badiiy mazmunini, shakl xususiyatlarini va muallif mahoratini o‘rganishdir. Tahlil asarning qaysi adabiy turga (epik, lirik, dramatik) mansubligiga qarab o‘ziga xos yo‘nalishlarda amalga oshiriladi. 1. Epik asar tahlili (Hikoya, qissa, roman)Epik turlar voqealarni hikoya qilishga asoslanadi. Tahlil quyidagi bosqichlarda olib boriladi: Mavzu va g‘oya: Asarda ko‘tarilgan bosh masala va muallifning maqsadi.Syujet va kompozitsiya: Voqealar rivoji (boshlanishi, tuguni, avj pallasi, yechimi) va qismlarning joylashuvi.Obrazlar tizimi: Qahramonlarning xarakteri, ichki dunyosi va ularning bir-biriga munosabati.Tafsilot va tasvir vositalari: Voqeani jonlantiruvchi detallar va badiiy san'atlar (metafora, sifatdosh va h.k.).2. Lirik asar tahlili (She'r, g‘azal, doston)Lirikada voqealar emas, balki inson ruhiyati, ichki kechinmalar va tuyg‘ular birinchi o‘rinda turadi. Tahlil mezonlari: Lirik qahramon: Muallifning kechinmalarini ifodalovchi obraz tahlili.Tuyg‘u va kayfiyat: Asardagi lirik holat (quvonch, g‘am, armon).Badiiy san'atlar va ohang: She'riy vazn (masalan, barmoq yoki aruz), qofiya va she'rning musiqiyligi.3. Dramatik asar tahlili (Pyesa, drama, fojia, komediya)Dramatik asarlar sahna uchun yoziladi, muallif nutqi kam bo‘lib, voqealar qahramonlarning o‘zaro harakatlari va dialoglari orqali ochiladi. Tahlil bosqichlari: Mojaro (konflikt): Asar negizidagi ziddiyat va uning keskinlashuv sabablari.Dialog va monologlar: Qahramonlar xarakterini ochib beruvchi so‘zlar.Sahnalashtirish xususiyatlari: Asarning parda va ko‘rinishlarga bo‘linishi, muallif izohlari (repetitsiyalar).Lirik turdagi asarda muallif yoxud lirik qahramon tahlili muhim ahamiyatgaega bo‘ladi. Lirik qahramon – lirik asardagi odam timsoli, lirik kechinmalartashuvchisidir. Lirika, o‘rni kelganda, inson tafakkuriga ham kuchli ta’sir ko‘rsatabiladi. Ruhiyattanuv ilmidagi “hissiy tafakkur” degan tushuncha tuyg‘uningtafakkurga ta’siri mahsulidir. Unga ko‘ra, uyg‘ongan hissiyot tafakkurning hamkuchli darajada qo‘zg‘alishiga sabab bo‘ladi. Badiiy asarning tahlili muvaffaqiyatli chiqishida tekshirilayotgan asarning qaysiadabiy turga mansubligini hisobga olish ham o‘ziga xos o‘rin tutadi. Chuqurroqdiqqat qilinsa, adabiy tur tushunchasining mohiyatida tahlilning kaliti yotganligiko‘zga tashlanadi. Negaki, adabiy tur va janr xususiyatlari badiiy asar tabiatiga xosasosiy jihatlarni belgilaydi. Badiiy tahlil esa aynan muayyan adabiy asarning tabiatigaxos qirralarni tadqiq etish demakdir. To‘g‘ri, har xil tur va janrlardagi adabiy asarlartekshirilganda, tahlil usullari mutlaqo o‘zgarib ketmaydi, lekin tahlilchining asarga294yondashishi, munosabat tarzi, usullar tizimi m a’lum darajada o‘zgarishi aniq.Munosabat yo‘sini, nuqtayi nazari esa har qanday ilmiyijodiy faoliyatda hal qiluvchiahamiyat kasb etadi."}], "2": [{"savol_raqami": 1, "savol": "Adabiyot o'qitish metodikasida o'qituvchi bir darsning o'zida bir nechta kompetensiyalardan foydalanadi. Misol keltiring.", "javob": "1.Adabiyot o‘qitish metodikasida o‘qituvchi bir darsning o‘zida bir nechta kompetensiyalardan foydalanadi. Masalan:Kommunikativ kompetensiya— o‘quvchilar bilan savol-javob qilish, fikr almashish, matnni ifodali o‘qitish.Misol: asar qahramonlari haqida bahs-munozara tashkil qilish.Axborot bilan ishlash kompetensiyasi— matndan kerakli ma’lumotni topish, tahlil qilish.Misol: she’r yoki hikoyadan asosiy g‘oyani ajratish.Ijtimoiy faol fuqarolik kompetensiyasi— asardagi ijobiy va salbiy xulqlarni baholatish orqali tarbiyaviy xulosa chiqarish.Misol: qahramonning vatanparvarligi yoki halolligi haqida suhbat.Milliy va umummadaniy kompetensiya— milliy qadriyatlar, urf-odatlar va madaniyatni tushuntirish.Misol: Alisher Navoiy yoki Abdulla Qodiriy asarlaridagi milliy an’analarni izohlash.O‘zini o‘zi rivojlantirish kompetensiyasi— mustaqil fikrlash va ijodiy yondashishga undash.Misol: “Agar siz qahramon o‘rnida bo‘lsangiz nima qilardingiz?” kabi topshiriq berish.Matematik savodxonlik va texnika yangiliklaridan foydalanish kompetensiyasi— prezentatsiya, video yoki elektron darsliklardan foydalanish.Misol: asar bo‘yicha slayd yoki audioeshittirish qo‘llash.Bir dars misoli:“O‘tkan kunlar” romanini o‘rganishda o‘qituvchi matnni o‘qitadi (kommunikativ), qahramonlarni tahlil qiladi (axborot bilan ishlash), milliy qadriyatlarni tushuntiradi (milliy kompetensiya), o‘quvchilarning mustaqil fikrini eshitadi (o‘zini rivojlantirish)."}, {"savol_raqami": 2, "savol": "Adabiyot o'qitish metodikasi fanining mazmun va vazifalari haqida gapiring", "javob": "Adabiyot oqitish metodikasi fanining mazmun va vazifalari haqida gapiringAdabiyot о‘qitish metodikasi» fanining vazifalari о‘qitishjarayonida ta’limningsamaralimetodva usullaridan foydalanishyo‘llarini o‘rgatish, badiiy asar tahlilida о ‘quvchi ma’naviyatigaijobiy ta’sir ko‘rsatadigan jihatlami ochish hamda undanmaqsadga muvofiq tarzda foydalana bilishga yo‘naltirishdan iborat.«Adabiyot o‘qitish metodikasi» fanining mazmuni ta’limmetodlari, usullari, shakllari va ulaming o‘ziga xos xususiyat-lari, badiiy asar bilan bog‘liq nazariy va didaktik tushunchalar,adabiy matn bilan ishlash jarayonida o‘qituvchi va о‘quvchifaoliyatini tashkil etish yo‘llarini o‘z ichiga oladi."}], "3": [{"savol_raqami": 1, "savol": "4K metodi haqida ma'lumot bering.", "javob": "4K metodi haqida maʼlumot bering. 4K metodi (yoki 4K kompetensiyalari) — bu XXI asrda har bir mutaxassis, talaba va shaxs muvaffaqiyatga erishishi uchun eng zarur hisoblangan toʻrtta asosiy koʻnikma jamlanmasidir. Bu metod taʼlim tizimida ham, zamonaviy biznes muhitida ham shaxsning raqobatbardoshligini oshirish uchun asosiy poydevor hisoblanadi.Bu koʻnikmalarning barchasi oʻzbek tilida \"K\" harfi bilan boshlangani uchun ham metod shunday nomlangan. Keling, ularning har biriga batafsil toʻxtalib oʻtamiz:1. Kreativlik (Creativity) — Ijodiy fikrlashBu muammolarga noodatiy yondashish, yangi gʻoyalar oʻylab topish va standart qoliplardan chiqib fikrlash qobiliyatidir.Nega muhim? Texnologiyalar rivojlangan asrda tayyor va bir xil ishlarni robotlar ham bajara oladi. Insonning ustunligi esa aynan yoʻqdan bor qilish, yangi loyihalar va kreativ yechimlar yaratishda namoyon boʻladi.2. Kritik fikrlash (Critical Thinking) — Tanqidiy fikrlashMaʼlumotlar oqimini saralash, ularni tahlil qilish, haqiqatni yolgʻondan ajratish va asoslangan xulosalar chiqarish koʻnikmasidir.Nega muhim? Hozirgi axborot asrida feyk (yolgʻon) xabarlar va chalgʻituvchi maʼlumotlar juda koʻp. Tanqidiy fikrlaydigan inson har qanday maʼlumotni koʻr-koʻrona qabul qilmaydi, uning sabab va oqibatlarini tekshirib koʻradi.3. Kommunikativlik (Communication) — Muloqot koʻnikmalariOʻz fikrini boshqalarga aniq, tushunarli va madaniyatli tarzda yetkazib bera olish, shuningdek, suhbatdoshini tinglash va tushunish qobiliyatidir.Nega muhim? Bilimingiz qanchalik kuchli boʻlmasin, agar uni boshqalarga toʻgʻri tushuntira olmasangiz, muvaffaqiyatga erishish qiyin. Muloqot koʻnikmasi muzokaralar olib borish va taqdimotlar qilishda hal qiluvchi rol oʻynaydi.4. Kooperatsiya (Collaboration) — Jamoada ishlashUmumiy bir maqsadga erishish yoʻlida boshqa odamlar bilan hamjihatlikda ishlash, vazifalarni boʻlishish va jamoa manfaatini oʻz ambitsiyalaridan ustun qoʻya olish qobiliyatidir.Nega muhim? Zamonaviy dunyoda eng yirik va muvaffaqiyatli loyihalar yolgʻiz shaxslar tomonidan emas, balki kuchli jamoalar tomonidan yaratiladi. Jamoada har bir aʼzoning kuchli taraflaridan unumli foydalanishni bilish kerak.Bu metod qayerlarda qoʻllaniladi?Zamonaviy taʼlimda: Darslarni faqat maʼruza shaklida emas, balki talabalarni bahs-munozaraga tortish, jamoaviy loyihalar berish va muammoli vaziyatlarga yechim topish orqali oʻtishda (masalan, Keys-stadi usulida).Karyera va Biznesda: Yirik kompaniyalar (Google, Apple va h.k.) ishga qabul qilishda nomzodning faqat diplomiga emas, aynan mana shu 4K koʻnikmalari qanchalik rivojlanganiga eʼtibor qaratadi.Muxtasar aytganda, 4K metodi — bu shunchaki nazariya emas, balki doimiy oʻzgarib borayotgan dunyoga moslashish va har qanday sohada yetakchi boʻlish uchun hayotiy strategiyadir."}, {"savol_raqami": 2, "savol": "An'anaviy ta'lim metodlari va ularning turlari haqida so'zlang", "javob": "An'anaviy taʼlim metodlari va ularning turlari haqida soʻzlang Anʼanaviy taʼlim metodlari — bu uzoq yillar davomida shakllangan, taʼlim tizimining asosini tashkil etuvchi va bilim gʻoyalarini avloddan-avlodga yetkazishda sinalgan klassik usullardir. Bu metodlarning asosiy xususiyati shundaki, ularda oʻqituvchi boshqaruvchi va asosiy bilim manbai hisoblanadi, oʻquvchi yoki talaba esa asosan tayyor maʼlumotlarni qabul qiluvchi (passiv yoki faol ijrochi) rolini oʻynaydi.Anʼanaviy taʼlim metodlarini bir necha yirik guruhlarga ajratish mumkin. Keling, ularning turlari va mohiyatini koʻrib chiqamiz:1. Ogʻzaki bayon qilish metodlariBu guruhga oʻqituvchining soʻz yordamida maʼlumot yetkazishi bilan bogʻliq usullar kiradi. Ular uzoq vaqt davomida eng tejamkor va asosiy usul boʻlib kelgan.Maʼruza (Leksiya): Katta hajmdagi ilmiy va nazariy maʼlumotlarni tizimli, mantiqiy va izchil tarzda ogʻzaki yetkazish. Oliy taʼlim muassasalarida yetakchi oʻrin tutadi.\nHikoya: Mavzuni aniq dalillar, qiziqarli voqealar yoki obrazlar orqali tasvirlab berish. Koʻproq kichik yoshdagi talaba va oʻquvchilarga emotsional taʼsir oʻtkazish uchun qoʻllaniladi.Suhbat (Savol-javob): Oʻqituvchi va talabaning dialogi shaklidagi usul. Oʻqituvchi oldindan tayyorlangan savollar zanjiri orqali talabalarni mavzuni tushunishga yetaklaydi yoki oʻtilganlarni mustahkamlaydi.Tushuntirish: Qonuniyatlar, formulalar, terminlar yoki texnik jihatlarni dalillar va isbotlar yordamida izohlab berish.2. Koʻrgazmali (Illyustratsion) metodlarFaqat eshitish orqali emas, balki koʻrish orqali ham maʼlumotni qabul qilishga qaratilgan. \"Ming marta eshitgandan, bir marta koʻrgan afzal\" tamoyiliga asoslanadi.Illyustratsiya (Namoyish): Mavzuga oid plakatlar, xaritalar, chizmalar, jadval va maketlarni koʻrsatish.Demonstratsiya: Harakatdagi jarayonlarni (masalan, kimyoviy tajribalar, fizik hodisalar, asbob-uskunalarning ishlash mexanizmi yoki oʻquv filmlarini) bevosita koʻrsatib berish.3. Amaliy metodlarNazariy olingan bilimlarni koʻnikma va malakaga aylantirish, ularni mustahkamlash uchun xizmat qiladi.Mashqlar: Harakat yoki topshiriqlarni (masalan, masalalar yechish, matn tahlili, imlo qoidalarini qoʻllash) ongli ravishda koʻp marta takrorlash.Laboratoriya ishlari: Talabalarning maxsus jihozlar yordamida tajribalar oʻtkazishi. Bu usul nazariyani amaliyot bilan bogʻlaydi va mustaqil xulosalar chiqarishga oʻrgatadi.Amaliy ishlar: Olingan bilimlarni bevosita hayotiy yoki ishlab chiqarish vazifalariga tatbiq etish (masalan, chizmachilik, xarita bilan ishlash, dala tajribalari).4. Kitob bilan ishlash metodiMustaqil ravishda bilim olishning eng qadimiy va ishonchli usullaridan biri.Bunga darslik, xrestomatiya yoki ilmiy adabiyotlarni oʻqish, konspekt qilish, matndan reja tuzish, tezislar yozish va bayon tayyorlash kiradi.Anʼanaviy metodlarning ijobiy va salbiy tomonlariHar qanday metod kabi, anʼanaviy yondashuvning ham oʻziga yarasha yutuqlari va kamchiliklari bor:Yutuqlari (Plyuslari):Vaqtni tejaydi: Qisqa vaqt ichida juda katta hajmdagi tizimli maʼlumotni katta auditoriyaga yetkazish mumkin.Tizimlilik: Bilimlar maʼlum bir mantiqiy tartibda, fanning poydevoridan boshlab bosqichma-bosqich beriladi.Oson nazorat: Oʻqituvchi kim qanchalik oʻzlashtirganini standart testlar yoki soʻrovlar orqali oson tekshira oladi.Kamchiliklari (Minuslari):Passivlik: Oʻquvchi asosan \"tinglovchi\" va \"yod oluvchi\" rolida boʻladi, uning mustaqil va ijodiy fikrlashiga kam joy qoladi.Individual yondashuvning kamligi: Auditoriyadagi barcha talabalarning qabul qilish tezligi va darajasi turlicha boʻlsa-da, maʼlumot hammaga bir xil tempda beriladi.Yodlashga yoʻnaltirilganlik: Koʻpincha tahlil qilish emas, balki maʼlumotni shunchaki eslab qolish va imtihonda qaytarib berish birinchi oringa chiqib qoladi.Xulosa: Bugungi kunda zamonaviy taʼlim (masalan, yuqorida aytilgan 4K metodi, interaktiv usullar) anʼanaviy metodlarni butunlay rad etmaydi. Aksincha, anʼanaviy usullar orqali poydevor fundamental bilimlarni berib, ularni interaktiv va amaliy metodlar bilan boyitish eng samarali natijani beradi."}], "4": [{"savol_raqami": 1, "savol": "4-bilet 1-savol", "javob": "Javob mavjud emas"}, {"savol_raqami": 2, "savol": "Insho yozish haqida ma'lumot bering. Uning asosiy nazariy vositalari qaysilar?", "javob": "Insho yozish haqida ma’lumot bering. Uning asosiy nazariy vositalari qaysilar?O‘quvchilarning og‘zaki nutqi bilan bog‘liq holda ularning yozma nutqini rivojlantirish ham muhim ahamiyat kasb etadi. Ma’lumki, yozma nutqning o‘ziga xos xususiyatlari mavjud. U kommunikativ jarayonda bevosita ishtirok etmaydi. Agar og‘zaki nutqda jumla yoki so‘zlarning to‘liq ifodalanmasligi, ayrim qo‘shimchalarning tushirib qoldirilishi, almashinishi singari holatlar yuz berishi mumkin bo‘lsa, yozma nutqda fikr ifodalashda mantiqiy izchillik, so‘z va iboralarning tizimliligi taqozo etiladi. O‘quvchi yozma nutqini takomillishtirishning keng tarqalgan usuli turfa janrlardagi va har xil adabiy mavzularda insho va esselar yozdirishga undashdir. O‘quvchilarning boshqa turdagi mustaqil ishlari, yozma bajariladigan uy vazifalari ham o‘quvchilar yozma nutqining rivojlanishiga ko‘maklashadi. Milliy ta’lim tizimiga Botish (Evropa) usullari, rivojlangan mamlakatlar ta’limi yutuqlari kirib kelishining o‘ziga xos ijobiy tomonlari mavjuddir. Lekin ta’limni tashkil etishda bizning minglab yillik tarixga ega o‘zbeklar ekanligimiz hamisha ko‘zda tutilishi kerak. Chiqish (Sharq)da azal-azaldan ko‘ngil tarbiyasi ustuvorlik qilib kelgan. Ma’naviy yetuklik baland martabada bo‘lgan. Bilimlarni o‘zlashtirishga, fanda kashfiyotlar qilishga ruhiy bezovtalik, ma’naviy kamolotga intilish orqali chiqilgan. Shuning uchun ham maktablarda, avval badiiy adabiyotni o‘qitish, so‘zdan ta’sirlanishga o‘rgatish amalga oshirilgan. Ruhiyatni uyg‘otishga harakat qilingan. Bezovta qalbgina izlanishga qodir ekanini bobolar yaxshi tushunishgan. Zamonaviy milliy ta’limda sog‘lom ma’naviyatni tarbiyalash bosh maqsad qilib belgilangani holda amalga oshirilayotgan ishlar hozircha yetarli bo‘lmayotir. Botish ta’lim tizimining xususiyatlarini ko‘r-ko‘rona ko‘chirish emas, ular erishgan yutuqlarning o‘quvchi milliy xususiyatlari, ruhiy o‘ziga xosligi, real jihatlariga mos keladigan tomonlarini o‘zlashtirishgina samara berishi mumkin. Aks holda, chet el tarbiyashunosligidagi tashqi jihatlargina o‘zlashtirilib, qilingan harakatlar samarasiz ketadi. O‘quvchining erkin va mustaqil mulohazasiga asoslanadigan mustaqil yozma ishlarni o‘quv yilining boshida, badiiy asar tahliliga bir oz o‘rganilgandan keyin, o‘quv yili o‘rtalarida va oxirida olish bolalarning mustaqil fikrlashini o‘stiradi. Shu bilan birga, ulardagi fikr mustaqiligining o‘sishini nazorat qilishga imkon beradi.\nSinfda asar mutolaasi davomida o‘quvchilarga insho yozishda qo‘l keladigan muhim so‘z va iboralarni belgilab borishni o‘rgatish ham maqsadga muvofiq bo‘ladi. Bu narsa o‘quvchilarni asarni o‘qish davomida insho yozishga ruhan tayyorlaydi. Asar matnidagi muhimni nomuhimdan farqlashga o‘rgatadi. Masalan, «Qodiriyning ijodida men qadrlaydigan jihatlar» mavzusida insho yozdirish uchun, avvalo, Abdulla Qodiriyning asarini o‘quvchi sevib qola oladigan darajada tahlil qilish kerak. Asardagi o‘quvchi qalbini titratadigan o‘rinlarni kashf qildirish kerak. Mana shu kashfiyot, o‘quvchiga lazzat bag‘ishlagan topildiqlargina adibni kitobxonga sevdiradi. U yozuvchini asarlarining go‘zal uslubi, ko‘ngilga borib o‘rnashadigan tuyg‘ular tasviri tufayli sevib qoladi. Bu sevgi o‘quvchining inshosida o‘z aksini topadi. Bunday mavzularda ko‘nglida o‘yi, aytar gapi bor o‘quvchilargina insho yozishlari mumkin. Bu insholar maktabda o‘rganiladigan shoir yoki yozuvchi ijodiga o‘quvchining chinakam muhabbatini ko‘rsatadigan, muallifning aqliy va ruhiy holatini kashf etishga bag‘ishlangan, chinakam mustaqil, o‘zgalardan ko‘chirilmagan ish bo‘ladi. Bunday insho yozishda o‘quvchiga berilgan erkinlik va imkoniyat uni mustaqil fikrlashga, kechinmalarini so‘z bilan ifodalashga odatlantiradi. Bu xil yozma ishlarda kitobiy so‘z va iboralarning bo‘lishi ko‘p kitob o‘qigan o‘quvchilar uchun tabiiy hol, albatta. Asosiy e’tiborni o‘quvchining darslik muallifi yoki o‘qituvchi aytganlarni takrorlamayotganiga qaratish lozim. Shuni aytish mumkinki, bugun ham o‘quvchilarning ko‘pchiligi o‘z fikrini aytishga tortinadi yoki buni istamaydi. Achinarlisi, ularning ko‘pchiligida aytishga arzigulik fikrning o‘zi yo‘q. Agar maktab adabiy ta’limi yuqorida tavsiya etilgan yo‘sinda tashkil etilsa, fikr kishilari ko‘payishi muqarrar. Yuqorida aytilgan usullarda o‘quvchilar an’anaviy yo‘sindagidan ko‘ra yaxshiroq yozishadi. Shu tarzda o‘quvchilar matnni qayta hikoyalashdan qutula boradilar, insholarida o‘z munosabati, tintilishlari, fikr, tuyg‘u va istaklarini ifodalay borishadi. Bevosita o‘quvchi shaxsiga qaratilgan insholar uni ijod qilishga, o‘ylashga o‘rgatadi. O‘qituvchining qarashlari, kitob va qo‘llanmalardagi fikrlar o‘quvchi ishida qo‘llanilishi, tabiiy. Faqat ularning o‘rinli bo‘lishi,\nbolaning qarashlarini asoslashga xizmat qilishi sezilib turishi zarur. O‘quvchiga bir emas bir nechta parchani taqdim etish kerak, toki unda o‘ziga yoqqanini, o‘zining darajasiga mos keladiganini tanlash imkoni bo‘lsin. Ana shunda har darsda chinakam ijod ruhi hukmron bo‘ladi. Adabiyot darslarida o‘quvchini badiiy asarda nima aytilganiga emas, balki qanday aytilganiga ham diqqat qaratishga o‘rgatish lozim. U tabiat tasviri go‘zalligi, qahramonlar ichki kechinmalari ifodasi nozikligi, muallif tilining injaligini ham kuzatsin, sezsin. Adabiyot darslarida, asar tahlili mobaynida shunday narsalarga e’tiborli bo‘lgan o‘quvchi ijod jarayoni bo‘lmish insho bitishda ham o‘ylanadi, izlanadi, bilganlaridan foydalanadi. Bola shularni tuysa, ma’naviyati to‘kisroq shakllanadi. Zero, o‘quvchilarda dunyoqarash shakllanishi ayni shu yoshga to‘g‘ri keladi. O‘quvchi yozgan ishlarning mazmunli bo‘lishida asarning qaysi o‘rinlari muvaffaqiyatli chiqqanini bilishi muhim ahamiyat kasb etadi. Ularda bunday topqirlikni shakllantirish va rivojlantirish o‘qituvchining burchi hisoblanadi. Bunga «Asarni o‘qishdan tuyganlarim», «Asardagi menga eng yoqqan jihatlar» singari mavzularda insho yozdirishi bilan erishish mumkin. O‘quvchilar inshoda kitobdan, o‘qituvchi ma’ruzalaridan olgan bilimlarini mustaqil ravishda amaliyotda qo‘llashi ham mumkin. Bu bilimlar o‘quvchiga yo‘nalish berib, fikrlarini tizimga solishga ko‘maklashadi. Aks holda, bunday insho to‘la mustaqil fikrlash mahsuli bo‘la olmaydi. O‘zi kashf qilish boshqa, o‘zgalarning yo‘nalishi bilan fikr yuritish boshqa, albatta. Lekin o‘zgalar bergan yo‘nalish asosida bo‘lsa-da, fikrlay boshlagan o‘quvchi ma’lum vaqt o‘tgach, albatta, mustaqil fikrlashga o‘tadi. Mustaqil ish muallifi unda o‘z fikrini ifodalashi yoki o‘zgalarning aytganlariga qo‘shilish-qo‘shilmasligi sabablarini izohlashi kerak. Biror fikrni yoqlash yoki inkor etish ham mustaqil tafakkurni talab qiladi. O‘quvchi o‘z fikrlarini ifodalashni, ularga ishlov berishni bilishi, o‘qituvchi esa darslik yoki qo‘llanmalardan olingan qolipdagi ishni emas, aynan inshoni, ijod mahsulini tekshirishi kerak. Yomon baho bilan yoniq ruhlarni so‘ndirish emas, balki o‘quvchilarni ijodga undash yo‘llarini topish lozim. O‘quvchilarning inshoda bildirgan fikrlarini hurmat qilish, yozma ishlardagi biror tasvirni e’tiborsiz qoldirish mumkin emas.\nMuvaffaqiyatli chiqqan fikr va xulosalarni ko‘rsatish, noto‘g‘ri ifodalar haqida jiddiy mulohazalar aytish, ularning o‘rinsizligiga o‘quvchilarni ishontirish zarur. Asar ustida ishlayotgan o‘quvchilarga so‘zga ehtiyotkorlik bilan yondashishni o‘rgatish kerak. O‘smirlar yozuvchining badiiy so‘zi chin mo‘jiza ekanini tushunishi, his qilishi zarur. Muallif qo‘llagan so‘z tagida qanday fikr mavjudligiga e’tibor berishni o‘rgatish adabiyot o‘qituvchisining burchidir. Uni qiynayotgan narsalarni o‘zgalarni ham qiynaydigan tarzda ifodalashga, unda tug‘ilgan fikrni boshqa bir kishiga ta’sir qiladigan yo‘sinda bayon eta bilishga o‘quvchini undash lozim. Shunda o‘quvchilar etyud, kichikroq hikoya, she’r yoki insholarida o‘zini bezovta qilayotgan tuyg‘ularni o‘zgalarga ham yuqadigan tarzda ifodalashga harakat qilishadi. Shu tariqa so‘zning qudrati, ijodning mashaqqat va lazzatini his qiladilar. Adabiyot o‘quvchini odamlar dunyosiga olib kiradi, unda shu olamga mansublik jihatlarini kuchaytiradi. Bu, o‘z navbatida, unga o‘zligini anglatadi. O‘quvchi ijod jarayonida hayotda mavjud narsani o‘zi uchun o‘zi qayta kashf etishi va buning lazzatini tuyishi kerak. Yuksak tuyg‘ularni his qilish gashtini hech narsa bilan tenglashtirib bo‘lmaydi. Inson omadsizliklar, mag‘lubiyatlar, iztiroblar ketidan erishilgan kashfiyot, g‘alaba lazzatini tuyib ko‘rishi kerak. O‘quvchilarning uyg‘onishi, ruhiy muvozanatdan chiqishi, ixtiyoriy ravishda ham aqliy, ham ruhiy zo‘riqishi yaxshi darsning muhim belgisidir. Adabiy-ijodiy mavzulardagi insholar bilan bir qatorda bevosita o‘quvchi shaxsiga qaratilgan erkin insholar ham yozdirilishi kerak. Bu insholar bolalarning yosh xususiyati va badiiy didiga mos kelsa, maqsadga muvofiq bo‘ladi. Masalan, «O‘rtog‘imning tavsifi», «Men suygan suyukli» singari mavzulardagi ishlar sir saqlanishi kerak. O‘quvchining o‘qituvchiga ishonchi ham uning ijodidagi samimiylikka garovdir. Chinakam fikr mustaqilligi, tafakkur yetukligi, mulohazalarning samimiyligi hayot, badiiy so‘z hamda san’at hodisalarini chuqur tahlil qila bilishda ko‘rinadi. Tafakkur mustaqilligining bunday darajasiga o‘quvchilar oldiga murakkab masalalar qo‘yish bilan, asta-sekin erishiladi. Hech qanday fikrning yo‘qligidan, noto‘g‘ri bo‘lsa-da, fikrning bori ma’qul. Yo‘q narsani yaratishdan ko‘ra, borining yo‘nalishi yoki shaklini, mazmunini o‘zgartirish osonroq."}], "5": [{"savol_raqami": 1, "savol": "Psixologik kompetensiya haqida ma'lumot bering?", "javob": "Psixologik kompetensiya haqida ma’lumot bering?Adabiyot o‘qituvchisining kompetentliligini ta’minlash maz-kur qo‘llanmaning mazmuni-mohiyatidan kelib chiqadigan natija-dir. Kompetensiya (lotincha com’etens – munosib, mos, ke rakli,layoqatli, biladigan ma’nolarini anglatadi) – shaxs tomonidanhayotning muayyan tarmoqlarida samarali faoliyat yuritish uchunzarur bo‘ladigan bilim, ko‘nikma, malaka va tajriba mavjudliginianglatadigan tushuncha.Kompetentlilik – kompetensiyaga egalik. Odamning muayyansohalarda samarali faoliyat ko‘rsatishi uchun zarur bo‘lganbilim, ko‘nikma, malaka va tajribaga egaligi bilan uning shaxsliksifatlari o‘rtasidagi uyg‘unlikni anglatadiKompetentlilik shaxsning muayyan soha bo‘yicha ayniamaliy imkoniyatlari va malakaviy darajasida namoyon bo‘ladi.Har qan day mutaxassisda uyg‘otiladigan va mahsuldor im-koniyat mavjud bo‘ladi.Kompetentlilik» atamasi ta’lim sohasiga psixologik izlanishlarnatijasida kirib kelgan. Bu tushuncha ruhshunoslar nazdidahar qanday mutaxassisning noan’anaviy vaziyatlar, kutilmaganholatlarda vaziyatga mos muloqot yo‘llarini topa bilishi, raqiblarbilan o‘zaro munosabatlarda yangi usullarni qo‘llay olishi, mu-rakkab topshiriqlarni bajarishda zarur ma’lumotlardan bilgichlikbilan foydalanishi, uzluksiz ravishda o‘z ustida ishlashi, o‘z bilim,ko‘nikma va malakalarini izchil ravishda takomillashtirib borishinianglatadi.Psixologik kompetensiya — bu insonning o‘zini va atrofdagilarni anglash, hissiyotlarni boshqarish, samarali muloqotga kirishish hamda qiyin vaziyatlarda to‘g‘ri qarorlar qabul qilish qobiliyatidir. Mazkur xususiyat shaxsning ijtimoiy muhitga moslashishini ta’minlaydi va uning umumiy hayot sifatini belgilaydi.Kompetensiyaning tarkibiy qismlariKognitiv komponent: Psixologik bilimlarga egalik. Inson ruhiyati qonuniyatlarini tushunish.Affektiv komponent: Hissiyotlarni anglash va boshqarish. Emotsional intellekt darajasining yuqoriligi.Xulq-atvor komponenti: Muloqot ko‘nikmalarini amalda qo‘llash. Mojarolarni tinch yo‘l bilan hal qilish.Reflektiv komponent: O‘z xatti-harakatlarini tahlil qilish. Kuchli va kuchsiz tomonlarini xolis baholashPsixologik kompetensiya ayniqsa rahbarlar, pedagoglar, shifokorlar va psixologlar uchun juda muhim hisoblanadi. U ish joyida sog‘lom psixologik muhitni yaratishga, jamoada nizolarning oldini olishga va xodimlar motivatsiyasini oshirishga bevosita xizmat qiladi."}, {"savol_raqami": 2, "savol": "Debat, debrifing va demonstratsiya haqida ma'lumot bering.", "javob": "Debat, debrifing va demonstratsiya haqida ma’lumot bering.Adabiyot darslarida debat, debrifing va demonstratsiya metodlari o‘quvchilarning badiiy asarni chuqur tahlil qilishi, qahramonlar tuyg‘ularini his etishi va nutqini o‘stirishida juda samarali vosita hisoblanadi.Debat: Adabiyot darsida argumentatsiyaAdabiyotda debat asar qahramonlarining xulq-atvori yoki ziddiyatli g‘oyalar ustida o‘tkaziladi. O‘quvchilar matnga tayanib o‘z fikrini isbotlashi shart.Mavzu namunasi: \"Abdulla Qodiriyning 'O‘tkan kunlar' romanidagi Otabekning tutgan yo‘li to‘g‘ri edimi yoki noto‘g‘ri?\"Jarayon: Sinf ikki guruhga bo‘linadi. Birinchi guruh Otabekning harakatlarini oqlaydi, ikkinchi guruh qoralaydi. Har bir tomon asardan iqtiboslar (faktlar) keltiradi.Natija: O‘quvchilarda matn bilan aniq ishlash, tanqidiy fikrlash va o‘zgalar fikrini tinglash ko‘nikmasi shakllanadi.Debrifing: Asar yoki rolli o‘yindan keyingi chuqur tahlilAdabiyot darsida rolli o‘yin (masalan, asardan biror sahnani ijro etish) yoki og‘ir psixologik asar mutolaasidan keyin debrifing o‘tkazish shart. Bu o‘quvchilarni emotsional yuklamadan chiqarish va xulosa yasashga yordam beradi.Jarayon: O‘qituvchi asar o‘qib bo‘lingach, quyidagi ketma-ketlikda savollar beradi:Hissiyot: \"Asarni o‘qiyotganda (yoki qahramon rolini ijro etayotganda) ichingizdan nimalar o‘tdi?\"Tahlil: \"Nima sababdan qahramon aynan shu fojiali qarorni qabul qildi deb o‘ylaysiz?\"Xulosa: \"Bu asar bizning bugungi hayotimizga qanday saboq beradi?\"Natija: O‘quvchilarning empatiya (shafqat) tuyg‘usi rivojlanadi, asar mag‘zi chaqiladi.Demonstratsiya: Ko‘rgazmalilik va vizualizatsiyaAdabiyot darslarida demonstratsiya — yozuvchi yashagan davr muhitini, asar syujetini yoki qahramon qiyofasini ko‘z oldiga keltirish uchun qo‘llaniladi.Jarayon: O‘qituvchi darsda quyidagilarni namoyish etadi:Tarixiy asar o‘qilayotganda o‘sha davr kiyimlari, buyumlari yoki qurollarining rasmlari/maketi.G‘afur G‘ulom she’rlari o‘tilayotganda shoirning o‘z ovozida yozilgan audioyozuv.Roman asosida suratga olingan badiiy filmdan maxsus parcha (ekranizatsiya).Natija: Asar matni o‘quvchi ongida vizual shakllanadi, darsga bo‘lgan qiziqish va eslab qolish darajasi ortadi."}], "6": [{"savol_raqami": 1, "savol": "Adabiyot darslarida ifodali o'qishga qo'yiladigan talablar.", "javob": "1. Adabiyot darslarida ifodali o‘qishga qo‘yiladigan talablar.Adabiyot darslarida ifodali o‘qish — badiiy matnni his-hayajon, mazmun va muallif g‘oyasini to‘g‘ri yetkazgan holda o‘qishdir. Ifodali o‘qishga quyidagi talablar qo‘yiladi:To‘g‘ri o‘qishSo‘zlarni adabiy talaffuz me’yorlariga amal qilgan holda, xatosiz o‘qish kerak.Ongli o‘qishO‘quvchi matn mazmunini tushungan holda o‘qishi lozim. Asarning g‘oyasi, qahramonlarning kayfiyati his qilinishi kerak.Ravon o‘qishO‘qish sekin yoki haddan tashqari tez bo‘lmasligi, tabiiy va ravon bo‘lishi zarur.Intonatsiyaga rioya qilishGap mazmuniga qarab ovoz ohangini o‘zgartirish, savol, undov, hayajon yoki qayg‘uni ovoz orqali ifodalash kerak.Pauzalarga amal qilishTinsh belgilariga mos ravishda to‘xtamlar qilish matn mazmunini aniq yetkazadi.Ovozning aniqligi va ta’sirchanligiOvoz balandligi, tembri va talaffuzi tinglovchiga tushunarli bo‘lishi kerak.His-hayajon bilan o‘qishShe’r yoki nasriy asardagi tuyg‘ularni his etib o‘qish ifodali o‘qishning asosiy belgilaridan biridir.Muallif uslubini saqlashAsarning ruhiga mos tarzda o‘qish, qahramon xarakterini ovoz orqali ko‘rsatish muhim."}, {"savol_raqami": 2, "savol": "Adabiyot dars ishlanmalari haqida ma'lumot bering.", "javob": "2. Adabiyot dars ishlanmalari haqida ma’lumot bering.Adabiyot dars ishlanmalari — o‘qituvchiga darsni samarali tashkil etish, o‘quvchilarda badiiy tafakkur va tanqidiy fikrlashni rivojlantirishga yordam beruvchi batafsil rejadir. U muayyan mavzuni tushuntirishdan tortib, mustahkamlash va baholashgacha bo'lgan jarayonlarni qamrab oladi. 📘 Dars ishlanmasining asosiy qismlariDars maqsadi va vazifalari: Ta’limiy, tarbiyaviy va rivojlantiruvchi maqsadlar aniq belgilanadi.Dars turi va metodi: Interfaol usullar, tahlil (suhbat, munozara), guruhlarda ishlash yoki loyihaviy yondashuv tanlanadi.Dars jihozi: Darsliklar, proyektor, yozuvchi yoki shoir portreti, tarqatmali materiallar va ko‘rgazmali vositalar. ⏱ Darsning bosqichma-bosqich tuzilishiTashkiliy qism: Salomlashish, davomatni aniqlash va ijobiy muhit yaratish.O‘tilgan mavzuni takrorlash: \"Aqliy hujum\", savol-javob yoki kichik testlar orqali o‘quvchilar bilimini sinash.Yangi mavzu bayoni: Muallif hayoti, ijodi va asar mazmuniga to‘xtalish. Bunda zamonaviy texnologiyalardan (slaydlar, video lavhalar) foydalanish yuqori samara beradi.Mavzuni mustahkamlash: Asar qahramonlari xarakterini tahlil qilish, ijodiy yondashuv (\"Venn diagrammasi\", \"Klaster\" usuli).Uyga vazifa va baholash: O‘quvchilarga mavzu yuzasidan esse yozish yoki asarni to‘liq o‘qib kelishni tayinlash, darsdagi faolligiga qarab ball qo‘yish. 💡 Amaliy tavsiyalar va manbalarInterfaollik: Dars davomida faqat ma’ruza o‘qish bilan cheklanmasdan, asar parchalarini rollarga bo‘lib ijro etish yoki kichik sahna ko‘rinishlarini tayyorlash o‘quvchilarning adabiyotga bo‘lgan qiziqishini oshiradi.Manbalar: Dars ishlanmalarining tayyor namunalarini izlash yoki o‘z ishlanmalaringizni boyitish uchun Scribd platformasidagi tayyor hujjatlardan, shuningdek, ResearchGatebazasidagi metodik qo‘llanmalardan foydalanishingiz mumkin."}, {"savol_raqami": 3, "savol": "Badiiy asar tahlili (epik, lirik, dramatik)", "javob": "3. Badiiy asar tahlili (epik, lirik, dramatik). Badiiy asar tahlili uchta asosiy adabiy tur — epik, lirik va dramatik xususiyatlaridan kelib chiqib turlicha amalga oshiriladi. Quyida ularning har biri bo'yicha tahlil bosqichlari qisqacha jamlangan:1. Epik asarlar tahlili (Hajmli nasriy va nasriy-nazmiy asarlar)Epik tahlil voqelikni, xarakterlarni va harakatlarni to'liq yoritishga qaratiladi. Mavzu va g'oya: Asarda ko'tarilgan asosiy muammo (masalan, yaxshilik va yomonlik, jamiyat va shaxs) hamda muallifning maqsadi.Syujet va kompozitsiya: Voqealar rivoji (kirish, tugun, voqea rivoji, kulminatsiya, yechim) va qismlarning joylashuvi.Obrazlar tizimi: Asar qahramonlari tahlili, ularning xarakteri, jamiyatdagi o'rni va psixologik holati.Tasviriy vositalar: Muallif qo'llagan badiiy san'atlar (metafora, epitet, jonlantirish) va asar tili.2. Lirik asarlar tahlili (She'riyat)\nLirikada voqealar emas, balki qahramonning ichki kechinmalari, ruhiy holati va his-tuyg'ulari tahlil qilinadi. Lirik qahramon: Muallifning ruhiy holatini ifodalovchi obraz, uning ichki dunyosi va dunyoqarashi.Asarning yozilish sababi (motiv): Shoirni qanday tuyg'u (vatanparvarlik, sevgi, hijron, tabiat) ilhomlantirgani.Badiiy san'at va shakl: Qofiya, vazn (barmoq yoki aruz), ritm, raddiya, tashbeh kabi she'riy vositalarning ohangga ta'siri. 3. Dramatik asarlar tahlili (Pyesalar)Dramatik asarlar sahnada ijro etish uchun yoziladi, shuning uchun tahlil dialog va harakatlarga asoslanadi. Konflikt (to'qnashuv): Asardagi ziddiyatning mohiyati (g'oyalar yoki qahramonlar qarama-qarshiligi).Dialog va monologlar: Qahramonlarning nutq xususiyatlari, xarakterni nutq orqali ochib berish mahorati.Sahnaviylik (harakatlar): Asarning sahna talablariga javob berishi, muallif izohlari (remarkalar) va xatti-harakatlarning o'rni."}], "7": [{"savol_raqami": 1, "savol": "7-bilet 1-savol", "javob": "Javob mavjud emas"}, {"savol_raqami": 2, "savol": "Yozuvchi hayoti va ijodini o'rganishda multimedia vositalarining o'rni", "javob": "Yozuvchi hayoti va ijodini o‘rganishda multimedia vositalari an’anaviy usullarni boyitib, jarayonni vizual va interaktiv ko‘rinishga keltiradi. Ularning asosiy o‘rni quyidagilardan iborat:1. Vizualizatsiya va tasvirlash- Video-hujjatlar: Yozuvchining yashash davri, u yashagan joylar va tarixiy kontekstni ko‘rsatish orqali haqiqatga yaqin tasavvur uyg‘otadi.- Raqamli arxivlar: Eski qo‘lyozmalar, xatlar va fotosuratlarning yuqori sifatli raqamli nusxalari asarning tarixiy qiymatini ko‘rish imkonini beradi.2. Interaktivlik va qatnashish- Virtual muzeylar: Talaba yoki tadqiqotchi yozuvchining shaxsiy buyumlari va asarlari bilan \"virtual\" tarzda muloqot qilishi, ularni 3D formatda ko‘rishi mumkin.- Multimedia loyihalar: Xaritalar, vaqt chiziqlari (timeline) va interaktiv infografikalar orqali yozuvchining hayot yo‘li va asarlari mantiqiy bog‘liqligi ko‘rsatiladi.3. Audio-vizual ta’sir- Audio-kitoblar va podkastlar: Yozuvchining o‘zi tomonidan o‘qilgan matnlar yoki u haqidagi professional tahliliy podkastlar matnni chuqurroq his qilishga yordam beradi.- Audio-vizual rekonstruksiyalar: Dramatik asarlarning qisqa video-parodiyalari yoki sahnalari asar ruhini tezroq tushunishga xizmat qiladi.4. Ma’lumotlarni qidirish va tahlil qilish- Elektron kutubxonalar: Dunyo miqyosidagi raqamli bazalar orqali yozuvchining asarlarini tezkor qidirish va solishtirish imkoniyati.- Korpus tahlili (Corpus linguistics): Multimedia dasturlari yordamida yozuvchining uslubini, so‘z boyligi va takrorlanuvchi mavzularini statistik usulda o‘rganish.Xulosa: Multimedia vositalari o‘rganuvchini faqat \"matn o‘quvchi\" emas, balki \"jarayon guvohi\"ga aylantiradi. Bu esa o‘rganish jarayonini qiziqarli, tushunarli va xotirada uzoq qoluvchi qiladi."}], "8": [{"savol_raqami": 1, "savol": "Badiiy asarni tahlil qilish metodlari", "javob": "Badiiy asarni tahlil qilish metodlari — asarni mazmuni, g‘oyasi, obrazlari, tili va badiiy xususiyatlarini o‘rganish usullaridir. Adabiyotshunoslikda bir nechta asosiy metodlar mavjud:1. Tarixiy metodAsarni yaratilgan davr bilan bog‘lab o‘rganadi.Yozuvchi yashagan zamonSiyosiy va ijtimoiy muhitTarixiy voqealarning asarga ta’siri tahlil qilinadi.Masalan, Alisher Navoiy asarlarini Temuriylar davri bilan bog‘lab o‘rganish.2. Biografik metodAsarni muallif hayoti bilan bog‘lab tahlil qiladi.Yozuvchining hayotiRuhiy kechinmalariShaxsiy tajribasi asarda qanday aks etgani o‘rganiladi.3. Qiyosiy metodBir yoki bir nechta asar o‘zaro solishtiriladi.ObrazlarMavzularG‘oyalarBadiiy usullar taqqoslanadi.Masalan, O‘tkan kunlar bilan boshqa tarixiy romanlarni qiyoslash.4. Psixologik metodQahramonlarning ichki dunyosi va ruhiy holatini o‘rganadi.KechinmalarXarakterRuhiy ziddiyatlar tahlil qilinadi.5. Struktural metodAsarning tuzilishiga e’tibor beradi.SyujetKompozitsiyaKonfliktObrazlar tizimi o‘rganiladi.6. Lingvistik (stilistik) metodAsarning til xususiyatlarini tahlil qiladi.Badiiy tasvir vositalariMetafora, epitet, tashbehMuallif uslubi o‘rganiladi.7. G‘oyaviy-badiiy tahlilAsarning asosiy g‘oyasi va tarbiyaviy ahamiyatini ochib beradi.Asar nima demoqchi?Muallifning maqsadi nima?Qanday xulosa chiqariladi?8. Sotsiologik metodAsardagi jamiyat hayotini o‘rganadi.Ijtimoiy tabaqalarOdamlar munosabatiJamiyat muammolari tahlil qilinadi.XulosaBadiiy asarni tahlil qilish metodlari asarni chuqurroq tushunishga yordam beradi. Har bir metod asarning boshqa bir tomonini ochib beradi. Shu sababli ko‘pincha bir nechta metod birgalikda qo‘llanadi."}, {"savol_raqami": 2, "savol": "Adabiyot o'qitish metodikasi fanining shakllanish va taraqqiyoti", "javob": "Adabiyot o‘qitish metodikasi fanining shakllanish va taraqqiyotiAdabiyot o‘qitish metodikasi — adabiyot fanini qanday o‘qitish, qanday usullar orqali o‘quvchilarga yetkazish, badiiy asarni tahlil qilish va o‘quvchilarning estetik tafakkurini rivojlantirish yo‘llarini o‘rganuvchi pedagogik fandir. Bu fan pedagogika, psixologiya va adabiyotshunoslik bilan uzviy bog‘liq holda rivojlangan.1. Adabiyot o‘qitish metodikasining shakllanishiAdabiyot o‘qitish metodikasining ildizlari qadimgi davrlarga borib taqaladi. Sharq mutafakkirlari ta’lim va tarbiya masalalariga katta e’tibor berganlar.Sharq mutafakkirlarining hissasiQuyidagi allomalar metodika rivojiga katta ta’sir ko‘rsatgan:Abu Nasr Forobiy — ta’limning inson kamolotidagi o‘rnini yoritgan.Abu Ali ibn Sino — bolani yoshiga mos o‘qitish, tushuntirish va kuzatish usullarini tavsiya qilgan.Alisher Navoiy — badiiy adabiyotning tarbiyaviy ahamiyatini ko‘rsatgan.Abdulla Avloniy — maktab va adabiy ta’limni yangicha usulda tashkil etishga xizmat qilgan.Jadidchilik davrida adabiyot darslari faqat matn o‘qish emas, balki fikrlash va tarbiya vositasi sifatida qarala boshlandi.2. Metodika fanining mustaqil fan sifatida shakllanishiXIX asr oxiri va XX asr boshlarida adabiyot o‘qitish metodikasi alohida fan sifatida rivojlana boshladi. Bu davrda:darsliklar yaratildi;yangi o‘qitish usullari ishlab chiqildi;badiiy asarni tahlil qilish metodlari shakllandi.Sovet davrida metodika tizimli ravishda rivojlandi. Adabiyot darslari:ifodali o‘qish;obraz tahlili;reja tuzish;insho yozish;mustaqil fikrlashkabi yo‘nalishlar asosida tashkil qilindi.Bu davrda metodik qo‘llanmalar, dars ishlanmalari va ilmiy tadqiqotlar ko‘paydi.3. Mustaqillik davrida taraqqiyotiO‘zbekiston mustaqillikka erishgandan keyin adabiyot ta’limida milliy qadriyatlarga e’tibor kuchaydi. Darslarda:milliy adabiy merosni o‘rganish;mustaqil va ijodiy fikrlashni rivojlantirish;ma’naviy tarbiya;zamonaviy pedagogik texnologiyalarni qo‘llashasosiy yo‘nalishlarga aylandi.Yangi o‘quv dasturlari, davlat ta’lim standartlari va zamonaviy darsliklar yaratildi.Adabiyot darslarida:interfaol metodlar;bahs-munozara;klaster;aqliy hujum;taqdimot;multimedia vositalarikeng qo‘llanila boshlandi.4. Hozirgi davrdagi rivojlanish xususiyatlariBugungi kunda adabiyot o‘qitish metodikasi:innovatsion texnologiyalar asosida rivojlanmoqda;o‘quvchi shaxsiga yo‘naltirilgan ta’limni qo‘llamoqda;badiiy tafakkur va kitobxonlik madaniyatini rivojlantirishga xizmat qilmoqda.Zamonaviy metodikaning asosiy maqsadi — o‘quvchini:mustaqil fikrlaydigan;kitobxon;ma’naviy yetuk;estetik didli inson qilib tarbiyalashdir.XulosaAdabiyot o‘qitish metodikasi uzoq tarixiy taraqqiyot yo‘lini bosib o‘tgan fan hisoblanadi. U Sharq mutafakkirlari qarashlari, jadidchilik harakati, sovet davri tajribasi va mustaqillik yillaridagi islohotlar asosida rivojlandi. Hozirgi kunda esa zamonaviy pedagogik texnologiyalar bilan boyib, yosh avlodning ma’naviy va estetik tarbiyasida muhim o‘rin egallamoqda."}], "9": [{"savol_raqami": 1, "savol": "Insho nima? Uning mazmuni haqida ma'lumot bering.", "javob": "Insho  arabcha  so‘z   bo‘lib,  «yaratish», «bino qilish», «qurish» ma’nosini  beradi.  Hozirgi tilimizda bu so‘zning ma’nosi ancha  torayib,  asosan,  o‘quvchi va talabalar to- monidan  yoziladigan  «ijodiy  yozma ish» ma’nosida qo‘llanadi.Insho – muallifning ma’lum bir mavzu asosida o‘z fikrlarini yozma shaklda bayon qiluvchi kichik asar. In- shoda muallifning so‘z qo‘llash mahorati, fikrlash ko‘- nikmasi, bilim va dunyoqarashi, savodi  namoyon  bo‘- ladi.Insho – o‘quvchi yaratadigan  matn  turi. Unda ma’lum bir mavzu mustaqil ravishda ochib beriladi. Inshoda o‘quv- chining o‘z fikrlarini yozma shaklda to‘g‘ri, ravon,  savodli bayon qilish malakasi aks etadi.Inshoda mavzu bo‘yicha bilimlar yuzaga chiqadi. Yozuvchi va shoirlar, olim va muxbirlar o‘zi yozadigan asar,  ilmiy ish,  maqolaga  katta mas’uliyat  bilan  qaragani kabi o‘quvchi ham insho yozishdan oldin unga har to- monlama tayyorlanishi lozim.Katta-katta olimlar ijodiy ishlarini o‘quvchilik paytida insholardan boshlashgan.Insho yozish uchun, avvalo,  bilim  egallash zarur.  Takror va takror yozish natijasida esa insho yozish ko‘nikma va malakasi  shakllanadi. Yaxshi  inshoning  zamirida boy  bilim va tinimsiz mashq yotadi.Har  qanday  ish tartib  bilan  bajarilganligi  kabi insho ham reja asosida yozilishi  kerak.  Puxta reja  inshoning  si- fatini ta’minlashga xizmat qiladi.Inshoda o‘quvchining o‘z fikri  va boshqa  manbalardan olgan ma’lumotlari ajralib turishi  kerak.  Boshqalarning fik- rini o‘zinikiday qilib berish ko‘chirmakashlik  sifatida  sal- biy baholanadi.Inshoning har bir turi o‘ziga xos shakl va mazmun xu- susiyatiga ega.Insho – o‘quvchi ijodiy mehnatining oliy ko‘rinishi, uning aqliy mehnati mahsuli. Insho puxta reja bo‘yicha yozilishi, mantiqan izchil, imloviy, uslubiy va punk- tuatsion jihatdan to‘g‘ri, dalillarga tayangan bo‘lishi zarur. Insho yozish uchun mavzu chuqur o‘rganilishi, dalillash uchun ko‘chirmalar yig‘ilishi, ularning man- balari aniq bo‘lishi kerak. So‘ngra  reja tuzilib,  reja  aso- sida yozishni boshlash  lozim.  Insholar hajmi  o‘quvchi- ning yoshiga qarab turlicha bo‘lishi mumkin."}, {"savol_raqami": 2, "savol": "9-bilet 2-savol", "javob": "Javob mavjud emas"}], "10": [{"savol_raqami": 1, "savol": "10-bilet savollar", "javob": "Javob mavjud emas"}], "11": [{"savol_raqami": 1, "savol": "Mustaqillik davrida adabiyot o'qitish metodikasi ilmida bo'lgan o'zgarishlar. Metodistlar haqida ma'lumot bering.", "javob": "Mamlakatimiz o‘z mustaqilligiga erishganidan keyin adabiyot o‘qitish metodikasi ilmida ham keskin o‘zgarishlar yuz bera boshladi. Chunki egamanlik ta’lim tizimi, xususan adabiy ta’lim oldiga ma’naviy komillik sari yuz tutgan avlodni shakllantirish vazifasini qo‘ydi. Ma’lumki, Komil shaxs tarbiyalash yuki hamma zamonlarda adabiyotning zimmasida bo‘lgan. Bu davr metodistlarining har biri mazkur vazifani o‘z imkoniyatlari darajasida uddalashga harakat qilmoqdalar.Mazkur davrning keksa avlodi sanalmish prof. To‘xtamurod Boboyev1930-yilda Samarqand viloyatining Xatirchi tumanida tug‘ilgan. 1956-yilda Alisher Navoiy nomidagi Samarqand davlat universitetining o‘zbek filologiyasi fakultetini tamomlagan. T.Boboyev 1967-yilda «O‘zbek prozasida ijobiy qahramon muammosi» mavzusida nomzodlik, 1998-yilda «Oliy o‘quv yurtlarida o‘zbek she’riyati poetikasini o‘rganish» mavzusida doktorlik dissertatsiyasini himoya qilgan.U yuzdan ortiq ilmiy va o‘quv-metodik asarlar muallifi. Olimning «Adabiyotshunoslikka kirish», «She’r ilmi ta’limi», «Adabiyotshunoslik asoslari», «Aruz vaznlarini o‘rganish», «O‘zbek she’r tuzilishi asoslarini o‘rganish», «Qofiya ilmi saboqlari», «Badiiy san’atlar» kabi o‘quv qo‘llanmalari, «Zamondoshimiz – adabiyotimiz qahramoni» nomli monografi-yasi, oliy o‘quv yurti talabalari uchun yozilgan «Adabiyotshunos-lik asoslari» darsligi adabiyot o‘qitish ilmi amaliyotida bugun ham qo‘llanilib kelinmoqda. T. Boboyev «She’r ilmi ta’limi» nomli metodik qo‘llanmasida bo‘g‘insiz she’r misralarini tasavvur qilib bo‘lmasligini, she’rningqalbi bo‘lmish musiqiylik va ritmni vujudga keltirishda eng faol ishtirok etuvchi unsur – bo‘g‘in ekanini ta’kidlab: «Barmoq tizimida bo‘g‘inlar turoqlarni, turoqlar turkumni, turkum vaznni, vazn ritmni, ritm musiqiylik, musiqiylik poetik g‘oyani vujudga kelti-radi. She’r unsurlari bir-biri bilan uzviy bog‘liqlikda, bir-biri bilan mustahkam aloqaga kirishgandagina o‘z vazifasini o‘tay oladi», – deb yozgan edi. Olimning metodik tavsiyalaridan adabiyot o‘qituvchilari she’r tahlilida amaliy foydalanishlari mumkin.Egamanlik davri o‘zbek adabiyot o‘qitish metodikasi fani rivo jida prof. U. Dolimovning ham o‘ziga xos o‘rni bor. Ulug‘bek Dolimov 1939-yilda Toshkent shahrida tug‘ilgan, 1962-yili ToshDU (O‘zMU) filologiya fakultetini tamomlagan. 1971-yilda «Ma’rifatparvar shoir Is’hoqxon Ibratning hayoti va ijodi» mav-zusida nomzodlik, 2008-yili «Jadid maktablari: ularda ona tili va adabiyot o‘qitishning ilmiy-nazariy hamda amaliy asoslari» mav-zusida doktorlik dissertatsiyasini himoya qildi. U O‘zbekiston va xorijda e’lon qilingan 200dan ortiq ilmiy maqolalar, «Ma’rifat darg‘alari» (prof. B. Qosimov bilan hamkorlikda), «Milliy uyg‘onish davri o‘zbek adabiyoti» nomli darslik (hammualliflikda), «Is’hoqxon Ibrat», «Turkistonda jadid maktablari», «Milliy uyg‘onish pedagogikasi» «O‘zbek pedagogik ensiklopedik so‘zligi» (hammualliflikda) kabi o‘ndan ortiq kitoblar muallifi. Ulug‘bek Dolimovning «Milliy uyg‘onish pedagogikasi» asari olimning adabiyotshunoslik va pedagogika sohasidagi bilimlari uyg‘unligida yaratilgan. Kitobda an’anaviy mahalliy maktablar va ularda o‘qitish usullari, madrasa ta’limi, o‘lkada Rusiya hukmron-ligi o‘rnatilgandan keyin tashkil etilgan rus-tuzem maktablari, ular-da o‘qitish mazmuni va metodlari, jadid maktablarining shakllanishi, ular rivojida hayriya jamiyatlarining ahamiyati, yangi o‘qitish metodi – «usuli savtiya»ning nazariy hamda amaliy asoslari, jadid maktablarida ona tili va adabiyot o‘qitish masalalari va butun Turkiston o‘lkasi bo‘yicha maorif tutumlari, ulardagi ilk yangi maktablar to‘laligicha qamrab olingan. Kitobning ikkinchi qismi Milliy uyg‘onish davri pedagogikasining eng yetuk namoyandalari hayoti, faoliyati va ijodiga bag‘ishlangan tugal adabiy-pedagogik\nportretlardan tashkil topgan. Is’hoqxon Ibrat, Siddiqiy-Ajziy, Saidrasul Saidaziziy, Vasliy Samarqandiy, Behbudiy, Shakuriy, Munavvarqori, Avloniy, Sadriddin Ayniy, So‘fizoda, Hoji Muin, Fit-rat, Hamza, Elbek, Shokirjon Rahimiy singari jadid maorifchilari haqida dalillar, tahlillar, ilmiy mushohadalar va umumlashmalar o‘z ifodasini topgan. Bir so‘z bilan aytganda, Ulug‘bek Dolimov ilk bor pedagogika ilmida jadid pedagogikasining butun mohiyati va ko‘lami bilan birlamchi manbalar asosida tadqiq etgan olimdir. O‘zbek adabiyotini o‘qitish metodikasi sohasiga o‘z munosib hissasini qo‘shgan olim prof. Safo Matjonov 1947-yil 23-yanvarda Qoraqalpog‘istonning Amudaryo tumanidagi Qipchoq qishlog‘ida ziyoli oilasida tug‘ilgan. 1965 – 69 yillarda Nizomiy nomidagi TDPIda tahsil olgan. S. Matjonov 1983-yilda «70-yillar bolalar qis-salarida syujet» mavzusida nomzodlik, 1998-yilda «Umumiy o‘rta ta’lim tizimida adabiyotdan mustaqil ishlarni tashkil etish usullari» mavzusida doktorlik dissertatsiyasini himoya qilgan. Safo Matjon – bolalar adabiyoti bilimdoni. Olimning ilmiy-ijodiy izlanishlari o‘tgan asrning 70-yillari ikkinchi yarmidan boshlanib, asosan bolalar adabiyoti va kitobxonligi, ta’lim-tarbiya masalalariga bag‘ishlangan. Bu ikki yo‘nalish bugungi kungacha olim izlanishlarining asosini tashkil etib kelmoqda.Professor S. Matjonning o‘tgan vaqt maboynida yaratgan «Bolalar she’riyatida lirik qahramon», «Hayot haqiqati va badiiy haqiqat», «Og‘ir yillar qissasi», «Qahramonning ta’sir kuchi», «Shoir ko‘p, ammo...», «Bolalar kitobxonligi», «Oila – maktab – kitobxon», «Hikoya qanday o‘qiladi?», «Poklanish davri va bolalar adabiyoti», «Bolalar adabiyoti: san’atmi yo tarbiya», «Komillik mezonlari» kabi turli yillarda chop etilgan ko‘plab maqolalari, shuningdek, «Bolalar adabiyotini sinfdan tashqari o‘qish», «Tiriklik suvi», «Kitob o‘qishni bilasizmi?», «O‘qish kitobi» (4-sinf uchun hammualliflikda yaratilgan) darsligi, «Uzluksiz ta’lim tizimida adabiyotdan mustaqil ishlarni tashkil etish usullari», «Maktabda adabiyotdan mustaqil ishlar» kabi yigirmadan ortiq adabiy-tanqidiy maqolalar to‘plami, darslik, o‘quv qo‘llanma hamda monografiyalarining yetakchi g‘oyasini kitobxonlik, bolalar nasri syujeti, adabiyot o‘qitishning dolzarb muammolari tashkil etadi. Olim sinfdan tashqari mustaqil ishlarga oid qo‘llanmalarida komil inson tarbiyasini bosh masala qilib qo‘yadi, badiiyat va ma’naviyat muammolari ilmiy, ilmiy-metodik ishlarining yetakchi mavzusi sifatida namoyon bo‘ladi. Olimning ilmiy yo‘nalishlaridan birini tashkil etuvchi kitob va kitobxonlik muammolari ham o‘zining ilmiy-amaliy ahamiyati\nbilan alohida e’tiborga loyiq. Ushbu mavzudagi bir qator o‘quv qo‘llanmalari bilan birga «Kitob o‘qishni bilasizmi» nomli kito-bida kitobxonlik madaniyati haqida so‘z yuritiladi, badiiy asarni o‘qish va uqish salohiyati haqida qimmatli mulohazalarni bayon etiladi: «Siz darsliklardan hayot va uning qonuniyatlari haqida-gi bilimlar bilan tanishasiz, ularni aql kuchi bilan qabul qilasiz, xotiringizda qayd etasiz. Ammo bu bilim va xulosalar hissiyotingiz-ga zarracha ta’sir ko‘rsatmaydi. Badiiy asarni o‘qiganda sizdagi bu «loqaydlik» faol munosabatga almashinadi. Qalbingiz chek-siz shodliklarga chulg‘anadi – ruhlanasiz, g‘azablanasiz, iztirob chekasiz. Chunki u qalb dardi tufayli yaratilgan, dard esa suhbat-doshni befarq qoldirmaydi»3. Pedagogika fanlari doktori Safo Matjonov bugungi kunda ham adabiyot o‘qitish muammolari va shakllanib kelayotgan yosh av-lodning ma’naviy kamoloti yo‘lida kitobning ahamiyati, o‘rni va roli haqida izlanishlarini davom ettirmoqda4.O‘zbek adabiyot o‘qitish metodikasi ilmida o‘z salmoqli his-sasi bilan yetakchi o‘rinlardan birini egallab turgan olim prof. Qo-zoqboy Yo‘ldoshev 1949-yilning 9-mayida Sirdaryo viloyati Bo-yovut tumanidagi Dehqonobod qishlog‘ida tug‘ilgan. 1970-yilda Sirdaryo pedagogika institutini bitirgan.Q.Yo‘ldoshev 1985-yilda «O‘zbek satirik hikoyalarida xarak-ter tasviri evolyutsiyasi» mavzusida nomzodlik, 1997-yilda «Yan-gicha pedagogik tafakkur va umumta’lim maktablarida adabiyot o‘qitishning ilmiy-metodik asoslari» mavzusida doktorlik disser-tatsiyasini himoya qildi. Q. Yo‘ldoshevning jami yetti yuzga yaqin ilmiy ishlari orasida 130dan ortig‘i mamlakat umumta’lim maktablari o‘quvchilari uchun yaratilgan darslik va o‘qituvchilariga mo‘ljallangan metodik qo‘llanmalardan iborat. Bulardan tashqari, Qozog‘iston Respublikasidagi o‘zbek maktablarining 5 – 11-sinflari uchun yaratilgan, bir necha o‘n yillardan beri qayta-qayta nashr etilib kelinayotgan «O‘zbek adabiyoti» darsliklari va ularning har biri uchun yozilgan metodik qo‘llanmalar, Qirg‘iziston Respublikasidagi o‘zbek maktablari 6-,7-,8-sinflari uchun yozilgan «O‘zbek adabiyoti» darsliklari olim metodik tadqiqotlar ko‘lamidan dalolatdir.Prof. Q. Yo‘ldoshevni adabiyot o‘qitish metodikasi ilmida bu-rilish yasadi deyish mumkin. Olim tubdan o‘zgargan jamiyatdagi adabiy ta’limni mohiyatan o‘zgartirishning ijtimoiy, ilmiy va peda-gogik asoslarini ko‘rsatib berdi. U adabiy faktlarni bildirishning o‘zi adabiyot saboqlari uchun maqsad emasligini, badiiy asar bi-lan tanishish o‘quvchilarda ezgu ma’naviy sifatlar shakllantirish-ga qaratilishi kerakligini ta’kidlab yozadi: «Aslida adabiyot tari-xiga daxldor biror dalilni sharillatib aytib bera oladigan, ammo ma’naviyatida ezgu fazilatlar bo‘lmagan o‘quvchidan ko‘ra, ...badiiy asarlarning qahramonlariga xos insoniy fazilatlarni o‘z tabiatiga singdirgan, sirtdan qaraganda, nofaolday tuyuladigan o‘quvchilar jamiyatimiz uchun ko‘proq zarurdir»5. Olim adabiy ta’limni tubdan yangilashda uning milliy-tarixiy ildizlariga tayanish kerakligini alohida ta’kidlaydi: «Qadim Turkis-tondagi maktablarda badiiy adabiyot asrlar davomida tajalli na-zariyasiga tayanilgan holda o‘qitilib kelingan. Negaki, ...chinakam badiiy asarlarning asosiy qismi yaratilishida tajalli tamal toshi vazifasini o‘tagandir. Bu nazariyaga tayanadigan adabiy ta’lim o‘quvchilarda ma’naviy sifatlarning shakllanishiga, bolalarda yaratuvchining qudratidan hayratlanish, qahridan qo‘rqish, go‘zalligidan zavqlanish singari xislatlarni barpo etishga ahami-yat beradi. O‘quvchilarning qalbini tarbiyalashga, tuyg‘ularini, hissiyotlarini noziklashtirishga diqqat qiladi. Tajalli asosida ish ko‘radigan adabiy ta’lim komil shaxs tarbiyalashni maqsad deb hisoblaydi»6. Olim o‘quvchilar ma’naviyatini shakllantirishda\nasarlarning o‘quv tahlili ustuvor mavqeda bo‘lishi lozimligini qayd etadi. Mustaqil yurtimizda adabiyot o‘qitish jarayonining yo‘nalishini belgilab beruvchi «Adabiy ta’lim konsepsiyasi» nomli bosh huj-jatni yaratishda ham Q. Yo‘ldoshev ilg‘or qarashlarga tayangan. Uning rahbarligida yaratilgan adabiy ta’lim standarti, dasturi, ular asosida yaratilgan darslik, o‘quv va metodik qo‘llanmalarda milliy qadriyatlar va estetik asoslar ustuvorlik qiladi.Q. Yo‘ldoshevning «Adabiyot o‘qitishning ilmiy-nazariy asoslari»7 kitobida adabiy ta’lim tizimini tubdan yangilashning il-miy-nazariy va tashkiliy tamoyillarini ishlab chiqqan. Asarda olim o‘quvchilarga tayyor tushunchalar berish emas, balki badiiy matn asosida o‘quvchilarda ma’naviy qarashlar, estetik did qaror topti-rish birlamchi ahamiyatga ega ekanini ko‘rsatib bergan. U «Ada-biyot o‘qitish metodikasi» qo‘llanmasi mualliflaridan biri sifatida adabiy ta’limning o‘zak masalalariga yangicha yondashuv namu-nasini ko‘rsatgan.Olimning adabiy ta’limni «...yangi ijtimoiy ong talablari dara-jasida tashkil etishning tamoyillarini belgilash pedagogika nazari-yasi uchun ham, adabiyot o‘qitish metodikasi uchun ham, tarbiya amaliyoti uchun ham kechiktirib bo‘lmaydigan zarurat»8 ekanini alohida ta’kidlashi adabiyot o‘qitishni yangilashning muhim ma-salalarini ko‘zda tutadi. Milliy va chet eldagi ilg‘or pedagogik qarashlarni qiyoslab o‘rganish, adabiyot o‘qitishda tayaniladigan metodik, pedagogik va estetik asoslarga yangilanayotgan peda-gogik tafakkur nuqtai nazaridan yondashuv olimning ilmiy tadqi-qotlari qimmatining oshuviga sabab bo‘ldi.Q. Yo‘ldoshev tomonidan «Adabiyot o‘qitish konsepsiyasi» ishlab chiqildi. So‘ngra shu yo‘nalishning «Davlat ta’lim stan darti» (Q. Husanboyeva bilan hamkorlikda) yaratildi. Bu davlat ahamiya-tiga molik rasmiy hujjatlarga tayangan holda «Adabiyot» dasturi va darsliklarning yangi avlodi yozildi. Bularning yarati lishida olim-ning xizmatlari katta bo‘ldi. Q. Yo‘ldoshev «Adabiyot» darsliklari pedagogika, metodika, psixologiya va adabiyotshunoslik ilmidagi eng yangi qarashlarga tayangan holda yaratilib, yangi davr nafasini aks ettirishiga alohida e’tibor qaratdi. Bundan tashqari, «Adabiyot» darsliklariga qo‘yiladigan talab-lar», «Adabiyot» majmualariga qo‘yiladigan talablar» kabi rasmiy-metodik hujjatlarga ham u mualliflik qilgan. Olimning «Adabiy saboqlar 8»9 kitobi umumta’lim maktabla-rining 8-sinf «Adabiyot» darsligidan foydalanish yuzasidan meto-dik qo‘llanmadir. Qo‘llanmada: «O‘qituvchi bu sinfda o‘rganilishi mo‘ljallangan asarlarni o‘quvchilar bilan birgalikda tahlil qi-lishda badiiy matndan kelib chiqadigan ijtimoiy, siyosiy, milliy, ma’naviy mazmundan ham ko‘ra, asarlar estetik xususiyatlarining o‘zlashtirilishiga ko‘proq e’tibor qaratishi shart10 – ekani alohida ta’kidlangan. Q.Yo‘ldoshev badiiy asar tahlilining nazariy-metodik masa-lalari ustida jiddiy izlanishlar olib borib, «Badiiy tahlil asoslari» kitobini yaratdi. Bu asarda tahlil turlari, yo‘nalishlari, tamoyillari va tahlilga qo‘yiladigan talablar tizimi ishlab chiqilgan bo‘lib, bu qarashlar respublika ta’lim muassasalarida adabiyot o‘qitishning yangi bosqichga ko‘tarilishiga turtki beradi. Olim badiiy asar tahlili shaxs va millat ma’naviyatini shakllantirish omili ekaniga alohida e’tibor qaratadi. Butun pedagogik faoliyatini adabiyot o‘qitish metodikasi ilmiga bag‘ishlagan olim filologiya fanlari doktori, professor B. To‘xliyev 1954-yil 11-martda Tojikiston Respublikasi Xo‘jand (hozirgi So‘g‘d) viloyatining Asht tumanidagi O‘zbekoqjar qishlog‘ida tug‘ilgan. U 1983-yilda «Qutadg‘u bilig»ning poeti-kasi» mavzusida nomzodlik, 1992-yilda «Yusuf Xos Hojibning «Qutadg‘u bilig» asari va turkiy xalqlar folklori» mavzusida dok-torlik dissertatsiyasini himoya qilgan.\nOlim o‘z mehnat faoliyatini o‘qituvchilikdan boshlagan. Pro-fessor B.To‘xliyev hozirgacha uch yuzdan ortiq ilmiy ishlar e’lon qilgan. Ular orasida 8ta monografiya, 5ta darslik, 20ta o‘quv qo‘llanma bo‘lib, ular salmoqli ilmiy qimmat kasb etadi.Uning umumiy o‘rta ta’lim maktablari 9-, 10-sinflari va aka-demik litseylarning 1-bosqichi uchun «Adabiyot» (hamkorlikda) darslik va darslik-majmualari, kasb-hunar kollejlari va oliy mak-tab uchun «Pedagogika tarixi» darsligi bugungi ta’lim amaliyotida qo‘llaniladi. Bundan tashqari, olimning oliy ta’limning baka-lavriat hamda magistratura bosqichlari uchun «Adabiyot o‘qitish metodikasi», «O‘zbek tili o‘qitish metodikasi», «Darsliklar ustida ishlash», «Maxsus fanlarni o‘qitish metodikasi» singari bir qator o‘quv adabiyotlari ham nashr etilgan. B. To‘xliyevning Qirg‘iziston Respublikasi umumta’lim maktablari 9-sinfi uchun «O‘zbek ada-biyoti» (hamkorlikda) darslik-majmuasi, oliy o‘quv yurtlarining qoraqalpoq guruhi talabalari uchun «O‘zbek tili» (hammualliflik-da) o‘quv qo‘llanmalari ham chop etilgan.Professor B. To‘xliyevning: «Qadimgi turkiy yozma yodgorligi «Qutadg‘u bilig», «Irq bitig – Qadimiy hikmatlar», «O‘lmas obidalar», «Donolar gulshani» (hammualliflikda), «Yusuf Xos Hojib. «Qutadg‘u bilig», «Bilim – ezgulik yo‘li», «Yusuf Xos Hojib. «Qutadg‘u bilig» to‘rtliklari» (hammuallif), «Hozirgi o‘zbek adabiy tili» darslarida yuksak ma’naviyatli shaxs tarbiyasi» (hammuallif), «Moddiy va ma’naviy hayot uyg‘unligi Yusuf Xos Hojib talqinida» (1-kitob), «Adabiyot o‘qitish metodikasi (amaliy mashg‘ulotlar)», «Til va adabiyot ta’limining zamonaviy texnologiyalari» (hammuallif), «Zahiriddin Muhammad Bobur hayoti va ijodi (Albom-qo‘llanma)», «Alisher Navoiy hayoti va ijodi (Albom-qo‘llanma)», «Yusuf Xos Hojib va turkiy xalqlar folklori»,»Badiiy asarni sharhlab o‘rganish, «Qutadg‘u bilig» (nasriy bayoni) singari ishlari adabiyot o‘qitish ilmi va amaliyoti uchun o‘z munosib hissasini qo‘shib kelmoqda.Professor B. To‘xliyev qalamiga mansub «Adabiyot o‘qitish metodikasi»11 o‘quv qo‘llanmasi filologik yo‘nalishdagi univer-sitetlar va pedagogika oliy o‘quv yurtlari bakalavriat bosqichi tala-balari uchun mo‘ljallangan bo‘lib, u muallif tomonidan yaratilgan yangi o‘quv dasturi, ishchi dastur hamda DTS mazmun-mohiyati, talablari asosida nashrga tayyorlangan. Kitobning yana bir ahami-yatli jihati shundaki, unda XX asrning 60-yillaridan to bugunga qadar adabiyot o‘qitish metodikasi sohasida izlanishlar olib bor-gan, respublika adabiy ta’limi tamal toshini qo‘ygan S. Dolimov, H. Ubaydullayev, Q. Ahmedov, A. Zunnunov singari metodist olimlar faoliyatini o‘zbek metodikasi fani tarixi bilan bog‘lab yoritilgan. Ayni damda muallif mustaqillik yillarida shakllangan Qozoqboy Yo‘ldoshev, Safo Matjon va Marg‘uba Mirqosimova kabi metodist olimlar faoliyatini ham yoritgan. Avlodlar davomiy-ligi, fanning uzviy va uzluksiz rivojida muhim ahamiyat kasb etgan adabiy ta’lim muammolari, fan sohasidagi yangilanishlar ushbu qo‘llanmaning birinchi, ikkinchi va uchinchi fasllarida aks etgan bo‘lsa, keyingi boblarda badiiy asarlarni o‘rganish va o‘quvchilarda badiiy tahlil malakasini shakllantirishning samarali usullariga diqqat qaratilgan. Adabiyot darslarini zamon talablari darajasida tashkil qilish omillari, o‘quvchilarning og‘zaki va yozma nutqini o‘stirish muammolari yaxshi yoritilgan. Olimning «Maxsus fanlarni o‘qitish metodikasi» nomli qo‘llanmasi esa magistratura bosqichi «O‘zbek adabiyoti» muta-xassisligida tahsil oladigan magistrlarga mo‘ljallangan. Kursning maqsad va vazifalarini yoritar ekan muallif quyidagilarni alohi-da ta’kidlagan: «Maxsus fanlarni o‘qitish metodikasi fani badiiy adabiyotning o‘ziga xosligi, paydo bo‘lishi va rivojlanishidagi tarixiy taraqqiyoti jarayonini, hozirgi holatini, muammolarini\no‘rganuvchi, ularni ta’lim oluvchilarga o‘rgatuvchi fanlarning pedagogik imkoniyatlari haqida bahs yuritadi»12. Maxsus fanlarni o‘qitish metodikasi har bir yo‘nalish va mutaxassislik mazmunini o‘zida ifoda qiluvchi kasbiy fanlarni o‘qitish muammolarini qam-rab olishi kerak. Unda umumiy o‘rta ta’lim, akademik litsey, kasb-hunar kollejlari va oliy ta’lim bosqichlarida adabiyot o‘qitishning o‘ziga xosliklari haqida bilim va tushunchalar shakllantirish yo‘llari ko‘rsatilgan. Qo‘llanmada bo‘lajak adabiyot o‘qituvchilariga o‘quv, metodik, tarbiyaviy ishlarni rejalashtirish; bir soatlik mashg‘ulotni rejalashtirish; ma’ruza matnini tuzish; o‘quvchilar mustaqil ish-larini tashkil etish haqida tushunchalar berilgan. Folklor asarlari, mumtoz va yangi o‘zbek adabiyoti namunalarini o‘rganishning sa-marali usullarini yoritgan. Magistrlarning mustaqil ishlari uchun topshiriqlar va ularning mazmuni, tavsiya qilinuvchi adabiyotlar ro‘yxati berilganligi talabalarni ilmiy-ijodiy izlanishlarga, matn bi-lan ishlashga, badiiy asarlarni biografik, struktural, qiyosiy tahlil qilishga yo‘llaydi13. Adabiyot o‘qitish metodikasi sohasidagi mutaxassislar-dan yana biri prof. Marg‘uba Mirqosimova 1960-yilda Toshkent shahrida, ziyoli oilasida tug‘ilgan. 1985-yilda «70 – 80-yillar o‘zbek romanlarining janr va uslub xususiyatlari (O. Yoqubov va P. Qodirov romanlari misolida)» mavzusida nomzodlik, 1995-yilda «O‘quvchilarda adabiy tahlil malakasini shakllantirish va takomil-lashtirish usullari» mavzusida doktorlik dissertatsiyasini himoya qilgan.Olimning hozirgi o‘zbek adabiyoti, adabiyot nazariyasi va o‘zbek adabiyotini o‘qitish metodikasi yo‘nalishlari bo‘yicha ik-kita darslik, bitta monografiya, o‘n beshdan ortiq o‘quv va us-lubiy qo‘llanmalari hamda ikki yuz ellikka yaqin ilmiy maqo-lalari nashr qilingan. Shulardan «Badiiy asar tahlili metodikasi», «O‘quvchilarda adabiy tahlil malakasini shakllantirish va takomil-lashtirish asoslari», «Janr va mahorat» mavzusidagi monografi-yalari, «Badiiy asar tahlili», «Hozirgi adabiy jarayon» kabi o‘quv qo‘llanmalari, «Ta’lim bosqichlarida A. Oripov hayoti va ijodini o‘rganish», «O‘quvchilarda ma’naviyatni yuksaltirishda badiiy asarlar tahlilidan foydalanish», «Hozirgi o‘zbek adabiyoti namu-nalarini sharhlab o‘rganish» singari metodik qo‘llanmalari adabiy ta’lim amaliyoti uchun muhim ahamiyat kasb etadi. «O‘quvchilarda adabiy tahlil malakasini shakllantirish va takomillashtirish asoslari» nomli monografiyasida14 muallif o‘quvchilarda adabiy tahlil ko‘nikmasini shakllantirish va rivojlan-tirishda kutilgan natijalarga erishish uchun uzviylik hamda uzluk-sizlik tamoyiliga tayanish lozimligini ilmiy jihatdan asoslab ber-gan. Olim badiiy tahlilning elementar namunalarini boshlang‘ich sinflardan boshlash kerakligini alohida ta’kidlagan. Bu asarda o‘quvchilarning adabiy tahlil bo‘yicha ko‘nikma va malakalarini shakllantirishning ilmiy-metodik asoslari sifatida yozuvchining ijodiy mahoratini o‘rganish muammosi katta ahamiyat kasb etishi ta’kidlangan. Muallif qarashlarini maktab «Adabiyot» darsliklari-ga kiritilgan Atoyi, Alisher Navoiy va Abdulla Qahhor singari ijodkorlarning hayot yo‘li hamda ijodiy mahorati tadqiqi asosida isbotlagan.Kitobda o‘quvchilarda badiiy asar ustida ishlash ko‘nikmalarini shakllantirishda adabiy-nazariy tushunchalarning o‘rni haqida ham alohida so‘z yuritilgan. Professor M. Mirqosimova o‘zining «Adabiy tahlil metodi-kasi» qo‘llanmasida pedagogik yo‘nalishda tahsil olayotgan tala-balarning kasbiy tayorgarligini oshirishga alohida e’tibor qaratib: «Mustaqil ijodiy izlanishlar chog‘ida o‘quvchilar o‘zaro muloqot-14 M. Mirqosimova. O‘quvchilarda adabiy tahlil malakasini shakllantirish va da bo‘ladilar, tadqiqotlari yuzasidan o‘qituvchiga savollar bilan\nmurojaat etadilar. O‘qituvchi ularning mustaqil izlanishlari qay yo‘sinda ketayotganligidan xabardor bo‘ladi, zarur maslahatlar beradi, o‘quvchilar faoliyatini boshqaradi. Belgilangan muddat yaqinlashgan sayin o‘quvchilarning mustaqil ijodiy izlanishlari ham yakunlanib boradi. O‘qituvchi ularning mustaqil mulohazalari bilan tanishib, zarur o‘rinlarni to‘ldiradi, yakuniy mashg‘ulotni tashkil etadi»15 tarzidagi xulosaga keladi.Marg‘uba Mirqosimova o‘quvchilarning yozuvchi hayoti va ijodiga oid ma’ruzalari, ayrim asarlar yuzasidan referat ishlarini tash-kil etishga oid qator metodik tavsiyalar ham yaratgan. Olim adabi-yot o‘qituvchisi mustaqil ijodiy tadqiqot olib borayotgan o‘quvchilar nimalarga ahamiyat berishlari yuzasidan maslahatlar berishi lozim-ligini ta’kidlaydi. Muallifning fikricha, ular quyidagilardan iborat: «Ijodkor hayotiga oid ma’lumotlar bilan tanishishda tarixiy sha-roit va o‘sha davrdagi adabiy muhitga e’tiborni qara tish; yozuvchi yaratgan asarda zamonasining qanday dolzarb ijtimoiy-ma’naviy masalalari aks etgan va ularga nisbatan ijodkor munosabatini belgi-lash; yozuvchi badiiy mahoratiga badiiylik va haqqoniylik talablari asosida baho berishda xilma-xil asarlarni qiyosiy o‘rganish; ijodkor uslubining shakllanishiga ta’sir etgan adabiy an’analar, ijodiy ta’sir va shaxsiy izlanishlar ahamiyatiga e’tibor berish; yozuvchi hayoti va ijodini yorituvchi adabiyotlardan... foydalanish»16. Olimning adabiyot o‘qitish metodikasiga doir qarashlari fan-ning mazkur sohasi taraqqiyotida o‘ziga xos o‘rin tutadi.Xulosa qilib shuni aytish mumkinki, O‘zbekistonda adabiyot o‘qitish metodikasi fanining rivojiga har bir metodist o‘z bilimi, salohiyati, intellektual imkoniyati doirasida hissasini qo‘shdi, uni yana-da boyitish maqsadida izlanishlar olib bormoqda."}, {"savol_raqami": 2, "savol": "So'z san'ati. Drama haqida ma'lumot bering.", "javob": "So‘z san’atining asosiy turlaridan biri bo‘lgan drama qa-dimgi yunon tilidan olingan bo‘lib harakat, amal-faoliyat degan ma’nolarni anglatadi. Dramatik asarlar, asosan, sahnada ijro etish-ga mo‘ljallangan bo‘lib, suhbat-dialog shaklida yoziladi.Dramatik turga drama, komediya, tragediya (fojea) singari janr-lar mansubdir. Bunday bitiklarda voqelik asarda bevosita ishtirok etuvchi shaxslarning xatti-harakatlari va nutqi orqali ochiladi. Dramatik asarlar sahnaga moslab yoziladi. Yozuvchining fikrlari asarda ishtirok etuvchilarning so‘zi va faoliyati vositasida namoyon bo‘ladi. Lirik yoki epik turdagi asarlarda muallif nuqtai nazari, ba’zan ochiq, ba’zan yashirin-pardali tarzda bildiriladi. Dramatik asarlarda ayni mana shu holatning mavjud emasligi o‘quvchi uchun qo‘shimcha qiyinchiliklarni yuzaga keltiradi. Shunga ko‘ra dramatik asarlarda munosabatlarning o‘ziga xos tarzda aks ettirilishini o‘quvchi yoki tomoshabin ongiga, idrokiga yetkazish masalasi turadi. Sahna asaridagi har bir harakat va har bir so‘zning katta ma’no tashishi o‘quvchi yoki tomoshabinlar tomnidan anglab yetilishi kerak. Buning uchun tahlil jarayonida dramatik asarlarning shu xususiyatlariga alohida urg‘u berishga to‘g‘ri keladi.O‘quvchi yoki tomoshabinga bayon va tasvirlashga xos usul-lar yot bo‘lganidan u personajlar xatti-harakatini, voqealar rivo-jini bevosita tahlil etish imkoniyatiga ega emas. Bunday vazi-falar dialoglar yetakchiligida, monolog, remarka va pauzalar yordamida muayyan vaqt ichida tomoshabin yoki kitobxon ko‘z o‘ngida sodir bo‘layotgan qismatlar shaklida amalga oshiriladi. Har bir voqeaga yo‘nalish beriladi. Dramatik asar tanaffuslar bilan ko‘rsatilganligi sababli, har qaysi qismi parda deb yuritiladi. Parda ichida ko‘rinishlar bo‘ladi. Bir ko‘rishga mo‘ljallanganligi sababli dramatik asar hajman cheklangan bo‘ladi.Dramatik asarlar kompozitsion tuzilish jihatidan boshqa janr-lardagi asarlardan farq qiladi. Shuning uchun drama janri so‘z san’atiga mansub bo‘lsa ham, sahnada ijro etilishi bilan roman va qissa janridan farq qiladi. Dramada har bir obraz o‘z xarakteri-ga xos xislatlarni jonli tili, xatti-harakati orqali nomoyish qiladi. Shunga ko‘ra dramada proza va poeziyaga xos bo‘lgan muallif nutqi bevosita ishtirok etmaydi. «Nasrchi va nazmchilar hikoya qilish, voqealarni izohlash, hodisalarni ifodalash, xarakterlarni tasvirlash yo‘lidan borishsa, dramaturg so‘zlarni harakatga solish, qahramonlarni so‘zlatib qo‘yib, xarakterlarini ochish usulidan foydalanadi»121. Kitobxon yoki tomoshabin dramada sodir bo‘layotgan voqea va qahramonlarni ularning o‘zidan payqab oladi. Binobarin, dramaturg o‘z qahramonlarining hayoti haqida hikoya qilmaydi, balki ularni harakatda ko‘rsatadi.Dramatik asarlarda ohang, pauza va ovozning baland-pastligi katta ahamiyatga ega bo‘lib, nutqning o‘ziga xos bu xususiyati sahnada yorqinroq namoyon bo‘ladi. Dramada dramaturg tashqi voqea-hodisalar, hayotiy masalalar, ishtirok etuvchi shaxslarni o‘z-o‘zini namoyon qilish vositasida aks ettiradi. Har qanday hodisa ham dramatik bo‘lavermaydi.Ta’lim jarayonida o‘quvchi va talabalar bir necha dramatik asarlar bilan tanishadilar. Ular orasida qadimgi Yunon drama-turglarining asarlaridan boshlab, xorijiy mamlakatlardagi adiblar qalamiga mansub bo‘lgan sahna asarlari, o‘zbek dramaturglari bitiklarigacha qamrab olingan. Maqsud Shayxzoda, Said Ahmad, Sharof Boshbekov, Xurshid Davron va hk. adiblarning dramatur-giyasi ham shular jumlasidandir. Dramatik asarlarni tahlil qilishda adabiyotshunoslikdagi mavjud tadqiqotlarga tayanish mumkin. Ayniqsa, Izzat Sulton, N. Mallayev, H. Abdusamatov, B. Imomov, I. G‘afurov, Sh.Rizayevlarning tadqiqotlari bu jihatdan e’tiborlidir. Quyida dramaturg Sharof Boshbekov qalamiga mansub «Temirxotin» komediyasi matni ustida ishlash namunasi tavsiya etiladi.Adabiyotga XX asrning 70-yillarida kirib kelgan Sharof Boshbekov badiiy adabiyotning murakkab turlaridan bo‘lgan dra-maturgiyada ijod qiladi. Shu paytgacha adibning «Taqdir eshigi», «Tikansiz tipratikanlar», «Eski shahar gavroshlari», «Eshik qoqqan kim bo‘ldi?», «Temir xotin», «Tushov uzgan tulporlar», «Charog‘bonlar» kabi dramalari chop etilgan va sahnalashtirilgan. Dramaturgning «Temir xotin» komediyasi hozirgi kungacha to-moshabinlar olqishiga sazovor bo‘lib kelmoqda. Sh. Boshbekov o‘z ijodidagi xususiyatlar haqida gapirib: «Me-ning eng yaxshi ko‘rgan qurolim – yumor. Asar qanday janrda yozilmasin, voqealar qanchalik jiddiy, qahramonlarimning taqdiri qay darajada fojiali bo‘lmasin, yumor, hazil-mutoyiba, askiya un-surlari, so‘z o‘yinlaridan unumliroq foydalanishga harakat qila-man, bu, birinchidan, asarni o‘qishli qiladi, tomoshaviyligini oshi-radi, ikkinchidan, boshqa nuqsonlarni «yopib» ketadi. Masalan, «Temir xotin» asarimda aytiladigan «gap» jiddiy, lekin vaziyat, qahramonlarning so‘zi kulgili yoki aksincha bo‘lishi mumkin», – deb yozadi.Ta’lim amaliyotida dramatik asarlarni o‘rganishda avval ular ning matni bilan tanishish amalga oshiriladi, albatta. Agar imkoni bo‘lsa sahnada ko‘rish, yoki tasmaga yozilgan varianti bilan tani shish juda samarali ish turi hisoblanadi. Chunki sahna asarini sahnada ko‘rish kutilgan natijaning maksimal samarasini ta’minlaydi. Avvalo, Sharof Boshbekov qalamiga mansub «Temir xotin» haqida yumor bilan aytgan jiddiy «gap» haqida mulohaza yuritish kerak bo‘ladi. O‘quvchilarni bu haqiqtni kashf etishga yo‘naltiruvchi ilk savol: «Boshdan oxir yengil yumorga yo‘g‘rilgan, bir oz fantaziya ham aks etgan bu asarda qanday jiddiy gap bo‘lishi mumkin?» tarzida o‘rtaga tashlanadi. Asar mutollasi asnosida hali o‘z taassurotlari ta’siridan chiqib ulgarmagan «yosh sinchi»lar e’tibori avval: birinchi sahna tasviridagi Qo‘chqorning ro‘zg‘origa taalluqli har bir jihozda nimaningdir yetishmasligiga; Qumri obrazining odam, ayol, xotin va ona sifatidagi jamiki xususiyatlariga; Qo‘chqorning: « Bir qarasang, qo‘ylarga qarab «ko‘p tug‘» deydi, bir qarasang, o‘zbekka qarab «kam tug‘» deydi...» iborasiga; uning Olimtoyga qarata: «Xotinlarning qorniga osilguncha paxta teradigan mashinani to‘g‘rila» tarzidagi luqmasiga; «Mana, biz ham «paxta terimiga» degan gapni eshitishimiz bilan hamma ishimizni yig‘ishtirib qo‘yib, dalaga chiqib ketamiz. Bolalarimiz o‘qishini tashlaydi, xotinlarimiz emizikli bolasini...» degan e’tirofiga; «Butun o‘zbekning dardini dasturxon qilib o‘tiribman. Doim shu, bizga o‘xshagan odam gapirsa, yo hech kim eshitmaydi, yo eshitadigani temir chiqadi...» tarzidagi noroziligiga; Qo‘chqorning Alomatga qarata: «Yo‘g‘-e, endi yig‘lashni ham qog‘ozga qarab yig‘lasak, uyat bo‘lar?» kabi so‘zlariga; Alomatning Qo‘chqorga qarata aytgan: «Shu darajaga yetgansizki, bora-bora undaylarga havas ham qilmay qo‘ygansiz! Havas qilaverib, orzu qilaverib, charchagansiz, holdan toygansiz!», «G‘urur, qadr-qimmatingiz-chi? Mundoq o‘ylab ko‘ring, biron tirik jon siz bilan hisoblashadimi? Yo‘q, axir! To‘y-ma’rakalarda poygakda o‘tirasiz» singari achchiq haqiqatlariga; Qo‘chqorning og‘ir hayotidan nolimasligi sababi haqida Alomatning: «Hamma gap shunda-da, nolimaysiz! Ko‘nikib ketgansiz. Yaralar toshga aylangan – og‘riq sezmaydi. Dod solib baqirish-ku, qo‘lingizdan kelmas, hech qursa ingrabqo‘yishga ham qodir emasmisiz, Qo‘ch-qor aka! Qalbingizning unutilib ketgan, o‘zingiz ham bilmaydigan burchaklarida miltillayotgan ushoqqina norozilikdan qo‘rqasiz, uni sezmaslikka olasiz!» tarzidagi izohlariga; Qo‘chqorning xayron bo‘lib: «Xo‘sh, nima ish qilipti! Hali qatorlashtirib bola tuqqani yo‘q, kechalari uyqudan qolib, beshik quchoqlab chiqqani yo‘q,\nhar bir farzandi bilan ming bor kasal bo‘lib, ming bor sog‘aygani ham yo‘q. Bitta o‘zbek ayoli nima ish qilsa, shuning yarmini qildi, xolos...» singari mulohazalarga qaratiladi. Bu haqiqatlarning barchasini o‘quvchilar o‘zlari matndan topishlari kerak. Zamondosh avlod kechagi jamiyatda ustuvor bo‘lgan qishloq hayotining bu kabi turmush tarzini tasavvur qila olmasligi mum-kindir, lekin qishloqlarning buguni ham avlo emasligi hech kimga sir emas. Umuman, sovet davridagi turmush tarzini tasavvur qilish uchun tarbiyalanuvchilar har bir detal, jumla, ibora, luqma va tas-virni tahlilga tortishlari kerak bo‘ladi. O‘qituvchi yuqorida sanal-gan jihatlarni savol va topshiriqqa aylantirishi talab etiladi. Mana shu tahlil asnosida komediyada ilgari surilgan «jiddiy gap»ning mohiyatiga kiriladi. Masalan: «Sahnadagi har jihoz, har bir buyumda nimadir ye-tishmaydi: eshik-deraza romlarining yarmi bo‘yalgan, qolgani-ning rangi o‘chib ketgan, yog‘och karavotning bitta oyog‘i yo‘q, ko‘rpa-yostiqlarga yamoq tushgan, piyolalarning labi uchgan yoki chegalangan, choynakning jo‘mragiga tunuka kiygizilgan» tarzidagi tasvirga diqqat qilinadi va qishloqdagi oddiy oilaning turmushi tasavvur qilinadi. Keyin Qumrining hech qachon, hech narsadan nolimaganiga, arazlab onasinikiga ketayotgan holatida ham eriga achinishiga, qo‘llarining qavargani, kiyimlaridan tappi va kerosin hidi anqib turishi kabi bir qancha xususiyatlariga taya-nib qishloq ayollarining turmush tarzi tasavvur qilinadi. Mual-lif aytmoqchi bo‘lgan jiddiy gapning mohiyatiga kiriladi. Yoki o‘quvchilar Qo‘chqorning: «Bir qarasang, qo‘ylarga qarab «ko‘p tug‘» deydi, bir qarasang, o‘zbekka qarab «kam tug‘» deydi...» iborasiga diqqat qaratsalar, o‘sha davr hukumatining odamlar tur-mush tarzini ko‘tarish, hayotini yaxshilash o‘rniga muhim deb bilgan narsalarga, odam atalmish hilqat qadr-qimmatining paxta, hatto qo‘ydan ham past baholanganiga, juda tasavvur qilolmasa-lar ham, aqllari yetadi va hk. Bundan tashqari, Olimjonning Alo-matning halokati munosabati bilan aytilgan quyidagi iztirobli e’tirofiga ham o‘quvchilarning diqqati qaratiladi: «Ekspluatatsiya! Ertalabdan kechgacha tindirmadingiz-a! Bir minut dam olgani yo‘q, bechora! Yuv, tozala, tik, yama, supur! Bir chaqirim nari-dan suv olib kelib, kir yuvadi! Manavi tezak yoqiladigan la’nati o‘chog‘ingizda ovqat qiladi! Yeb to‘ymaydigan ochofat mollarin-giz bor: ertalabdan kechgacha o‘t ber, suv ber, yem ber! Xamir qo-radi, sigir sog‘adi, kuvi pishadi! E, bu uyingizning ishi tugaydimi, o‘zi! Bundan tashqari, dalaga chiqadi! Ming chanoqqa ming egilib, paxta teradi! Qirq-ellik kilo narsani ko‘tarib, xirmonga olib boradi! Shunaqayam qiynaydimi, Qo‘chqor aka?! Bu do‘zax azob-lariga qanday dosh bersin, qanday chidasin?! (Mehr bilan.) Axir u temir-ku, Qo‘chqor aka, temir. Uni ehtiyot qilish kerak, avaylash kerak. U o‘zini o‘ylamaydi, «qiynalib ketdim» deydigan tili yo‘q. Indamas ekan, deb eshakday ishlataveradimi axir! «Paq» etib joni chiqib ketguncha ezaverish kerakmi?! Yo‘q, yuragi tosh odamsiz, Qo‘chqor aka!»dan ular qishloq ayolining turmush tarzini ma’lum darajada tasavvur qiladilar. Muallif ko‘targan masalaning mohi-yatiga kiradilar. Ayniqsa, qishloq bolalari kundalik hayotida ko‘rib yurgani va shunday bo‘lishi kerakdek qabul qilgani bu ishlarning yukini ma’lum darajada his etadilar.Oddiygina qilib aytilgan «Jiddiy gap» zamirida qancha yuk borligi ma’lum bo‘lgandan keyin tahlil yo‘sini xatti-harakati va gap-so‘zlaridan o‘ta sodda, topqir, gapga chechan, hazil kash, maqtanchoq va boshqa jihatlari bilan qishloq ahlining vakili si-fatida tasvirlangan Qo‘chqor timsoliga qaratiladi. Qo‘chqorning nima uchun ichib kelgani o‘quvchilarga asar matni bilan tanishish asnosida ma’lum darajada ayon bo‘lgan. Dastlab b
