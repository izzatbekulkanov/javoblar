irgalikda mana\nshu holat muhokamaga tortilgani tuzuk. Spirtli ichimlik ichib mast bo‘lish Qo‘chqorga nima beradi? Qo‘chqorning o‘z hayotidan noroziligini qaysi sahnalarda ko‘rish mumkin? Bu kabi savollar har qanday o‘qirmanni matn mohiyatiga qayta-qayta murojaat qilishga undaydi. Ko‘rinadiki, Qo‘chqor ertayu kech tinim bilmay ishlay-di, lekin biri ikki bo‘lmaydi. Chunki u eng kam haq to‘lanadigan ishchi kuchi. Qancha ishlagani bilan qo‘li pul ko‘rmaydi. Erkak kishi bo‘la turib oilasining, hech bo‘lmasa, moddiy ehtiyojlarini qondirolmaydi, o‘zining otalik, erkaklik burchlarini bajarolmaydi. Sirtdan qaraganda bularga e’tibor bermagandek ko‘ringani bilan ruhan iztirobda yashaydi, shuning alamidan bir oz bo‘lsada qutu-lish uchun ichadi. Bu unga hech qanday yordam berolmaydi, faqat bir-ikki soatga shu iztoroblarini unutadi, ozgina chalg‘iydi, xolos. Aslida, uning boshqa yo‘li ham yo‘q, qo‘lidan hech narsa kelmay-di. U shunday yashashga mahkum bo‘lgan shaxs timsoli.O‘quvchilar Qo‘chqorning nutqi va so‘zlash tarzi asosida uning ichki dunyosini ochishga urinib ko‘rganlari ma’qul. Uning nutqidan ma’lum darajada yumorga moyilligini, anchagina bilimsizligini, ayni zamonda, o‘zining darajasida nimalardandir xabardorligini va nelarnidir bilishga ozgina moyilligi borligini ham payqash mumkin. Uning Olimjonga o‘z uyidan joy bergani mana shu bilishga bo‘lgan ehtiyojining o‘ziga yarasha bir ko‘rinishi. Bo‘lmasa, jo‘jabirday jon, bolalarining qornini zo‘rg‘a to‘ydirib, ustini baholi qudrat butlab yashayapti. Lekin bag‘rikeng. Qo‘chqor «ko‘p o‘qishi» bilan maqtanganda, erining ahvolini juda yaxshi bilgani holda ayolining nega rostini aytmay so‘z o‘yini qilganlari lavhasiga o‘quvchilarning diqqati qaratiladi. O‘zbek ayoli, eri qanday bo‘lishidan qat’i nazar, uni «pir» deb bilishi, o‘zi qanchalar og‘ir mehnat ostida ezilganiga qaramay erini ayashi, unga achinishi o‘ta samimiy aks ettirilgan. Mazkur vaziyatlarda o‘quvchilar o‘z onalari timsolini ko‘radilar.Olimjon bilan suhbatda Qo‘chqorning: «Bir qarasang, qo‘ylarga qarab «ko‘p tug‘» deydi, bir qarasang, o‘zbekka qarab «kam tug‘» deydi...», – degan gapi zamiridagi tagma’noga o‘quvchilarning diqqati qaratiladi. Bu gap, asli, yuqoridagi «jid-diylik»ning bir ko‘rinishi sifatida keltirilgan. Endi uning mo-hiyatiga kiriladi. Nega qo‘y bilan o‘zbek timsollari yonma-yon keltirilayotganligini tushuntirishga uriniladi. Gap shundaki, so-vetlar zamonida mamlakatimiz paxta, ipak, qorako‘l va hk. qimmatbaho xom ashyolarni yetishtirib beradigan respublika deb qaralgan. Bu mahsulotlar uchun juda-juda kam haq to‘langan. Shuning uchun na dehqonning, na chorvadorning, na pillakorning kosasi oqarmagan. Lekin hech kim xuddi Qo‘chqorga o‘xshab hech qachon hayotidan nolimagan, boriga shukur qilib yashayvergan. Chunki, xalq qishlog‘idan chiqmasa, boshqalar qanday yashayot-ganini bilmasa, atrofidagi hamqishloqlarining bir-biridan deyarli farqi bo‘lmasa odamzodning nima deb e’tiroz bildirishga ham aqli yetmaydi-da. Shunday bo‘lgach qo‘ydan farqi bo‘ladimi, odam-ning. Masalan, hozir Afrikada yoki Junglida yashayotgan odamlar ham xuddi shunday… Olimjonning robotni maqtab: «U faqat ishlaydi! Ishlayveradi, ishlayveradi, ishlayveradi!» degani bilan Qo‘chqorning: «Biz ham ishlayveramiz...», degani zamiridagi haqiqatni anglashga urinib ko‘ring» topshirig‘i berilganda o‘quvchilar o‘ylashi mumkin: to‘g‘ri, hamma jamiyatda, hamma zamonda, hamma odam ham ishlaydi. Odam mehnat qilmasa, turmush tarzi yaxshilanmaydi. Hayotda mehnat qilmay hech narsaga erishib bo‘lmaydi. Barcha muvaffaqiyatlarning garovi halol mehnatdir. Lekin gap shundaki, robotning ishlayverishi bilan odamning ishlayverishi orasida farq bor. Odam Allohning eng aziz yaratig‘i sifatida mehnatiga yara-sha yashashi, madaniy dam olishi, o‘qib o‘rganishi, dunyo ko‘rishi\nkerak. Farzandlar tarbiyalashi kerak. Buning uchun unga bilim, keng dunyoqarash, baland saviya kerak bo‘ladi. Ma’naviy kamo-lot sari intilish ehtiyoji bo‘lmog‘i muhimdir. U jamiyatni tebrata-digan kuch. Mehnat insonni ezishi mumkin emas. Yana muhim bir jihat shundaki, odam mehnatidan zavq ola bilishi zarur. Shunday asoslarga qurilgan mehnatgina odamni mukammallashtiradi. Aks holdagi mehnat odamni qullikka mahkum etadi. O‘quvchilarning tafakkur yo‘nalishi mana shularga qaratilsa, ta’lim jarayonidan ku-tilgan samaraga erishish mumkin.Qo‘chqor tilidan aytilgan: «… Doim shu, bizga o‘xshagan odam gapirsa, yo hech kim eshitmaydi, yo eshitadigani temir chiqadi...» tarzidagi noroziligi qanday ijtimoiy ma’noga ega deb bilasiz?» tarzidagi savol ustida o‘ylash bilan o‘quvchilar drama-turg nimalarni nazarda tutgani haqida izlanadilar. Mazkur asarda sovetlar zamonidagi oddiy mehnatkash xalqning holati aks et-tirilgan va Qo‘chqorning gapida jon bor. Jamiyatning eng quyi pog‘onasi bo‘lgan paxtakor yoki chorvador xalqning turmush tarzi, xohish-intilishlari bilan hech kim qiziqmagan. Ularga xom ashyo yetkazib beradigan ishchi kuchi deb qaralgan xolos. Dramaturg Qo‘chqorning tilidan mana shu haqiqatni anglatishga harakat qil-gan. O‘quvchilar komediyadagi Alomat obraziga o‘z munosabat-larini bildirsinlar. Dramaturg qishloqdagi haqiqiy holatni, qishloq ayollarining turmush tarzini aks ettirishda «temir xotin» obra-zidan qanday foydalangani haqida mulohaza yuritsinlar. Shu as-noda Alomat bilan Qumri o‘rtasidagi o‘xshash va farqli jihatlarga o‘quvchilarning diqqati qaratiladi. Qo‘chqorning: «Qumri bilan desangiz, jim o‘tirib ham gaplashaverardik. Ichimizda», degan gap lari bu holni izohlashga asos bo‘ladi. Inson insonni, ayniqsa o‘n olti yil birga yashagan yostiqdoshini tuyishi tabiiy hol. Chunki qan-day yashashidan qat’i nazar, insonda ko‘ngil bor, mehr, muhabbat singari tuyg‘ulari bor. Ularni bir-birlari bilan bog‘lab turadigan bir olam ismli-ismsiz hislar bor. Qo‘chqorning Alomat bilan «chiqi-shib» ketolmayotganining boisi ham shundandir. O‘quvchilar o‘ylab ko‘rishsin, o‘z haqiqatlarini o‘rtoqlashishsin. Qo‘chqorning: «Qumrining qo‘llari qadoq bosib, yorilib ketgan bo‘lsayam, bir nimasi bor edi-da... O‘sha nima ekan-a? Bo‘lmasam, barmoqlarini ko‘sak tilib, g‘adir-budur qilib tash-lagan. Qo‘lidan doim kir sovun aralash tappi hidi kelib turadi. Lekin nimasidir bor edi...» tarzidagi nadomati o‘quvchilarning nazaridan chetda qolmasligi kerak. Ular o‘sha «nimadir»ni o‘ylab ko‘rishsin. Shu nimadir yuqorida aytilgan fikrlar bilan bog‘liq. Buni o‘quvchilarning o‘zlari kashf etganlari maqsadga muvofiq bo‘ladi. O‘quvchilar asardagi: «G‘urur, qadr-qimmatingiz-chi? Mun-doq o‘ylab ko‘ring, biron tirik jon siz bilan hisoblashadimi? Yo‘q, axir! To‘y-ma’rakalarda poygakda o‘tirasiz» singari achchiq gap-larga Qo‘chqorning vaziyatidan kelib chiqib munosabat bildirish-sin. Bu gaplarning qanchalik haqiqatga yaqinligi haqida o‘ylab ko‘rishsin. Nima deb o‘ylasharkin, Qo‘chqorda rostdan ham hechqanday g‘urur, qadr-qimmat yo‘qmi? Agar bor bo‘lsa, ular nima-larda ko‘rinishini asardan misollar keltirib ko‘rsatishga harakat qi-lishsin. O‘z ruhiyatlarini taftish qilishsin, ichlarida Qo‘chqorga nis-batan qanday hislar paydo bo‘ldiykin? Bu tuyg‘ularni nomlashga urinib ko‘rishsin. Bularning barchasi ularda shaxslik sifatlarining shakllanishiga ko‘maklashadi. O‘quvchilar Qo‘chqorning hayotidan hech nolimasligi sa-bablari haqida o‘ylab ko‘rishsin. Alomatning: «Hamma gap shun-da-da, nolimaysiz! Ko‘nikib ketgansiz. Yaralar toshga aylangan – og‘riq sezmaydi. Dod solib baqirish-ku, qo‘lingizdan kelmas, hech qursa ingrab qo‘yishga ham qodir emasmisiz, Qo‘chqor aka! Qalbingizning unutilib ketgan, o‘zingiz ham bilmaydigan bur-\nchaklarida miltillayotgan ushoqqina norozilikdan qo‘rqasiz, uni sezmaslikka olasiz!» degan gaplarini asoslashga urinib ko‘rishsin. Buning uchun matnga murojaat qilish shart emas. Bu borada har bir o‘quvchining matn mazmunidan kelib chiqqan o‘z xulosasi bo‘ladi. Shunda ular mazkur asarning komediyadan ko‘ra muhim-roq bir jihatlari borligini anglab yetadilar. Bunday vaziyatdan chi-qish uchun Qo‘chqor nima qilishi mumkinligi haqida ham o‘ylab ko‘rishsin. Muammoning yechimini topishga urinib ko‘rishsin. Balki bu borada biror jo‘yali fikr chiqmas, lekin asarga munosabat-lari o‘zgarishi aniq. Endi asarni qayta tomosha qilganda avvalgidek kula olmasliklari tayin. Yana bularning ustiga «Davron suraylik» ashulasining berilishi o‘quvchilarning ruhiyatiga bir mubham-lik, og‘riq soladi. Bu ham asar muallifining topqirligi, odamlarni o‘ylashga undash yo‘lidagi bir izlanishidir. Olimjonning: «Axir u temir-ku, Qo‘chqor aka, temir. Uni ehti-yot qilish kerak, avaylash kerak. U o‘zini o‘ylamaydi, «qiynalib ketdim» deydigan tili yo‘q. Indamas ekan, deb eshakday ishlata-veradimi axir!» tarzidagi noroziligi ham o‘quvchilarning diqqati-dan chetda qolmasligi kerak. Olim o‘zining yaratig‘i bo‘lmish ro-botni ayayapti. Lekin jamiyat o‘z a’zolarini ayash kerakligi haqida o‘ylab ham ko‘rmayapti. O‘quvchilar mana shular haqida mulo-haza yuritishlari kerak, muallif tomoshabin va o‘quvchilarnining e’tiborini shularga qaratmoqchi bo‘lgan. Tarbiyalanuvchilar temir xotin Alomat bilan o‘zbek ayollari hayotini solishtirib ko‘rishga un-dalishi kerak. Alomatning halokati sabablari borasida o‘ylayotgan Qo‘chqorning quyidagi mulohazalariga ularning e’tibori qaratiladi: o‘sh, nima ish qilipti! Hali qatorlashtirib bola tuqqani yo‘q, ke-chalari uyqudan qolib, beshik quchoqlab chiqqani yo‘q, har bir farzandi bilan ming bor kasal bo‘lib, ming bor sog‘aygani ham yo‘q. (Hayron.) Bitta o‘zbek ayoli nima ish qilsa, shuning yarmini qildi, xolos...». Qo‘chqorning hayron bo‘lishi, o‘zining ayoli qilayotgan mehnatning yarmisinigina bajarib tutab ketgan temirga ajablanishi o‘quvchilarni o‘ylashga undashi kerak. Demak, inson temirdan qudratli. Lekin bu qudrat nazokat ramzi bo‘lgan ayolni maydalab yo‘q qilib borayotgani muallifni iztirobga solgan. Komediyaning: «Yana o‘ynaylik, yana kuylaylik, iqbolimiz porloq ekan, davron suraylik» qo‘shig‘i bilan yakunlanishi o‘z ahvolini, turmushini taftish va tahlil qila olmaslik, o‘zining aslida qanday hayot kechirayotganligini bilmaslik, jamiyat ahlida mus-taqil fikr va munosabatning yo‘qligidan dalolat beradi. Bu insonga xos bo‘lgan eng kechirib bo‘lmaydigan nuqson ekanini o‘quvchilar o‘ylab ko‘rishlari adabiy ta’limning maqsadiga muvofiq keladi. Haqiqatdan ham, kechagi jamiyatda, o‘tgan asrning 60 – 70-yil-larida shunday qo‘shiq bor edi. Uning so‘zini ham kimdir yozgan, yana kimdir kuy bastalagan, kimlardir ijro etgan. Ko‘rinadiki, mil-latning ziyolilari ham shunday fikrlashgan yoki bori haqiqatni bila turib shunday yozishga va kuylashga majbur bo‘lishgan. Xullas, «Temir xotin» komediyasi kulgidan ko‘ra o‘ylashga, komedi-yadan ko‘ra fojeaga, ya’ni hayotiy fojeani kulgi orqali ifodalashga yo‘naltirilgan asardir."}], "12": [{"savol_raqami": 1, "savol": "Adabiyot darslarida muammoli tahlil nima?", "javob": "Adabiyot darslarida muammoli tahlil — badiiy asarni tayyor xulosa asosida emas, balki savol va muammolar orqali o‘quvchilarning mustaqil fikrlashini rivojlantirib o‘rganish usulidir. Bu usulda o‘qituvchi asardagi voqea, obraz yoki g‘oyani muammo sifatida qo‘yadi va o‘quvchilar fikr yuritish orqali xulosaga keladilar.Masalan, oddiy tahlilda o‘qituvchi:“Asar qahramoni jasur inson”deb tayyor fikr aytadi.Muammoli tahlilda esa:“Qahramonning bu harakatini jasorat deb baholash mumkinmi?”kabi savol qo‘yiladi.Shunda o‘quvchi matnni dalillar bilan tahlil qiladi, o‘z qarashini himoya qiladi.Muammoli tahlilning asosiy xususiyatlario‘quvchini mustaqil fikrlashga undaydi;bahs va munozara yuzaga keltiradi;asarning yashirin ma’nolarini ochishga yordam beradi;ijodiy va tanqidiy tafakkurni rivojlantiradi;o‘quvchini matn bilan faol ishlashga o‘rgatadi.Adabiyot darsida qo‘llanish usullari1. Muammoli savollar berishO‘qituvchi asar yuzasidan bahsli savollar beradi.Masalan:Nega qahramon aynan shunday yo‘l tutdi?Asardagi fojiaga kim sababchi?Muallif qaysi g‘oyani ilgari surmoqda?2. Obrazlarni qiyoslashQahramonlarning xarakteri va qarashlari taqqoslanadi.Masalan:Ikki qahramondan qaysi biri haqiqatga yaqin?Kimning qarori to‘g‘riroq?3. Vaziyatli tahlilO‘quvchilar o‘zlarini qahramon o‘rniga qo‘yib fikr bildiradilar.Masalan:“Siz qahramon o‘rnida bo‘lsangiz qanday yo‘l tutardingiz?”4. Bahs-munozara tashkil qilishSinf guruhlarga bo‘linib, turli nuqtai nazarni himoya qiladi.Bu usul:nutq madaniyatini,fikrni asoslashni,dalil bilan gapirishni rivojlantiradi.Muammoli tahlilning afzalliklaridarsni qiziqarli qiladi;o‘quvchi faolligini oshiradi;matnni chuqur anglashga yordam beradi;mustaqil xulosa chiqarishga o‘rgatadi;adabiyotga qiziqishni kuchaytiradi."}, {"savol_raqami": 2, "savol": "Case study (keys, vaziyatli tahlil) metodi haqida ma'lumot bering.", "javob": "Case study (“keys”, “vaziyatli tahlil”) — ta’lim jarayonida aniq bir muammo yoki hayotiy vaziyatni tahlil qilish asosida o‘qitish metodidir. Bu metodda o‘quvchilar tayyor nazariyani yodlashdan ko‘ra, muammoni hal qilish orqali bilim oladilar.Case study metodining mohiyati“Case” inglizcha “vaziyat”, “holat” degan ma’noni bildiradi. Metodning asosiy mazmuni — o‘quvchilarga real yoki shartli vaziyat berilib, ular shu vaziyatni:tahlil qiladi,sabablarini aniqlaydi,yechim taklif qiladi,o‘z fikrini asoslaydi.Bu usul ayniqsa:adabiyot,pedagogika,huquq,iqtisod,tibbiyot,menejmentfanlarida keng qo‘llanadi.Case study metodining maqsadimustaqil fikrlashni rivojlantirish;muammoli vaziyatni tahlil qilishga o‘rgatish;qaror qabul qilish ko‘nikmasini shakllantirish;nazariy bilimni amaliyot bilan bog‘lash;muloqot va bahs madaniyatini rivojlantirish.Case study metodining bosqichlari1. Vaziyat bilan tanishtirishO‘qituvchi muammo yoki voqeani bayon qiladi.Masalan:“Asar qahramoni og‘ir tanlov oldida qoldi. Uning qarori to‘g‘rimi?”2. Muammoni aniqlashO‘quvchilar asosiy masalani topadilar.Masalan:Muammo nimada?Mojaroga nima sabab bo‘lgan?3. Tahlil qilishVaziyatning sabablari va oqibatlari o‘rganiladi.4. Yechim taklif qilishHar bir guruh yoki o‘quvchi o‘z qarorini bildiradi.5. Xulosa chiqarishEng maqbul yechim muhokama qilinadi.Adabiyot darsida case study metodiga misolMasalan, Oʻtkan kunlar asarini o‘rganishda:Case:Otabek eski urf-odatlar bilan zamonaviy qarashlar o‘rtasida qoladi.Savollar:Otabekning qarorlari to‘g‘rimi?U boshqacha yo‘l tutishi mumkinmidi?Jamiyatning ta’siri qanday bo‘lgan?O‘quvchilar shu vaziyatni tahlil qilib, dalillar asosida fikr bildiradilar.Case study metodining afzalliklario‘quvchini faol ishtirokchiga aylantiradi;ijodiy va tanqidiy fikrlashni rivojlantiradi;jamoada ishlashga o‘rgatadi;nutq va fikrni asoslash ko‘nikmasini kuchaytiradi;nazariy bilimning amaliy ahamiyatini ko‘rsatadi.Kamchiliklariko‘p vaqt talab qiladi;barcha o‘quvchilar birdek faol bo‘lmasligi mumkin;o‘qituvchidan puxta tayyorgarlik talab etadi."}], "13": [{"savol_raqami": 1, "savol": "Adib hayoti va ijodining ilmiy bayoni deganda nima tushuniladi?", "javob": "Adib hayoti va ijodining ilmiy bayoni deganda nima tushuniladi?Adib hayoti va ijodining ilmiy bayoni — yozuvchi yoki shoirning hayoti, faoliyati va asarlarini ilmiy asosda o‘rganib, aniq dalillar bilan tahlil qilishdir.Bu jarayonda quyidagilar o‘rganiladi:adibning tug‘ilgan joyi va davri;oilasi va tarbiyasi;ta’lim olishi;yashagan muhitining unga ta’siri;ijod boshlanishi;yozgan asarlarining mazmuni va g‘oyasi;adabiyotdagi o‘rni va ahamiyati.Ilmiy bayonning asosiy xususiyatlari:Aniqlik — ma’lumotlar ishonchli manbalarga asoslanadi.Tahliliy yondashuv — faqat voqealar aytilmaydi, balki sabab va natijalar ham tushuntiriladi.Xolislik — shaxsiy fikrdan ko‘ra dalillarga tayaniladi.Izchillik — hayot va ijod ketma-ketlikda bayon qilinadi.Misol:Masalan, Alisher Navoiy hayoti haqida ilmiy bayonda:uning Hirotda tug‘ilgani,davlat arbobi bo‘lgani,turkiy til rivojiga qo‘shgan hissasi,“Xamsa” asarining ahamiyatiilmiy dalillar bilan tushuntiriladi.Adib hayoti va ijodining ilmiy bayoni — yozuvchi hayoti va asarlarini ilmiy asosda o‘rganishdir."}, {"savol_raqami": 2, "savol": "Maxsus va kreativ kompetensiyalar haqida ma'lumot bering.", "javob": "Maxsus va kreativ kompetensiyalar haqida ma’lumotMaxsus kompetensiyaMaxsus kompetensiya — insonning ma’lum bir soha bo‘yicha bilim, ko‘nikma va malakalarni egallashi va amalda qo‘llay olish qobiliyatidir.Bu kompetensiya kasb yoki fan bilan bog‘liq bo‘ladi.Misollar:o‘qituvchining dars o‘tish mahorati;shifokorning tashxis qo‘yishi;filologning badiiy asarni tahlil qilishi.Maxsus kompetensiyaning tarkibi:nazariy bilim;amaliy ko‘nikma;tajriba;muammoni hal qilish qobiliyati.Ahamiyati:kasbiy muvaffaqiyatni oshiradi;insonni o‘z sohasida yetuk mutaxassis qiladi.⸻Kreativ kompetensiyaKreativ kompetensiya — yangi g‘oya yaratish, noodatiy fikrlash va muammolarga ijodiy yechim topish qobiliyatidir.Bu kompetensiya insonning ijodkorligini namoyon qiladi.Kreativ kompetensiyaga xos jihatlar:erkin fikrlash;yangicha yondashuv;tasavvur kengligi;innovatsion g‘oyalar yaratish.Misollar:o‘qituvchining qiziqarli metod bilan dars o‘tishi;yozuvchining yangi obraz yaratishi;dizaynerning noodatiy loyiha ishlab chiqishi.Ahamiyati:insonni boshqalardan ajratib turadi;rivojlanish va yangilik yaratishga yordam beradi;zamonaviy ta’limda muhim hisoblanadi.FarqiMaxsus kompetensiyaKreativ kompetensiyaSoha bo‘yicha bilim va malakaYangicha fikrlash qobiliyatiKasbiy tajribaga asoslanadiIjodkorlikka asoslanadiAniq vazifani bajaradiYangi usul va g‘oya yaratadiMaxsus kompetensiya — kasbiy bilim va malaka.Kreativ kompetensiya — ijodiy va yangicha fikrlash qobiliyati."}, {"savol_raqami": 3, "savol": "Badiiy asar tahlili (epik, lirik, dramatik)", "javob": "Badiiy asar tahlili (epik, lirik, dramatik)Badiiy asar tahlili nima?Badiiy asar tahlili — asarning mazmuni, g‘oyasi, obrazlari, tili va badiiy xususiyatlarini chuqur o‘rganishdir.Tahlilda quyidagilar ko‘rib chiqiladi:mavzu;g‘oya;syujet;obrazlar;til va uslub;badiiy vositalar.Badiiy asarlar uch turga bo‘linadi:⸻A) Epik asar tahliliEpik asar nima?Voqea-hodisalar hikoya qilish asosida tasvirlangan asarlar epik asar deyiladi.Misollar:roman,qissa,hikoya,doston.Masalan:O‘tkan kunlarEpik asarda tahlil qilinadi:Syujet — voqealar rivoji.Kompozitsiya — asar tuzilishi.Qahramonlar obrazi.Konflikt — qarama-qarshiliklar.Muallif g‘oyasi.Epik asarning xususiyati:voqeaband bo‘ladi;qahramonlar ko‘p bo‘lishi mumkin;hayot keng tasvirlanadi.⸻B) Lirik asar tahliliLirik asar nima?Shoirning his-tuyg‘u, kechinma va ruhiy holati ifodalangan asar lirik asar deyiladi.Misollar:she’r,g‘azal,ruboiy.Masalan:Xazoyin ul-maoniyLirik tahlilda:Lirik qahramon hissiyoti;Kayfiyat;Tasvir vositalari;Qofiya va ritm;Shoir g‘oyasi o‘rganiladi.Lirik asarning xususiyati:his-hayajon kuchli bo‘ladi;hajmi qisqaroq bo‘ladi;tuyg‘ular markazda turadi.⸻C) Dramatik asar tahliliDramatik asar nima?Sahna uchun yozilgan, dialog va harakat asosidagi asarlar dramatik asar deyiladi.Misollar:drama,tragediya,komediya.Masalan:HamletDramatik tahlilda:Dialoglar;Konflikt;Qahramon xarakteri;Sahna harakatlari;Asarning g‘oyasi tahlil qilinadi.Dramatik asarning xususiyati:voqealar sahnada namoyish etiladi;dialog asosiy o‘rinda turadi;konflikt kuchli bo‘ladi.Badiiy asar tahlili esa asarning mazmuni va badiiy xususiyatlarini chuqur o‘rganish bo‘lib, epik, lirik va dramatik turlarga bo‘linadi."}], "14": [{"savol_raqami": 1, "savol": "Epik asar tahlilining asosiy bosqichlari. Nasriy asarlarni tahlil qilish.", "javob": "Epik asar tahlilining asosiy bosqichlari:Asar mavzusi va g‘oyasini aniqlash: Asarda ko‘tarilgan asosiy muammo va muallifning maqsadini tushunish.Qahramonlar tahlili: Obrazlarning xarakteri, ularning harakatlari va ichki dunyosini o‘rganish.Syujet va kompozitsiya: Voqealar rivoji (ekspozitsiya, tugun, kulminatsiya, yechim)ni tahlil qilish.Muallif uslubi va til xususiyatlari: Yozuvchining badiiy tasvir vositalaridan (o‘xshatish, metafora) foydalanish mahoratini baholash. Nasriy asarlarni tahlil qilish — asarning mavzusi, g‘oyasi, qahramonlar xarakteri, syujet chizig‘i va muallif uslubini o‘rganish orqali uning badiiy-estetik qiymatini ochib berish jarayonidir. Tahlil asar mazmunini tushunish, yozuvchi mahorati va adabiy an’analarni aniqlashga yordam beradi. Tahlil davomida kalit so‘zlar, interfaol metodlar va zamonaviy yondashuvlardan foydalaniladi. Tahlil metodlari:Blum taksonomiyasi: Bilish, tushunish, qo‘llash, tahlil qilish, sintez va baholash bosqichlari orqali chuqur o‘rganish.Interfaol metodlar: \"Aqliy hujum\", \"Klaster\", \"Venn diagrammasi\" kabi usullar orqali o‘quvchi/talabalarni ijodiy fikrlashga undash.Komponentli tahlil: Matnni kalit so‘zlar va tayanch tushunchalar orqali tahlil qilish. Bu usullar orqali epik asarning g‘oyaviy-badiiy xususiyatlari to‘liq ochib beriladi."}, {"savol_raqami": 2, "savol": "14-bilet 2-savol", "javob": "Javob mavjud emas"}], "15": [{"savol_raqami": 1, "savol": "Metodik va ekstremal kompetensiyalar haqida ma'lumot bering.", "javob": "Metodik kompetensiya — mutaxassisning o‘z sohasiga oid pedagogik, ilmiy va amaliy usullarni (metodlarni) mukammal egallagani va ularni ta’lim jarayonida samarali qo‘llay olish qobiliyatidir. Ekstremal kompetensiyaesa kutilmagan, favqulodda va stressli vaziyatlarda (ekstremal sharoitlarda) tezkor, to‘g‘ri qaror qabul qilish va xavfsizlikni ta’minlash qobiliyatini anglatadi. Metodik kompetensiyaBu tushunish ko‘proq pedagoglar, o‘qituvchilar va murabbiylar faoliyatida yaqqol namoyon bo‘ladi. U quyidagi asosiy xususiyatlarni o‘z ichiga oladi: Ta’lim texnologiyalarini qo‘llash: Dars jarayonida zamonaviy pedagogik va axborot texnologiyalaridan (AKT) unumli foydalanish. Dars loyihalashtirish: O‘quv rejalari, dasturlarini ishlab chiqish va darsni tizimli rejalashtirish. Bilimlarni yetkazish: Murakkab nazariy mavzularni o‘quvchilar tushunadigan oddiy va qiziqarli usullarga (interfaol metodlar) o‘gira olish. Ekstremal kompetensiyaBu turdagi kompetensiya odatda favqulodda vaziyat xodimlari, shifokorlar, huquqni muhofaza qiluvchi organlar va ekstremal sharoitda ishlaydigan mutaxassislar uchun juda muhimdir. U quyidagi muhim jihatlarni o‘zida jamlaydi: Stressga chidamlilik: Kuchli psixologik bosim ostida o‘zini yo‘qotmaslik va xotirjamlikni saqlab qolish.Tezkor qaror qabul qilish: Vaqt tanqisligi yoki xavfli vaziyatlarda optimal va to‘g‘ri harakat rejasini tanlash.Favqulodda vaziyatlarni boshqarish: Kutilmagan hodisalarni (yong‘in, texnogen falokat, tibbiy shok holatlari) bartaraf etish bo‘yicha amaliy ko‘nikmalarni ishga solish. Farqi va bog‘liqligiMetodik kompetensiya – odatiy va rejalashtirilgan jarayonlarda (masalan, o‘quv xonasida) yuqori samaradorlikni kafolatlaydi.Ekstremal kompetensiya – noan’anaviy, xavfli yoki shoshilinch vaziyatlarda muvaffaqiyatli harakat qilishni talab qiladi."}], "16": [{"savol_raqami": 1, "savol": "Brainstorming va Keys Study metodlari haqida ma'lumot bering.", "javob": "Brainstorming va Keys Study metodlari haqida maʼlumot bering.\"Brainstorming\" , yaʼni-aqliy hujum metodi – biror muammo bo'yicha ta'lim oluvchilar tomonidan bildirilgan erkin fikr va mulohazalarni to'plab, ular orqali ma'lum bir yechimga kelinadigan usuldir. \"Aqliy hujum\" usulining yozma va og'zaki shakllari mavjud.Og'zaki shaklida ta'lim beruvchi tomonidan berilgan savolga ta'lim oluvchilarning har biri o'z fikrini og'zaki bildiradi. Ta'lim oluvchilar o'z javoblarini aniq va qisqa tarzda bayon etadilar. Yozma shaklida esa berilgan savolga ta'lim oluvchilar o'z javoblarini qog'oz kartochkalarga qisqa va barchaga ko'rinarli tarzda yozadilar: Javoblar doskaga (magnitlar yordamida) yoki «pinbord» doskasiga (ignalar yordamida) mahkamlanadi. \"Brainstorming\" usulining yozma shaklida javoblarni ma'lum belgilar bo'yicha guruhlab chiqish imkoniyati mavjuddir. Ushbu usul to'g'ri va ijobiy qo'llanilganda shaxsni erkin, ijodiy va nostandart fikrlashga o'rgatadi \"Brainstorming\" metodining afzalliklari: -natijalar baholanmasligi ta'lim oluvchilarda turli fikr-goyalarning tug'ilishiga olib keladi -ta'lim oluvchilarning barchasi ishtirok etadi; -Fikr va g'oyalar vizuallashtirib boriladi -ta'lim oluvchilarning boshlang'ich bilimlarini baholash imkoniyati bo'ladi; -ta'lim oluvchilarda mavzuga qiziqish uyg'onadi.\"Keys study\" metodi Keys-study ta'lim oluvchilarni o'rganilayotgan muammoni ifodalash hamda uning maqsadga muvofiq yechimi variantlarini izlashga yo'naltiradigan aniq real yoki sun'iy ravishda yaratilgan vaziyatning muammoli-vaziyatli tahlil etilishiga asoslanadigan ta'lim metodidir.Bunda oʻrtaga muammoli vaziyat tashlanadi va oʻquvchilar bilan birga muhokama qilinadi va javoblar baholanmasdan eng maqbul javoblar tanlab olinadi."}, {"savol_raqami": 2, "savol": "Kreativ va innovatsion kompetensiyalar haqida ma'lumot bering.", "javob": "Kreativ va innovatsion kompitensiyalar haqida maʼlumot bering.Kompitensiya-soʻzi layoqat degan maʼnoni anglatadi va u bir necha turlarga boʻlinadi. Shulardan kreativ kompitensiya:–oʻzining pedagogik faoliyatiga nisbatan tanqidiy yondashish, tanqid asosida oʻzidagi kamchilikni bartaraf etish demakdirInnovatsion kompitensiya:–pedagogik jarayonni takomillashtirish, taʼlim sifatini yaxshilash, tarbiya samaradorligini oshirishga doir yangi gʻoyalarni ilgari surish va uni amalga oshirishdir."}, {"savol_raqami": 3, "savol": "Badiiy asar tahlili (epik, lirik, dramatik)", "javob": "Badiiy asar tahlili (epik, lirik, dramatik)Badiiy asar tahlili uning qaysi adabiy turga (epik, lirik, dramatik) mansubligiga qarab o‘ziga xos yondashuvni talab qiladi. Har bir turning tabiati turlicha bo‘lgani uchun, ularni tahlil qilish mezonlari ham farqlanadi. 1. Epik asarlar tahlili (Hikoya, qissa, roman)Epik asarlarda hayotiy voqea-hodisalar, qahramonlar taqdiri va obrazlar tizimi yetakchi o‘rin tutadi.Mavzu va g‘oya: Asarda nima haqida gap boradi (mavzu) va muallif bu orqali kitobxonga nima demoqchi (g‘oya)? Syujet va kompozitsiya: Voqealar rivoji zanjiri. Ekspozitsiya (muqaddima), tugun (voqeaning boshlanishi), rivojlanish, kulminatsiya (eng yuqori nuqta) va yechim. Obrazlar tizimi: Bosh va ikkinchi darajali qahramonlar. Ularning portreti, ichki dunyosi, tili va qilgan ishlari tahlili.Xronotop (Zamon va makon): Voqealar qayerda va qaysi davrda bo‘lib o‘tmoqda? Bu muhit qahramonlarga qanday ta’sir qilyapti?Badiiy til va uslub: Muallifning tasvirlash vositalari (tashbeh, istiora, epitet) va o‘ziga xos yozish uslubi.2. Lirik asarlar tahlili (She’riyat)Lirikada voqea emas, balki insonning ruhiy holati, his-tuyg‘ulari, kechinmalari va ichki kechinmalari aks etadi.Lirik qahramon: She’rda his-tuyg‘ularini bayon etayotgan shaxs (uni muallifning o‘zi bilan har doim ham aynanlashtirib bo‘lmaydi). She’rning kayfiyati va motivlari: G‘amgin, shodona, falsafiy, vatanparvarlik yoki ishqiy kayfiyat. Badiiy san’atlar: She’rni bezagan va ma’noni kuchaytirgan vositalar (tashbeh, talmeh, mubolag‘a, intizor va h.k.).Vazn va qofiya: She’r qaysi vaznda yozilgan (barmoq, aruz, erkin vazn) va qofiyalanish tizimi (a-a-b-a, a-b-a-b).Ritm va intonatsiya: She’rning o‘qilish sur’ati va undagi tovushlar ohangdorligi (alliteratsiya va assonans). 3. Dramatik asarlar tahlili (Tragediya, komediya, drama)Dramatik asarlar sahnada ijro etishga mo‘ljallangani uchun ularda muallif nutqi deyarli bo‘lmaydi. Barcha ma’no qahramonlarning harakati va nutqi orqali ochiladi.Konflikt (Ziddiyat): Dramaning asosi. Qarama-qarshi kuchlar, g‘oyalar yoki qahramonlar o‘rtasidagi to‘qnashuv.Nutqiy tavsif (Dialog va monolog): Qahramonlar bir-biri bilan qanday gaplashyapti (dialog) va o‘zi bilan o‘zi qanday fikrlashyapti (monolog). Ularning xarakteri nutqidan bilinadi.Remarkalar (Muallif izohlari): Qavs ichida beriladigan qahramonlarning harakati, holati yoki sahna ko‘rinishi haqidagi muallif ko‘rsatmalari. Harakat va parda: Asarning tashqi tuzilishi. Voqealar qaysi pardalarda va qanday harakatlar orqali keskinlashib boradi?Shu usullar orqali tahlil qilinadi har uchalasi ham."}], "17": [{"savol_raqami": 1, "savol": "17-bilet savollar", "javob": "Javob mavjud emas"}], "18": [{"savol_raqami": 1, "savol": "Badiiy asarni to'liq anglash uchun ilmiy tekshirishning bosqichlari.", "javob": "Бадиий асарни тўлароқ англаш ва чуқурроқ таҳлил қилиш учун униилмий текширишнинг уч босқичи босиб ўтилиши зарур. Асарнинг таҳлилкечими а) бошланғич идрок даражасида асарни бутунисича англаш; б)кейин уни унсурлари бўйича синчиклаб таҳлил (анализ) қилиш; в) илмийтадқиқот натижаларини тизимли йўсинда умумлаштириш, яъни синтезлашсингари босқичлардан иборат бўлади.Бадиий асарни таҳлил қилишда битикнинг шакли ва мазмунига доирбарча қирраларга тўхталиб, у ўз эстетик вазифаларини қанчалик ўринлибажарганини асослаш, адабий яратиқ туфайли миллий тасвир тажрибасигақандай янгиликлар киритилганини қайд этиш, асарнинг оригиналлигинитаъминлаган омиллар нималардан иборат эканини матнга таянган ҳолдакўрсатиб бериш кўзда тутилади. Бунча мураккаб вазифалар икки шаклдаамалга оширилиши мумкин: биринчиси – текшириладиган асар бутунисича,яъни унга хос барча шаклий-мундарижавий унсурлар қолдирилмай, бирчетдан илмий тадқиқ этилади. Уни ялпи таҳлил дейиш мумкин; иккинчиси –ўрганилаётган асар моҳияти намоён бўладиган қайсидир бир жиҳатлартанлаб олиниб илмий тадқиқ этилади ва бунга танлама таҳлил дейилади.Аммо биринчи усулда амалга оширилган илмий таҳлил ёзма шаклдатўлиқ қайд этиладиган бўлса, аввало, ҳажман жуда бесўнақайлашиб, бадиийасарнинг ўзидай, балки ундан-да каттароқ бўлиб кетиш хавфи юзага келади.Иккинчидан, бадиий мазмун ва шаклга доир барча унсурларнинг бирбошдан ижикилаб батафсил таҳлил этилиши синчининг диққатини асардагиасосий масаладан чалғитиб, янглиш йўлга солиб юбориши ҳам мумкин.Шунинг учун ҳам синчилик амалиётида, айниқса, катта ҳажмли асарлартаҳлил этилганда, унинг барча унсурларини эмас, балки муҳим ҳисобланганўринларини текшириш, бошқача айтганда, танлама таҳлил йўлидан боришйўсинидан кўпроқ фойдаланилади.Синчи мутахассиснинг олдида ҳамиша “Таҳлилга тортиш учунасарнинг қайси жойини танлаб олиш кераг-у, нимасидан воз кечишлозим?”- деган савол туради. Одатда бу масала ё ғайришуурий-интуитивтарзда ёхуд тайёр методик қолипларга таянганҳолда ҳал этилади. Бу ишусулининг биринчиси синчи олимлар, иккинчиси мактаб ўқитувчиларитомонидан кўп қўлланилади. Мактаб адабиётшунослигида кўпинчатаҳлилнинг қуйидаги қолипига амал қилинади: 1. Мазмун соҳасида: а)асарнинг мавзуси; б) образлар тизими ва илгари сурилган ғоя; 2. Шаклсоҳасида эса, а) сюжет унсурлари; б) бадиий нутқнинг айрим хусусиятларитекширилади.Бундай танлама таҳлил бадиий асарни қашшоқлаштириши, кўпинчаиккинчи даражали унсурларга кўпроқ диққат қаратилиб, ўқувчи эътиборимуҳим қирралардан чалғитилиши мумкин. Бунинг устига, ушбу қолип ўзигахослиги ва бетакрорлик даражасидан қатъи назар, ҳар қандай бадиийяратиққа татбиқ этилаверадики, бу ҳол асарларнинг индивидуаллигинианглаш йўлини тўсиб қўяди. Аслида ҳар бир бадиий асарни таҳлил қилиш202методикаси ҳам текширилаётган ҳар бир асарнинг бадиий ўзига хослигиданкелиб чиқиб, унинг ўзи учун махсус яратилган бўлиши мақсадгамувофиқдир.Танлама таҳлил тасодифий ва узуқ-юлуқ бўлиб қолмаслиги учун у айнивақтнинг ўзида ялпи таҳлилга хос хусусиятларга ҳам эга бўлиши керак.Бундай қараганда, бутунни қисмларга ажратишга қаратилган таҳлилжараёни билан таҳлилнинг яхлит бўлиши кераклиги бир-бирини инкорқиладиган талабларга ўхшаб кўринсада, аслида ундай эмас. Тизимга яхлитназар ташлангандагина унинг қайси томонлари, унсурлари ва алоқаларибирламчи, қайсилари иккиламчи аҳамиятга эгалигини аниқлаш мумкинбўлади.Биринчи навбатда, бадиий бутунга хос асосий қонуниятлар англабетилиши керак. Негаки, ана шу қонуниятлар таҳлилчига айнан нималаргадиққат қаратиш кераклигини кўрсатади. Шунинг учун ҳам бадиий асарнитадқиқ этишда ишни анализ – таҳлилдан эмас, балки синтез –умумлаштиришдан бошлаш мақсадга мувофиқ бўлади. Синчи, биринчинавбатда, ўзининг асардан олган илк таассуротини эслаб қолиши ва унингқанчалик тўғри эканини қайта ўқиш орқали текшириб, пайдо бўлганқарашларини тушунча ҳолида ифодалаши ва уларни адабиёт илмихулосалари ҳамда асардаги далиллар ёрдамида асослаши зарур.Айни шу босқичда асарнинг мазмуний ва услубий оригиналлигинитаъминлаган жиҳатлар аниқлаб олиниши керак."}, {"savol_raqami": 2, "savol": "Adabiyot dars ishlanmalari haqida ma'lumot bering.", "javob": "Adabiyot dars ishlanmalariAdabiyot dars ishlanmasi — o‘qituvchining darsni qanday o‘tishini oldindan rejalashtirib yozadigan metodik hujjati hisoblanadi. Unda darsning mavzusi, мақсади, usullari, topshiriqlari va yakuniy natijalari ko‘rsatiladi. Dars ishlanmasi o‘qituvchiga darsni tartibli, mazmunli va samarali tashkil etishga yordam beradi.Adabiyot fanidagi dars ishlanmasi boshqa fanlardan farq qiladi. Chunki adabiyot darsida faqat bilim berilmaydi, balki o‘quvchining:estetik didi,badiiy tafakkuri,nutqi,ma’naviy dunyosi ham shakllantiriladi.Shuning uchun adabiyot darslari ko‘proq tahlil, mushohada, his qilish va fikr bildirishga asoslanadi.Dars ishlanmasining asosiy qismlari1. Dars mavzusiBu qismda o‘tiladigan mavzu yoziladi.Masalan:Abdulla Qodiriyning “O‘tkan kunlar” romaniAlisher Navoiy g‘azallariCho‘lpon she’riyatiMavzu aniq va qisqa bo‘lishi kerak.2. Dars maqsadiDars maqsadi odatda uch turga bo‘linadi:Ta’limiy maqsadO‘quvchiga yangi bilim berishga xizmat qiladi.Masalan:asar mazmunini tushuntirish;qahramonlarni tahlil qilish;badiiy vositalarni o‘rgatish.Tarbiyaviy maqsadO‘quvchilarda yaxshi insoniy fazilatlarni shakllantiradi.Masalan:vatanparvarlik;insonparvarlik;milliy qadriyatlarga hurmat.Rivojlantiruvchi maqsadO‘quvchining fikrlash va nutqini rivojlantiradi.Masalan:mustaqil fikrlash;ijodiy yondashuv;erkin fikr bildirish.3. Dars turiDarsning qanday shaklda o‘tishi belgilanadi.Masalan:yangi bilim beruvchi dars;mustahkamlash darsi;takrorlash darsi;aralash dars;munozara darsi.Adabiyot fanida ayniqsa munozara va tahlil darslari muhim hisoblanadi.4. Dars metodlariMetod — darsni o‘tish usuli.Adabiyot darslarida quyidagi metodlar ishlatiladi:suhbat;savol-javob;ifodali o‘qish;bahs-munozara;“Aqliy hujum”;“Klaster”;“BBB” metodi.Bu metodlar o‘quvchilarni faol qatnashishga undaydi.5. Dars jihozlariDarsda foydalaniladigan vositalar:darslik;tarqatma material;slayd;prezentatsiya;video;audio;doska.Bugungi kunda AKT vositalaridan foydalanish adabiyot darslarini yanada qiziqarli qiladi.6. Darsning borishiTashkiliy qismsalomlashish;davomat;sinfni tayyorlash.O‘tilgan mavzuni so‘rashOldingi mavzu savol-javob orqali mustahkamlanadi.Yangi mavzu bayoniAsosiy tushuntirish qismi hisoblanadi.Bu yerda:muallif hayoti;asar mazmuni;obrazlar;g‘oya;badiiy vositalar tahlil qilinadi.MustahkamlashO‘quvchilar topshiriqlar bajaradi:matn tahlili;guruh bilan ishlash;fikr bildirish;jadval to‘ldirish.BaholashO‘quvchilar bilimiga baho beriladi.Uyga vazifaasar o‘qish;yod olish;insho yozish;savollarga javob tayyorlash.Adabiyot darsining o‘ziga xosligiAdabiyot darsida o‘quvchi:asarni his qiladi;qahramonlarga munosabat bildiradi;voqealarni tahlil qiladi;mustaqil fikr yuritadi.Bu fan o‘quvchining ma’naviy kamolotiga katta ta’sir ko‘rsatadi.Yaxshi dars ishlanmasiga qo‘yiladigan talablarYaxshi ishlanma:aniq;tartibli;tushunarli;zamonaviy metodlarga asoslangan;o‘quvchini faol ishtirok ettiradigan bo‘lishi kerak.XulosaAdabiyot dars ishlanmasi o‘qituvchining darsni samarali tashkil etishiga xizmat qiladigan muhim metodik hujjatdir. U orqali o‘quvchilarga nafaqat adabiy bilim, balki estetik did, mustaqil fikrlash va ma’naviy tarbiya ham beriladi. Puxta tayyorlangan dars ishlanmasi sifatli va mazmunli darsning asosini tashkil qiladi."}], "19": [{"savol_raqami": 1, "savol": "Dramatik tur va uning xususiyatlari haqida ma'lumot bering.", "javob": "Dramatik turga drama, komediya, tragediya (fojeja) singari janrlar mansubdir. Bunday bitiklarda voqelik asarda bevosita ishtirok etuvchi shaxslarning xatti-harakatlari va nutqi orqali ochiladi. Dramatik asarlar sahnga moslab yoziladi. Yozuvchining fikrlari asarda ishtirok etuvchilarning so‘zi va faoliyati vositasida namoyon bo‘ladi. Lirik yoki epik turdagi asarlarda muallif nuqtai nazari, ba’zan ochiq, ba’zan yashirin-pardali tarzda bildiriladi. Dramatik asarlarda aynan mana shu holatning mavjud emasligi o‘quvchi uchun qo‘shimcha qiyinchiliklarni yuzaga keltiradi. Shunga ko‘ra dramatik asarlarda munosabatlarning o‘ziga ko‘rsatish tarzda aks ettirilishi o‘quvchi yoki tomoshabin ongiga, idrokiga yetkazish masalasi turadi. Sahna asaridagi har bir harakat va har bir so‘zning katta ma’no tashishi o‘quvchi yoki tomoshabinlar tomonidan anglanishi kerak. Buning uchun tahlil jarayonida dramatik asarlarning shu xususiyatlariga alohida urg‘u berishga to‘g‘ri keladi.O‘quvchi yoki tomoshabinga bayon yoki tasvirlashga xos usullar yo‘q bo‘lganidan u personajlar xatti-harakatini, voqealar rivojini bevosita tahlil etish imkoniyatiga ega emas. Bunday vazifalar dialoglar yetakchiligida, monolog, remarka va pauzalar yordamida muayyan vaqt ichida tomoshabin yoki kitobxon ko‘z o‘ngida sodir bo‘layotgan qismat shaklida amalga oshiriladi. Har bir voqeaga yo‘nalish beriladi. Dramatik asar tanaffuslar bilan ko‘rsatilganligi sababi, qaysi qismi parda deb yuritiladi. Parda ichida ko‘rinishlar bo‘ladi. Bir ko‘rishga mo‘ljallanganligi sababi dramatik asar hajman cheklangan bo‘ladi"}, {"savol_raqami": 2, "savol": "Yozuvchi hayoti va ijodini o'rganishda multimedia vositalarining o'rni.", "javob": "Yozuvchi hayoti va ijodini o‘rganishda multimedia vositalari an’anaviy usullarni boyitib, jarayonni vizual va interaktiv ko‘rinishga keltiradi. Ularning asosiy o‘rni quyidagilardan iborat:1. Vizualizatsiya va tasvirlash- Video-hujjatlar: Yozuvchining yashash davri, u yashagan joylar va tarixiy kontekstni ko‘rsatish orqali haqiqatga yaqin tasavvur uyg‘otadi.- Raqamli arxivlar: Eski qo‘lyozmalar, xatlar va fotosuratlarning yuqori sifatli raqamli nusxalari asarning tarixiy qiymatini ko‘rish imkonini beradi.2. Interaktivlik va qatnashish- Virtual muzeylar: Talaba yoki tadqiqotchi yozuvchining shaxsiy buyumlari va asarlari bilan \"virtual\" tarzda muloqot qilishi, ularni 3D formatda ko‘rishi mumkin.- Multimedia loyihalar: Xaritalar, vaqt chiziqlari (timeline) va interaktiv infografikalar orqali yozuvchining hayot yo‘li va asarlari mantiqiy bog‘liqligi ko‘rsatiladi.3. Audio-vizual ta’sir- Audio-kitoblar va podkastlar: Yozuvchining o‘zi tomonidan o‘qilgan matnlar yoki u haqidagi professional tahliliy podkastlar matnni chuqurroq his qilishga yordam beradi.- Audio-vizual rekonstruksiyalar: Dramatik asarlarning qisqa video-parodiyalari yoki sahnalari asar ruhini tezroq tushunishga xizmat qiladi.4. Ma’lumotlarni qidirish va tahlil qilish- Elektron kutubxonalar: Dunyo miqyosidagi raqamli bazalar orqali yozuvchining asarlarini tezkor qidirish va solishtirish imkoniyati.- Korpus tahlili (Corpus linguistics): Multimedia dasturlari yordamida yozuvchining uslubini, so‘z boyligi va takrorlanuvchi mavzularini statistik usulda o‘rganish.Xulosa: Multimedia vositalari o‘rganuvchini faqat \"matn o‘quvchi\" emas, balki \"jarayon guvohi\"ga aylantiradi. Bu esa o‘rganish jarayonini qiziqarli, tushunarli va xotirada uzoq qoluvchi qiladi."}, {"savol_raqami": 3, "savol": "Badiiy asar tahlili (epik, lirik, dramatik)", "javob": "Badiiy asar tahlili (epik, lirik, dramatik)Badiiy asar tahlili uning qaysi adabiy turga (epik, lirik, dramatik) mansubligiga qarab o‘ziga xos yondashuvni talab qiladi. Har bir turning tabiati turlicha bo‘lgani uchun, ularni tahlil qilish mezonlari ham farqlanadi. 1. Epik asarlar tahlili (Hikoya, qissa, roman)Epik asarlarda hayotiy voqea-hodisalar, qahramonlar taqdiri va obrazlar tizimi yetakchi o‘rin tutadi.Mavzu va g‘oya: Asarda nima haqida gap boradi (mavzu) va muallif bu orqali kitobxonga nima demoqchi (g‘oya)? Syujet va kompozitsiya: Voqealar rivoji zanjiri. Ekspozitsiya (muqaddima), tugun (voqeaning boshlanishi), rivojlanish, kulminatsiya (eng yuqori nuqta) va yechim. Obrazlar tizimi: Bosh va ikkinchi darajali qahramonlar. Ularning portreti, ichki dunyosi, tili va qilgan ishlari tahlili.Xronotop (Zamon va makon): Voqealar qayerda va qaysi davrda bo‘lib o‘tmoqda? Bu muhit qahramonlarga qanday ta’sir qilyapti?Badiiy til va uslub: Muallifning tasvirlash vositalari (tashbeh, istiora, epitet) va o‘ziga xos yozish uslubi.2. Lirik asarlar tahlili (She’riyat)Lirikada voqea emas, balki insonning ruhiy holati, his-tuyg‘ulari, kechinmalari va ichki kechinmalari aks etadi.Lirik qahramon: She’rda his-tuyg‘ularini bayon etayotgan shaxs (uni muallifning o‘zi bilan har doim ham aynanlashtirib bo‘lmaydi). She’rning kayfiyati va motivlari: G‘amgin, shodona, falsafiy, vatanparvarlik yoki ishqiy kayfiyat. Badiiy san’atlar: She’rni bezagan va ma’noni kuchaytirgan vositalar (tashbeh, talmeh, mubolag‘a, intizor va h.k.).Vazn va qofiya: She’r qaysi vaznda yozilgan (barmoq, aruz, erkin vazn) va qofiyalanish tizimi (a-a-b-a, a-b-a-b).Ritm va intonatsiya: She’rning o‘qilish sur’ati va undagi tovushlar ohangdorligi (alliteratsiya va assonans). 3. Dramatik asarlar tahlili (Tragediya, komediya, drama)Dramatik asarlar sahnada ijro etishga mo‘ljallangani uchun ularda muallif nutqi deyarli bo‘lmaydi. Barcha ma’no qahramonlarning harakati va nutqi orqali ochiladi.Konflikt (Ziddiyat): Dramaning asosi. Qarama-qarshi kuchlar, g‘oyalar yoki qahramonlar o‘rtasidagi to‘qnashuv.Nutqiy tavsif (Dialog va monolog): Qahramonlar bir-biri bilan qanday gaplashyapti (dialog) va o‘zi bilan o‘zi qanday fikrlashyapti (monolog). Ularning xarakteri nutqidan bilinadi.Remarkalar (Muallif izohlari): Qavs ichida beriladigan qahramonlarning harakati, holati yoki sahna ko‘rinishi haqidagi muallif ko‘rsatmalari. Harakat va parda: Asarning tashqi tuzilishi. Voqealar qaysi pardalarda va qanday harakatlar orqali keskinlashib boradi?Shu usullar orqali tahlil qilinadi har uchalasi ham."}], "20": [{"savol_raqami": 1, "savol": "Interfaol metodlar haqida gapiring. Ularning dars jarayonidagi o'rni qanday?", "javob": "Interfaol metodlar haqida gapiring. Ularning dars jarayonidagi o‘rni qanday?Bugungi adabiyot o'qituvchisidan o‘quvchi ma’naviyatining sog‘lomlashuvi asosi bo‘lgan bir qator an’anaviy va mantiqiy metodlar (suhbat, evristik, tadqiqot, taqqoslash, induktiv, deduktiv) bilan birga «fikriy hujum», «6x6» va hk. interfaol metodlardanham samarali foydalana bilish talab etiladi. Ma’lumki, pedagogikyo‘nalishdagi oliy ta’lim muassasalari «Umumiy pedagogika» kursida ta’lim metodlari va ulaming mazmun-mohiyati haqida batafsil bilim beriladi. Mazkur qo‘llanmada talabalami takrorlardan qochish maqsadida ta’lim metodiarining ayrimlaridan foydalanish yo‘llari badiiy asarlar misolida, namuna sifatida taqdim etilmoqda. Talaba bir-ikki metoddan amalda foydalanish haqida tasawurga ega bo‘lsa, qolgan metodlardan ham o‘mi bilan shunday foydalanaverish imkoniyatiga ega bo‘ladi.Ta’lim amaliyotida hamisha yetakchi o‘rinlardan birini egallab kelgan suhbat metodi o'quvchi tafakkuri mustaqilligini ta’minlashda ham qo‘l keladigan metodlardandir. Metodika ilmida bu metodga bag'ishlangan anchagina ishlar mavjud. Jumladan, A.Tojiyevning «Adabiyot darslarida suhbat» qo‘llanmasida adabiyta’lim samaradorligini ta’minlashda suhbat metodining o‘rni vaahamiyati haqida so‘z yuritilgan. irokchiga aylantiradi.Niyozmetova, HusanboyevalarniKitobidan"}, {"savol_raqami": 2, "savol": "Shaxsiy va texnologik kompetensiyalar haqida ma'lumot bering.", "javob": "Shaxsiy va texnologikkompetensiyalar haqida ma’lumot bering. Kompetensiya (lotincha com’etens – munosib, mos, kerakli, layoqatli, biladigan ma’nolarini anglatadi) – shaxs tomonidan hayotning muayyan tarmoqlarida samarali faoliyat yuritish uchun zarur bo‘ladigan bilim, ko‘nikma, malaka va tajriba mavjudligini anglatadigan tushuncha.Shaxsiy kompetensiyaShaxsning o‘z ustida ishlashi, mustaqil fikrlashi va jamiyatda o‘z o‘rnini topishiga xizmat qiladigan ko‘nikmalar majmuasidir.Shaxsiy kompetensiyaga quyidagilar kiradi:Mustaqil ta’lim olishO‘zini rivojlantirishMas’uliyatlilikMuammoli vaziyatlarda to‘g‘ri qaror qabul qilishMuloqot madaniyatiVaqtdan unumli foydalanishTexnologik kompetensiyaAxborot-kommunikatsiya texnologiyalaridan samarali foydalanish ko‘nikmasidir.Texnologik kompetensiyaga quyidagilar kiradi:Kompyuter va internetdan foydalanishElektron ta’lim platformalari bilan ishlashMultimedia vositalaridan foydalanishAxborotni izlash va qayta ishlashTaqdimot va elektron hujjatlar tayyorlash. Bu kompetensiyalar zamonaviy pedagog va o‘quvchi uchun juda muhim bo‘lib, ta’lim sifati va samaradorligini oshiradi."}], "21": [{"savol_raqami": 1, "savol": "Insho nima? Uning turlari va yozishga qo'yiladigan talablar.", "javob": "Insho (arabcha — yaratish, tuzish) — muayyan mavzu boʻyicha shaxsiy fikr, mulohaza va xulosalarni bayon etuvchi mustaqil yozma ijodiy ish. U oʻquvchining mantiqiy fikrlash, savodxonlik va nutq madaniyatini rivojlantirishga xizmat qiladi.Insho turlariMavzuning yoritilish xususiyatiga ko'ra insholar quyidagi asosiy turlarga bo'linadi: Adabiy mavzudagi insholar: Badiiy asarlar tahliliga, yozuvchilarning hayoti va ijodiga, adabiy qahramonlar xarakterini ochib berishga qaratilgan ishlar.Adabiy-ijodiy insholar: O'quvchidan tasavvur va ijodiy yondashuvni talab qiluvchi erkin janrlar (masalan, qahramonlarga xat, asar davomi, she'riy parcha tahlili).Erkin (ijtimoiy-siyosiy) mavzudagi insholar: Hayotiy hodisalar, axloq-odob, tabiat, san'at yoki tarixiy mavzularni yoritish, muammolarga shaxsiy yechimlar taklif qilishga qaratilgan. Xalqaro ta'lim va universitet talablariga ko'ra, insholar mazmunan yana to'rt toifaga ajratiladi: Tasviriy (Descriptive): Biror narsa, joy yoki hissiyotni batafsil tasvirlash.Hikoyaviy (Narrative): Shaxsiy tajriba yoki voqeani hikoya qilib berish.Axborot beruvchi (Expository): Biror mavzuni xolis va aniq faktlar bilan tushuntirish.Bahsli-munozarali (Argumentative): Muammoning ikki tomonlama yondashuvini ko'rsatib, dalillar bilan o'z fikrini isbotlash. Insho yozishda talab qilinadigan malaka va ko'nikmalarSifatli insho yozish uchun muayyan yozuvchilik va tahliliy mahorat talab etiladi:Mavzuni tushunish va chuqur ochib berish: Mavzu doirasidan chetga chiqmagan holda, uning asosiy mohiyatini to'liq yoritish.Mantiqiy izchillik: Fikrlar o'rtasida bog'liqlik bo'lishi kerak. Insho kirish, asosiy qism (dalillar va tahlil) va xulosadan iborat bo'lishi talab etiladi.Reja tuzish: Asosiy fikrni tartiblash uchun sodda yoki murakkab rejani to'g'ri shakllantira olish.Dalillash mahorati: Fikrni quvvatlash uchun hayotiy misollar, iqtiboslar yoki ishonchli dalillardan o'rinli foydalanish.Boy so'z boyligi va ravon nutq: Fikrlarni aniq, ta'sirchan hamda badiiy til me'yorlariga mos tarzda ifoda etish.Savodxonlik: Imlo, punktualizatsiya (tinish belgilari) hamda uslubiy qoidalarga rioya qilish."}, {"savol_raqami": 2, "savol": "Lirik asarlarni tahlil etish metodikasi haqida ayting.", "javob": "Lirik asarlarni tahlil etish metodikasi haqida ayting?Lirik asarlarni tahlil etish jarayoni asarning hissiy-falsafiy qatlamlarini ochib berishga qaratilgan ko'p bosqichli metodik yondashuvni talab qiladi. O'quvchilarda matnni chuqur tushunish ko'nikmasini shakllantirish uchun quyidagi ketma-ketlik va metodlardan foydalaniladi:1.Ifodali o‘qish: She'rni yoddan yoki to‘g‘ri intonatsiya bilan o‘qish orqali uning ruhiy-emotsional ta'sirini his qilish.Lirik qahramonni aniqlash: Muallif va lirik qahramon o‘rtasidagi farqni anglash, asar kimning nomidan aytilayotganini belgilash.2. Mazmun va shakl tahlili, G‘oyaviy-tematik tahlil: Asarning yozilish sababi (motiv), lirik kechinma va g‘oyaning mohiyatini ochib berish.Kompozitsion tahlil: She'rdagi fikr rivoji, qismlar (bandlar) o‘rtasidagi mantiqiy bog‘liqlik va tugunni aniqlash.Obrazlar tizimi: She'rda tasvirlangan ruhiy holat, tabiat manzarasi yoki voqelik qanday poetik obrazlar orqali ifodalanganini tahlil qilish.3. Badiiy san'atlar va til xususiyatlari, Tasviriy vositalar: Matndagi metafora, metonimiya, kinoya, jonlantirish, o‘xshatishlarni topish.Ifodali vositalar: Epitetlar, antiteza, takrorlar (alliteratsiya, assonans) vazifasini yoritish.4. Versifikatsiya (She'riy tuzilish)Vazn va qofiya: She'r yozilgan vazn (barmoq, aruz yoki sarbast), qofiyalanish tartibi (masalan, a-a-a-a, a-b-a-b) va ritmik xususiyatlarni aniqlash.5. Xulosa va umumlashtirish, Asarning dolzarbligi: She'rning bugungi kun uchun tarbiyaviy va estetik ahamiyatini belgilash."}], "22": [{"savol_raqami": 1, "savol": "22-bilet 1-savol", "javob": "Javob mavjud emas"}, {"savol_raqami": 2, "savol": "22-bilet 2-savol", "javob": "Javob mavjud emas"}], "23": [{"savol_raqami": 1, "savol": "Adabiyot darslarida muammoli tahlilni qo'llash.", "javob": "Adabiyot darslarida muammoli tahlilni qôllanishi Adabiyot darslarida muammoli tahlil (yoki muammoli ta'lim texnologiyasi) shunchaki asarni o‘qib, uning mazmunini qayta gapirib berishdan charchagan o‘quvchilar uchun haqiqiy \"jon baxi hisoblanadi\". Bu usul darsni ma'ruza ko‘rinishidan jonli bahs-munozara maydoniga aylantiradi.Muammoli tahlilning bosh maqsadi — tayyor xulosalarni o‘quvchining miyasiga quyish emas, balki uni asardagi ziddiyatli vaziyatlar ustida oylashga, shaxsiy munosabatini bildirishga va mustaqil xulosa chiqarishga majbur qilishdir.Quyida ushbu usulni adabiyot darslarida qanday qo‘llash va uning asosiy bosqichlari haqida batafsil to‘xtalamiz.**Muammoli vaziyatni yaratish usullariDarsda muammoli vaziyat yaratish uchun o‘qituvchi asardan shunday nuqtani topishi kerakki, u o‘quvchida savol va ichki ziddiyat uyg‘otsin. Buning bir nechta samarali yo‘llari bor:Xarakterlar to‘qnashuvi: Qahramonning bir-biriga zid bo‘lgan xatti-harakatlarini tahlil qilish.Misol: Abdulla Qodiriyning \"O‘tkan kunlar\" romanida Otabekning Kumushga bo‘lgan sevgisi va ayni paytda ota-onasining rayini qaytara olmay Zaynabga uylanishi. \"Otabekni zamona qurbonimi yoki o‘z irodasizligining qurbonimi?\" degan savol o‘rtaga tashlanadi.Hayotiy tajriba va asar o‘rtasidagi zidlik: O‘quvchining bugungi dunyoqarashi bilan asar yozilgan davrdagi qadriyatlarni to‘qnash keltirish.Misol: Cho‘lponning \"Kecha va kunduz\" romanidagi Akbarali obrazi va uning atrofidagi muhit orqali \"Insonni muhit shakllantiradimi yoki inson muhitni o‘zgartira oladimi?\" muammosini qo‘yish.Badiiy yechimga muqobil variant qidirish: \"Agar qahramon bunday qilmaganda, voqealar rivoji qanday bo‘lardi?\" degan gipotezani o‘rtaga tashlash."}, {"savol_raqami": 2, "savol": "Adabiyot dars ishlanmalari haqida ma'lumot bering.", "javob": "Adabiyot dars ishlanmalariAdabiyot dars ishlanmasi — o‘qituvchining darsni qanday o‘tishini oldindan rejalashtirib yozadigan metodik hujjati hisoblanadi. Unda darsning mavzusi, мақсади, usullari, topshiriqlari va yakuniy natijalari ko‘rsatiladi. Dars ishlanmasi o‘qituvchiga darsni tartibli, mazmunli va samarali tashkil etishga yordam beradi.Adabiyot fanidagi dars ishlanmasi boshqa fanlardan farq qiladi. Chunki adabiyot darsida faqat bilim berilmaydi, balki o‘quvchining:estetik didi,badiiy tafakkuri,nutqi,ma’naviy dunyosi ham shakllantiriladi.Shuning uchun adabiyot darslari ko‘proq tahlil, mushohada, his qilish va fikr bildirishga asoslanadi.Dars ishlanmasining asosiy qismlari1. Dars mavzusiBu qismda o‘tiladigan mavzu yoziladi.Masalan:Abdulla Qodiriyning “O‘tkan kunlar” romaniAlisher Navoiy g‘azallariCho‘lpon she’riyatiMavzu aniq va qisqa bo‘lishi kerak.2. Dars maqsadiDars maqsadi odatda uch turga bo‘linadi:Ta’limiy maqsadO‘quvchiga yangi bilim berishga xizmat qiladi.Masalan:asar mazmunini tushuntirish;qahramonlarni tahlil qilish;badiiy vositalarni o‘rgatish.Tarbiyaviy maqsadO‘quvchilarda yaxshi insoniy fazilatlarni shakllantiradi.Masalan:vatanparvarlik;insonparvarlik;milliy qadriyatlarga hurmat.Rivojlantiruvchi maqsadO‘quvchining fikrlash va nutqini rivojlantiradi.Masalan:mustaqil fikrlash;ijodiy yondashuv;erkin fikr bildirish.3. Dars turiDarsning qanday shaklda o‘tishi belgilanadi.Masalan:yangi bilim beruvchi dars;mustahkamlash darsi;takrorlash darsi;aralash dars;munozara darsi.Adabiyot fanida ayniqsa munozara va tahlil darslari muhim hisoblanadi.4. Dars metodlariMetod — darsni o‘tish usuli.Adabiyot darslarida quyidagi metodlar ishlatiladi:suhbat;savol-javob;ifodali o‘qish;bahs-munozara;“Aqliy hujum”;“Klaster”;“BBB” metodi.Bu metodlar o‘quvchilarni faol qatnashishga undaydi.5. Dars jihozlariDarsda foydalaniladigan vositalar:darslik;tarqatma material;slayd;prezentatsiya;video;audio;doska.Bugungi kunda AKT vositalaridan foydalanish adabiyot darslarini yanada qiziqarli qiladi.6. Darsning borishiTashkiliy qismsalomlashish;davomat;sinfni tayyorlash.O‘tilgan mavzuni so‘rashOldingi mavzu savol-javob orqali mustahkamlanadi.Yangi mavzu bayoniAsosiy tushuntirish qismi hisoblanadi.Bu yerda:muallif hayoti;asar mazmuni;obrazlar;g‘oya;badiiy vositalar tahlil qilinadi.MustahkamlashO‘quvchilar topshiriqlar bajaradi:matn tahlili;guruh bilan ishlash;fikr bildirish;jadval to‘ldirish.BaholashO‘quvchilar bilimiga baho beriladi.Uyga vazifaasar o‘qish;yod olish;insho yozish;savollarga javob tayyorlash.Adabiyot darsining o‘ziga xosligiAdabiyot darsida o‘quvchi:asarni his qiladi;qahramonlarga munosabat bildiradi;voqealarni tahlil qiladi;mustaqil fikr yuritadi.Bu fan o‘quvchining ma’naviy kamolotiga katta ta’sir ko‘rsatadi.Yaxshi dars ishlanmasiga qo‘yiladigan talablarYaxshi ishlanma:aniq;tartibli;tushunarli;zamonaviy metodlarga asoslangan;o‘quvchini faol ishtirok ettiradigan bo‘lishi kerak.XulosaAdabiyot dars ishlanmasi o‘qituvchining darsni samarali tashkil etishiga xizmat qiladigan muhim metodik hujjatdir. U orqali o‘quvchilarga nafaqat adabiy bilim, balki estetik did, mustaqil fikrlash va ma’naviy tarbiya ham beriladi. Puxta tayyorlangan dars ishlanmasi sifatli va mazmunli darsning asosini tashkil qiladi."}], "24": [{"savol_raqami": 1, "savol": "Adabiyot darslarida ifodali o'qishga qo'yiladigan talablar.", "javob": "1. Adabiyot darslarida ifodali o‘qishga qo‘yiladigan talablar.Adabiyot darslarida ifodali o‘qish — badiiy matnni his-hayajon, mazmun va muallif g‘oyasini to‘g‘ri yetkazgan holda o‘qishdir. Ifodali o‘qishga quyidagi talablar qo‘yiladi:To‘g‘ri o‘qishSo‘zlarni adabiy talaffuz me’yorlariga amal qilgan holda, xatosiz o‘qish kerak.Ongli o‘qishO‘quvchi matn mazmunini tushungan holda o‘qishi lozim. Asarning g‘oyasi, qahramonlarning kayfiyati his qilinishi kerak.Ravon o‘qishO‘qish sekin yoki haddan tashqari tez bo‘lmasligi, tabiiy va ravon bo‘lishi zarur.Intonatsiyaga rioya qilishGap mazmuniga qarab ovoz ohangini o‘zgartirish, savol, undov, hayajon yoki qayg‘uni ovoz orqali ifodalash kerak.Pauzalarga amal qilishTinsh belgilariga mos ravishda to‘xtamlar qilish matn mazmunini aniq yetkazadi.Ovozning aniqligi va ta’sirchanligiOvoz balandligi, tembri va talaffuzi tinglovchiga tushunarli bo‘lishi kerak.His-hayajon bilan o‘qishShe’r yoki nasriy asardagi tuyg‘ularni his etib o‘qish ifodali o‘qishning asosiy belgilaridan biridir.Muallif uslubini saqlashAsarning ruhiga mos tarzda o‘qish, qahramon xarakterini ovoz orqali ko‘rsatish muhim."}, {"savol_raqami": 2, "savol": "Adabiyot dars ishlanmalari haqida ma'lumot bering.", "javob": "Adabiyot dars ishlanmalari haqida ma’lumot bering.Adabiyot dars ishlanmalari — o‘qituvchiga darsni samarali tashkil etish, o‘quvchilarda badiiy tafakkur va tanqidiy fikrlashni rivojlantirishga yordam beruvchi batafsil rejadir. U muayyan mavzuni tushuntirishdan tortib, mustahkamlash va baholashgacha bo'lgan jarayonlarni qamrab oladi. 📘 Dars ishlanmasining asosiy qismlariDars maqsadi va vazifalari: Ta’limiy, tarbiyaviy va rivojlantiruvchi maqsadlar aniq belgilanadi.Dars turi va metodi: Interfaol usullar, tahlil (suhbat, munozara), guruhlarda ishlash yoki loyihaviy yondashuv tanlanadi.Dars jihozi: Darsliklar, proyektor, yozuvchi yoki shoir portreti, tarqatmali materiallar va ko‘rgazmali vositalar. ⏱ Darsning bosqichma-bosqich tuzilishiTashkiliy qism: Salomlashish, davomatni aniqlash va ijobiy muhit yaratish.O‘tilgan mavzuni takrorlash: \"Aqliy hujum\", savol-javob yoki kichik testlar orqali o‘quvchilar bilimini sinash.Yangi mavzu bayoni: Muallif hayoti, ijodi va asar mazmuniga to‘xtalish. Bunda zamonaviy texnologiyalardan (slaydlar, video lavhalar) foydalanish yuqori samara beradi.Mavzuni mustahkamlash: Asar qahramonlari xarakterini tahlil qilish, ijodiy yondashuv (\"Venn diagrammasi\", \"Klaster\" usuli).Uyga vazifa va baholash: O‘quvchilarga mavzu yuzasidan esse yozish yoki asarni to‘liq o‘qib kelishni tayinlash, darsdagi faolligiga qarab ball qo‘yish. 💡 Amaliy tavsiyalar va manbalarInterfaollik: Dars davomida faqat ma’ruza o‘qish bilan cheklanmasdan, asar parchalarini rollarga bo‘lib ijro etish yoki kichik sahna ko‘rinishlarini tayyorlash o‘quvchilarning adabiyotga bo‘lgan qiziqishini oshiradi.Manbalar: Dars ishlanmalarining tayyor namunalarini izlash yoki o‘z ishlanmalaringizni boyitish uchun Scribd platformasidagi tayyor hujjatlardan, shuningdek, ResearchGatebazasidagi metodik qo‘llanmalardan foydalanishingiz mumkin."}, {"savol_raqami": 3, "savol": "Badiiy asar tahlili (epik, lirik, dramatik)", "javob": "3. Badiiy asar tahlili (epik, lirik, dramatik). Badiiy asar tahlili uchta asosiy adabiy tur — epik, lirik va dramatik xususiyatlaridan kelib chiqib turlicha amalga oshiriladi. Quyida ularning har biri bo'yicha tahlil bosqichlari qisqacha jamlangan:1. Epik asarlar tahlili (Hajmli nasriy va nasriy-nazmiy asarlar)Epik tahlil voqelikni, xarakterlarni va harakatlarni to'liq yoritishga qaratiladi. Mavzu va g'oya: Asarda ko'tarilgan asosiy muammo (masalan, yaxshilik va yomonlik, jamiyat va shaxs) hamda muallifning maqsadi.Syujet va kompozitsiya: Voqealar rivoji (kirish, tugun, voqea rivoji, kulminatsiya, yechim) va qismlarning joylashuvi.Obrazlar tizimi: Asar qahramonlari tahlili, ularning xarakteri, jamiyatdagi o'rni va psixologik holati.Tasviriy vositalar: Muallif qo'llagan badiiy san'atlar (metafora, epitet, jonlantirish) va asar tili.2. Lirik asarlar tahlili (She'riyat)\nLirikada voqealar emas, balki qahramonning ichki kechinmalari, ruhiy holati va his-tuyg'ulari tahlil qilinadi. Lirik qahramon: Muallifning ruhiy holatini ifodalovchi obraz, uning ichki dunyosi va dunyoqarashi.Asarning yozilish sababi (motiv): Shoirni qanday tuyg'u (vatanparvarlik, sevgi, hijron, tabiat) ilhomlantirgani.Badiiy san'at va shakl: Qofiya, vazn (barmoq yoki aruz), ritm, raddiya, tashbeh kabi she'riy vositalarning ohangga ta'siri. 3. Dramatik asarlar tahlili (Pyesalar)Dramatik asarlar sahnada ijro etish uchun yoziladi, shuning uchun tahlil dialog va harakatlarga asoslanadi. Konflikt (to'qnashuv): Asardagi ziddiyatning mohiyati (g'oyalar yoki qahramonlar qarama-qarshiligi).Dialog va monologlar: Qahramonlarning nutq xususiyatlari, xarakterni nutq orqali ochib berish mahorati.Sahnaviylik (harakatlar): Asarning sahna talablariga javob berishi, muallif izohlari (remarkalar) va xatti-harakatlarning o'rni."}], "25": [{"savol_raqami": 1, "savol": "Lirik asarlarni tahlil etish metodikasi haqida ayting.", "javob": "1. Lirik asarlarni tahlil etish metodikasi haqida ayting?Lirik asarlarni tahlil etish jarayoni asarning hissiy-falsafiy qatlamlarini ochib berishga qaratilgan ko'p bosqichli metodik yondashuvni talab qiladi. O'quvchilarda matnni chuqur tushunish ko'nikmasini shakllantirish uchun quyidagi ketma-ketlik va metodlardan foydalaniladi:1.Ifodali o‘qish: She'rni yoddan yoki to‘g‘ri intonatsiya bilan o‘qish orqali uning ruhiy-emotsional ta'sirini his qilish.Lirik qahramonni aniqlash: Muallif va lirik qahramon o‘rtasidagi farqni anglash, asar kimning nomidan aytilayotganini belgilash.2. Mazmun va shakl tahlili, G‘oyaviy-tematik tahlil: Asarning yozilish sababi (motiv), lirik kechinma va g‘oyaning mohiyatini ochib berish.Kompozitsion tahlil: She'rdagi fikr rivoji, qismlar (bandlar) o‘rtasidagi mantiqiy bog‘liqlik va tugunni aniqlash.Obrazlar tizimi: She'rda tasvirlangan ruhiy holat, tabiat manzarasi yoki voqelik qanday poetik obrazlar orqali ifodalanganini tahlil qilish.3. Badiiy san'atlar va til xususiyatlari, Tasviriy vositalar: Matndagi metafora, metonimiya, kinoya, jonlantirish, o‘xshatishlarni topish.Ifodali vositalar: Epitetlar, antiteza, takrorlar (alliteratsiya, assonans) vazifasini yoritish.4. Versifikatsiya (She'riy tuzilish)Vazn va qofiya: She'r yozilgan vazn (barmoq, aruz yoki sarbast), qofiyalanish tartibi (masalan, a-a-a-a, a-b-a-b) va ritmik xususiyatlarni aniqlash.5. Xulosa va umumlashtirish, Asarning dolzarbligi: She'rning bugungi kun uchun tarbiyaviy va estetik ahamiyatini belgilash."}, {"savol_raqami": 2, "savol": "O'qituvchi tomonidan bir darsning o'zida bir necha kompetensiyadan foydalanish mumkinmi?", "javob": "2. O'qituvchi tomonidan bir darsning o'zida bir necha kompetensiyadan foydalanish mumkinmi? Agar mumkin bolsa misollar bilan tushuntiring?Dars davomida o'quvchilarda nafaqat fan bo'yicha bilim, balki hayotiy ko'nikmalarni shakllantirish uchun bir necha kompetensiyalarni (tayanch va fan kompetensiyalarini) uyg'unlashtirib foydalanish talab etiladi. Masalan: Ona tili va adabiyot darsi, Mavzu: Matn ustida ishlash. Abdulla Qodiriyning \"O'tkan kunlar\" romanidan parcha.Bu darsda quyidagi kompetensiyalar integratsiya qilinadi:Kommunikativ kompetensiya:O'quvchilar matndagi voqealar rivoji yoki qahramonlar harakati yuzasidan o'z fikrlarini erkin, ravon va mantiqiy tarzda og'zaki yoki yozma shaklda bayon etishadi.Axborot bilan ishlash kompetensiyasi:O'quvchilar matndan kerakli ma'lumotlarni (sana, joy, qahramonning xususiyati) ajratib olishadi va jadval yoki klaster ko'rinishida tartibga solishadi.Milliy va umumbashariy qadriyatlarni hurmat qilish kompetensiyasi:Parchadagi milliy urf-odatlar, oilaviy qadriyatlar va insoniy fazilatlar (or-nomus, sadoqat) muhokama qilinadi, bu esa o'quvchilarda ma'naviy tarbiyani shakllantiradi.O'z-o'zini rivojlantirish kompetensiyasi:O'quvchilar matn qahramonlarining xatolaridan to'g'ri xulosa chiqarib, o'z shaxsiy xulq-atvorini tahlil qilishadi va hayotiy vaziyatlarda to'g'ri qaror qabul qilish ko'nikmasini oshirishadi. Darsning kirish qismida: o'qituvchi mavzuga oid qisqa video yoki audio (Axborot bilan ishlash) taqdim etadi.Darsning asosiy qismida: O'quvchilar kichik guruhlarga bo'linib, matnni tahlil qiladilar. Bunda ular o'z g'oyalarini sheriklariga yetkazishadi va himoya qilishadi (Kommunikativ kompetensiya)ni shakllantirishadi. Darsning yakunida: \"Nima deb o'ylaysiz, bugungi qahramon o'rnida bo'lganingizda qanday yo'l tutardingiz?\" degan savol beriladi (O'z-o'zini rivojlantirish va Qadriyat kompetensiyalari) shakllanadi. Xulosa: Bir darsda bir necha kompetensiyaning uyg'unlashuvi o'quvchining zerikmasligini ta'minlaydi, fanga bo'lgan qiziqishini oshiradi va uni hayotda kerak bo'ladigan har tomonlama tayyor shaxs, professional va shaxsiy ko'nikmalar egasi bo'lib yetishishiga xizmat qiladi."}, {"savol_raqami": 3, "savol": "Badiiy asar tahlili (epik, lirik, dramatik)", "javob": "Badiiy asar tahlili (epik, lirik, dramatik)Badiiy asar tahlili uning qaysi adabiy turga (epik, lirik, dramatik) mansubligiga qarab o‘ziga xos yondashuvni talab qiladi. Har bir turning tabiati turlicha bo‘lgani uchun, ularni tahlil qilish mezonlari ham farqlanadi. 1. Epik asarlar tahlili (Hikoya, qissa, roman)Epik asarlarda hayotiy voqea-hodisalar, qahramonlar taqdiri va obrazlar tizimi yetakchi o‘rin tutadi.Mavzu va g‘oya: Asarda nima haqida gap boradi (mavzu) va muallif bu orqali kitobxonga nima demoqchi (g‘oya)? Syujet va kompozitsiya: Voqealar rivoji zanjiri. Ekspozitsiya (muqaddima), tugun (voqeaning boshlanishi), rivojlanish, kulminatsiya (eng yuqori nuqta) va yechim. Obrazlar tizimi: Bosh va ikkinchi darajali qahramonlar. Ularning portreti, ichki dunyosi, tili va qilgan ishlari tahlili.Xronotop (Zamon va makon): Voqealar qayerda va qaysi davrda bo‘lib o‘tmoqda? Bu muhit qahramonlarga qanday ta’sir qilyapti?Badiiy til va uslub: Muallifning tasvirlash vositalari (tashbeh, istiora, epitet) va o‘ziga xos yozish uslubi.2. Lirik asarlar tahlili (She’riyat)Lirikada voqea emas, balki insonning ruhiy holati, his-tuyg‘ulari, kechinmalari va ichki kechinmalari aks etadi.Lirik qahramon: She’rda his-tuyg‘ularini bayon etayotgan shaxs (uni muallifning o‘zi bilan har doim ham aynanlashtirib bo‘lmaydi). She’rning kayfiyati va motivlari: G‘amgin, shodona, falsafiy, vatanparvarlik yoki ishqiy kayfiyat. Badiiy san’atlar: She’rni bezagan va ma’noni kuchaytirgan vositalar (tashbeh, talmeh, mubolag‘a, intizor va h.k.).Vazn va qofiya: She’r qaysi vaznda yozilgan (barmoq, aruz, erkin vazn) va qofiyalanish tizimi (a-a-b-a, a-b-a-b).Ritm va intonatsiya: She’rning o‘qilish sur’ati va undagi tovushlar ohangdorligi (alliteratsiya va assonans). 3. Dramatik asarlar tahlili (Tragediya, komediya, drama)Dramatik asarlar sahnada ijro etishga mo‘ljallangani uchun ularda muallif nutqi deyarli bo‘lmaydi. Barcha ma’no qahramonlarning harakati va nutqi orqali ochiladi.Konflikt (Ziddiyat): Dramaning asosi. Qarama-qarshi kuchlar, g‘oyalar yoki qahramonlar o‘rtasidagi to‘qnashuv.Nutqiy tavsif (Dialog va monolog): Qahramonlar bir-biri bilan qanday gaplashyapti (dialog) va o‘zi bilan o‘zi qanday fikrlashyapti (monolog). Ularning xarakteri nutqidan bilinadi.Remarkalar (Muallif izohlari): Qavs ichida beriladigan qahramonlarning harakati, holati yoki sahna ko‘rinishi haqidagi muallif ko‘rsatmalari. Harakat va parda: Asarning tashqi tuzilishi. Voqealar qaysi pardalarda va qanday harakatlar orqali keskinlashib boradi?Shu usullar orqali tahlil qilinadi har uchalasi ham."}], "26": [{"savol_raqami": 1, "savol": "Yozuvchi tarjima holini o'rganishning ma'rifiy ahamiyati haqida gapiring.", "javob": "yozuvchi tarjima holini o'rganishning ma'rifry ahamiyati haqida gapiring Adib hayoti va ijodining ilmiy bayoni: a) muayyan adibning yozuvchi va mutafakkir sifatidagi mav-g) adibning milliy-ijtimoiy tafakkuri va adabiyot taraqqiyotiga d) uning umumjahon badiiyati va tafakkuri rivojiga munosa-bati;e) milliy g‘oya va milliy qadriyatlar tarkibidagi o‘rni singari masalalardan tashkil topsa, o‘quvchi e’tiborini jalb etishga yordam beradi.Adiblarning tarjimai holini keng miqyosda, batafsil o‘rganish VIII sinflardan boshlab amalga oshirilishi kerakligi metodist-olim-lar tomonidan ta’kidlangan. Bu yoshdagi o‘quvchilarga xos bo‘lgan inson shaxsini o‘rganishga qiziqish quyidagilarga asoslanadi:– iste’dodining rivojlanishi;– qalbining ulug‘vorligi;– tabiatga munosabati;– insonga munosabati.Yoshlarning komil inson sifatida shakllanishida milliy an’analar, qadriyatlar, ma’naviy boyliklar, davr ijtimoiy hayo-tining roli beqiyosdir. Shu bois tarjimai hollar mazmuni qanday bo‘lishidan qat’i nazar birinchi navbatda adibning o‘zi haqidagi hikoyasi bilan ijodi to‘g‘risidagi maqola qo‘shilgan holda berilishi maqsadga muvofiq bo‘ladi.qo‘shgan hissasi; novatorligini ko‘rsatish orqali adabiy jarayonning rivojlanish bos-qichlarini chuqurroq anglatish, yozuvchi shaxsining kamol topishi, ruhiy olami misolida yoshlar tarbiyasiga ijobiy ta’sir etish, eng muhimi, o‘rganilajak asarning yaratilishiga turtki bo‘lgan voqea-hodisalar bilan tanishtirish, shu orqali parcha mazmunini to‘liq tu-shuntirish, imkon yaratish uchun xizmat qiladi, asarni o‘qish uchun havas uyg‘otadi.Xullas, yozuvchining tarjimai holini va ijodiy faoliyatini o‘rganish, bir tomondan, ma’naviy-ma’rifiy ahamiyatga ega bo‘lsa, ikkinchi tomondan, o‘quvchilarga davr ruhini chuqurroq anglatish, ijtimoiy munosabatlarni ular qalbiga yetkazish, ularni milliy mafkura, milliy ma’naviyatga cheksiz hurmat ruhida tarbiyalash, adibning adabiyot ravnaqida va jamiyatda tutgan mavqeini, uning\nYozuvchi tarjimai holini (biografiyasini) oʻrganish shunchaki tarixiy faktlar, sanalar yoki voqealar ketma-ketligi bilan tanishish emas. U juda chuqur maʼrifiy, tarbiyaviy va falsafiy ahamiyatga ega.​Ijodkor hayot yoʻlini anglash bizga nimalar berishini bir nechta asosiy jihatlarga boʻlib koʻrishimiz mumkin:​1. Asar mohiyatini chuqurroq anglash (Kalit kaliti)​Har bir adabiy asar yozuvchi yashagan davr, u koʻrgan-kechirgan voqealar va uning shaxsiy kechinmalari mahsulidir. Tarjimai holni bilish asardagi satrlar orasiga yashiringan haqiqatlarni topishga yordam beradi.​Misol uchun: Choʻlpon yoki Abdulla Qodiriy hayotini, ularning qatagʻon davridagi iztiroblarini bilgan kitobxon \"Kecha va kunduz\" yoki \"Oʻtkan kunlar\"ni shunchaki sevgi qissasi emas, millat fojiasi sifatida oʻqiydi.Shaxsiyat shakllanishi va hayotiy oʻrnak (Motivatsiya)​Yozuvchilar odatda oddiy sharoitda, baʼzan esa juda ogʻir qiyinchiliklar ichida yashab ijod qilishgan. Ularning taqdiri — matonat, mehnatsevarlik va oʻz gʻoyasiga sadoqat darsidir.​Ijodkorning hayotiy toʻsiqlarni qanday yengib oʻtganini oʻrganish yoshlarda iroda, qatʼiyat va maqsad sari intilish tuygʻularini tarbiyalaydi. Bu oʻziga xos maʼnaviy namuna vazifasini oʻtaydi.​3. Davr va jamiyat manzarasini koʻrish​Yozuvchi — oʻz davrining koʻzgusi. Uning tarjimai holini oʻrganish orqali biz oʻsha davrdagi ijtimoiy-siyosiy muhitni, odamlarning dunyoqarashini va madaniy hayotni yaxshiroq tasavvur qilamiz. Tarix kitoblarida quruq faktlar berilsa, yozuvchi biografiyasida oʻsha tarixning jonli, insoniy qiyofasi namoyon boʻladi.​4. Umumbashariy qadriyatlar va estetik tarbiya​Buyuk adiblarning hayot tarzi, ularning doʻstlikka, muhabbatga, Vatanga va adolatga boʻlgan munosabati kitobxonda estetik did va yuksak axloqiy mezonlarni shakllantiradi. Ularning maktublari, kundaliklari va zamondoshlarining xotiralari maʼnaviy xazinadir."}, {"savol_raqami": 2, "savol": "Mumtoz g'azal va ruboiylar tahlili — shakl va mazmun.", "javob": "Mumtoz gʻazal va ruboiylar tahlili — shakl (vazn, qofiya, radif, baytlar tuzilishi) va mazmun (gʻoya, falsafa, tuygʻu) uygʻunligini oʻrganishdir. Shakl mumtoz asarda qobiq vazifasini bajarib, mazmunning ta'sirchanligini oshiradi.1. Shakl va mazmun mutanosibligiShakl: Gʻazal va ruboiylar muayyan qonun-qoidalarga (aruz vazni, qofiyalanish tartibi \\(a-a, b-a, c-a\\) kabi) boʻysunadi.Mazmun: Shoirning ruhiy kechinmalari, ishq, tasavvufiy gʻoyalar yoki hayotiy falsafasi.Mutanosiblik: Tanlangan vazn va qofiya ifoda etilmoqchi boʻlgan hissiyotga (gʻam, shodlik, isyon) mos tushishi kerak. Masalan, gʻazaldagi matlaʼ (bosh bayt) gʻoyasining yakunlovchi bayt – maqtaʼ bilan mantiqiy bogʻlanishi shartdir2. Gʻazal tahlili mezonlariTuzilishi: Gʻazal 5 tadan 15 tagacha baytdan iborat boʻladi. Matlaʼ (\\(a-a\\)) va maqtaʼ (shoir taxallusi keltiriladi) qismlariga alohida e'tibor qaratiladi.Badiiy sanʼatlar: Tahlil davomida shoir qoʻllagan sanʼatlar: tajnis (soʻz oʻyini), talmeh (tarixiy ishora), husni taʼlil (chiroyli sabab koʻrsatish) kabilarning mazmunni ochishdagi oʻrni aniqlanadi.Lugʻat ustida ishlash: Asardagi aruz talabiga koʻra oʻzgargan soʻzlar va tarixiy-adabiy atamalar (tashbeh, majoz, tarji) izohi topiladi.3. Ruboiy tahlili mezonlariTuzilishi: Ruboiy 4 misradan (\\(a-a-b-a\\)) iborat boʻladi. U aruzning maxsus \"haza\" bahrida yoziladi.Falsafiy mazmun: Qisqa va loʻnda (4 satrda) inson hayoti, ruhiyati yoki borliq haqida chuqur xulosa beriladi.Xulosalanish: Birinchi uch misra fikrni tayyorlab, soʻnggi toʻrtinchi misra xulosa yoki zarba vazifasini oʻtayd"}], "27": [{"savol_raqami": 1, "savol": "Adabiy ta'limda innovatsion metodlardan foydalanish.", "javob": "Adabiy ta'limda innovatsion metodlardan foydalanish. Ma'lumki, ta'lim jarayonini amalga oshiruvchi o'quv ishlari, uning mazmuni, shakl va metodlarini zarur emotsiya bilan ta'minlash muhim ahamiyat kasb etadi. Hissiy holatlar hamisha ruhiy bezovtalik, ko'ngil hayajonlari, o'zgani tuyish, quvonch, nafrat, hayrat singari tuyg'ular bilan bog'liq. E'tibor qilish, eslab qolish, anglash jarayonlariga shaxsning chuqur ichki bezovtaligi, hayajoni qo'shilganda u faollashadi, zaruriy intellektual marraning egallanishi ta'minlanadi. Insonning his-tuyg'ulari ishtirokisiz haqi- qatga intilish va erishish mumkin emas. Ayniqsa, adabiy ta'limda hamma narsaga erishish uchun his-tuyg'u birinchi o'rinda turadi. Gap faqat uni zarur shakl va miqyosda uyg'ota bilishda. Hissiy bezovtaliklar, insonning ruhiy muvozanatdan chiqishi, asosan, hayrat orqali namoyon bo'ladi. Badiiy asarda ifodalangan hodisa, asar qahramonlari tuyg'ulari, ulardagi g'ayrioddiylik, ruhiy ke- chinmalar ifodasining samimiyligidan hayratlanish o'quvchida turli hissiyotlarni uyg'otadi.Adabiyot darslarida emotsional holatlarni vujudga keltirishda o'qituvchi nutqining hissiyotga yo'g'rilganligi, tiniqligi, badiiyli- gi ham muhim ahamiyat kasb etadi. Faqat bu holat o'ta samimiy bo'lishi kerak. Busiz o'qituvchining nutqi foydali axborotgina bo'lib, o'quvchiga hissiy ta'sir ko'rsatolmaydi. Shu bilan birga, darsning qiziqarliligini ta'minlashda bilishdan zavqlanish hissining ham o'rni katta. Hissiyot o'quvchini muammoning ichiga kirishga undaydi. Ko'ngil ochish hislari bilan bilim olishdagi hislarning farqi shunda.Polshalik taniqli pedagog V. Okon o'quvchining o'qitish kechimidagi mustaqilligini ta'minlash uchun asosiy e'tiborni ta'limning o'zlashtirish, kashf etish, his qilish, intilish singari yo'llariga qaratgan\". O'zlashtirish yo'li bilan amalga oshiriladi- gan ta'lim, uning fikricha, o'quvchidan tayyor bilimlarni xuddi o'qituvchisi aytib berganday, bir tizimga solingan shaklda eslab qolishni talab qiladi. Bu holatda asosiy ish xotiraning zimmasiga tushadi. Bunday ta'limning natijasi u yoki bu bilimlarni esda saqlab qolishdangina iborat. Ta'limning o'zlashtirish yo'lida aqliy mehnat bilan bog'liq o'quv ko'nikmalari kam shakllanadi.Qayta kashf etish yo'lidan borilganda ta'lim jarayonini ilmiy tadqiqotlarga imkon qadar yaqinlashtirish nazarda tutiladi. V. Okon qayta kashf etishning ikki muhim jihatini ajratadi: a) o'quvchilarda tadqiqotchilik faolligining ortishi; b) bilimlarni mustaqil ravishda o'zlashtirish. U bu yo'lning yana bir jihatiga mehnat orqali erishil- gan bilim o'quvchi shuurida chuqur o'rnashib qolishiga ham diqqat qaratadi. Bu usuldan foydalanilganda bilimlarni o'zlashtirish tezlashadi, o'quvchilarning nazariy va amaliy muammolarni hal etishdagi faolligi ortadi, ko'nikmalari mustahkam bo'ladi. Bunday yondashuv asosan tafakkur mustaqilligi, kuzatuvchanlik, tasavvur, e'tibor va xotiraning rivojlanishiga, umumiy aqliy madaniyatga katta ta'sir ko'rsatadi. Ya'ni, kashf etish asnosida tuyilgan lazzat har qanday odamni yangi-yangi kashfiyotlar sari yetaklaydi.His qilish yo'li bilan bilim olishni tavsiflab, V. Okonь Polsha maktablarida bilimlarni o'quvchini ruhiy muvozanatdan chiqa- rish orqali o'zlashtirilishiga erishish ustida ish olib borilganiga to'xtaladi. Olimning fikricha, o'quv materialini his qilish orqali o'zlashtirish ma'lum ijobiy xususiyatlarga ega. Unda bilimlar in- sonning ijodiy faoliyati orqali o'zlashtiriladi. Hissiyot bilimni o'quvchining ongiga mustahkam joylaydi. Bunda ta'limning tar- biyaviy ahamiyati ortadi. Chunki bu tadbirlar qanchalik darajada ta'limiy bo'lsa, shunchalik tarbiyaviydir. Insonga o'z xudbinligi, nafsini yengishga imkon beradigan ijobiy tuyg'ularning rivojlanishi uning kamolotini ta'minlashda muhim ahamiyat kasb etishi milliy tarbiyashunoslik tarixidan ham ma'lum.Rus olimi S Juykov oʻquvchi mustaqil fikri faollashuvi haqida so'z yuritib, bu faollikning yuzaga kelishidagi psixologik shart- sharoitlar, uni amalga oshirish va rivojlantirish yo'llari, oʻquvchi tafakkurini boshqarish, nazorat qilish usullari hamda fikriy faoliyat- da o'quvchi individualligi masalalariga to'xtaladi. O'quvchining intellektual faolligi biror o'quv masalasini hal etishda aqliy faoli- yatning mustaqil ravishda ishtirok etishi va o'z-o'zini nazorat qi- lishida (aqliy operatsiyalarni bajarishda zarur usullarni qo'llash, tafakkur yo'llarini qidirishda) koʻzga tashlanadi. Bunday faollikni oshirishni S. Juykov oʻqituvchi, darslik va boshqa o'quv ashyolari ta'sirida bajariladigan faoliyatdan mustaqil ravishda savol-top- shiriq qo'yishga, ularning oʻquvchi tomonidan bajarilishida qolip- lardan voz kechib, masalalarni o'z bilimi va malakalariga tayanib, mustaqil hal etishida ko'radi. Uning fikricha, o'quvchi aqliy faoli- yati mustaqilligi rivojlanishi masalaning muammolilik darajasiga bog'liq.Metodlarni tasniflashda ular yordamida o'quvchilarga tayyor bilimlarni zo'rlab singdirishga emas, balki ularning tafakkur imkoniyatlarini hisobga olishi, fakt va tajribaga asoslanishiga alohida e'tibor qaratish maqsadga muvofiqdir. Bir qator pedagog va psixologlar tomonidan ta'lim metodlari orasidan: muammoli, suhbat, evristik, tadqiqot, taqqoslash, induktiv, deduktiv singari umumdidaktik metodlarning samarali ekanligi ta'kidlangan. O'qituvchining ta'lim metod va usullari haqidagi bilimi qanchalik chuqur, ularni ma'lum maqsad yo'lida qo'llash imkoniyati qanchalik keng bo'lsa, har bir darsni tashkil qilish oson, unumli, foydali va jonli bo'ladi. Darsning oʻzlashtirilish darajasi uning ko'rgazmaliligi, tashkiliy jihatdan benuqsonligidan tashqari, o'quvchilar mustaqil fikrlashini faollashtirish, ularning nazariy bilimlarni amaliyotda qo'llay olishini ham taqozo etadi. «Ta'lim metodlari, deb yozgan edi M. Maxmutov, - o'quvchi rivojlanishining yangi bosqichida tafakkur psixologiyasida to'plangan, ular tomonidan bilimlar va faoliyatni o'zlashtirish"}, {"savol_raqami": 2, "savol": "Adabiyot darslarida o'quvchini badiiy asarda qanday aytilganiga diqqat qaratish.", "javob": "Adabiyot darslarida oʻquvchini badiiy asarda nima aytilganiga emas, balki qanday aytilganiga ham diqqat qaratishga o'rgatish lozim. U tabiat tasviri go'zalligi, qahramonlar ichki kechinmalari ifodasi nozikligi, muallif tilining injaligini ham kuzatsin, sezsin. Adabiyot darslarida, asar tahlili mobaynida shunday narsalarga e'tiborli bo'lgan o'quvchi ijod jarayoni bo'lmish insho bitishda ham o'ylanadi, izlanadi, bilganlaridan foydalanadi. Bola shularni tuysa, ma'naviyati toʻkisroq shakllanadi. Zero, oʻquvchilarda dun- yoqarash shakllanishi ayni shu yoshga to'g'ri keladi.O'quvchi yozgan ishlarning mazmunli boʻlishida asarning qaysi o'rinlari muvaffaqiyatli chiqqanini bilishi muhim ahamiyat kasb etadi. Ularda bunday topqirlikni shakllantirish va rivojlantirish oʻqituvchining burchi hisoblanadi. Bunga «Asarni o'qishdan tuy- ganlarim», «Asardagi menga eng yoqqan jihatlar» singari mavzu- larda insho yozdirishi bilan erishish mumkin. Oʻquvchilar inshoda kitobdan, o'qituvchi ma'ruzalaridan olgan bilimlarini mustaqil ra- vishda amaliyotda qoʻllashi ham mumkin. Bu bilimlar oʻquvchiga yo'nalish berib, fikrlarini tizimga solishga ko'maklashadi. Aks holda, bunday insho to'la mustaqil fikrlash mahsuli bo'la olmay- di. Oʻzi kashf qilish boshqa, o'zgalarning yoʻnalishi bilan fikr yuritish boshqa, albatta. Lekin o'zgalar bergan yoʻnalish asosida bo'lsa-da, fikrlay boshlagan o'quvchi ma'lum vaqt o'tgach, albatta, mustaqil fikrlashga o'tadi. Mustaqil ish muallifi unda o'z fikrini ifodalashi yoki oʻzgalarning aytganlariga qoʻshilish-qoʻshilmasligi sabablarini izohlashi kerak. Biror fikrni yoqlash yoki inkor etish ham mustaqil tafakkurni talab qiladi. O'quvchi o'z fikrlarini ifo- dalashni, ularga ishlov berishni bilishi, o'qituvchi esa darslik yoki qo'llanmalardan olingan qolipdagi ishni emas, aynan inshoni, ijod mahsulini tekshirishi kerak. Yomon baho bilan yoniq ruhlarni soʻndirish emas, balki oʻquvchilarni ijodga undash yo'llarini topish lozim. O'quvchilarning inshoda bildirgan fikrlarini hurmat qilish, yozma ishlardagi biror tasvirni e'tiborsiz qoldirish mumkin emas.Muvaffaqiyatli chiqqan fikr va xulosalarni koʻrsatish, notoʻgʻri ifodalar haqida jiddiy mulohazalar aytish, ularning oʻrinsizligiga o'quvchilarni ishontirish zarur.Asar ustida ishlayotgan oʻquvchilarga soʻzga ehtiyotkorlik bilan yondashishni oʻrgatish kerak. Oʻsmirlar yozuvchining badiiy soʻzi chin mo'jiza ekanini tushunishi, his qilishi zarur. Muallif qo'llagan so'z tagida qanday fikr mavjudligiga e'tibor berishni o'rgatish adabiyot o'qituvchisining burchidir. Uni qiynayotgan narsalarni o'zgalarni ham qiynaydigan tarzda ifodalashga, unda tug'ilgan fikrni boshqa bir kishiga ta'sir qiladigan yoʻsinda bayon eta bilishga o'quvchini undash lozim. Shunda oʻquvchilar etyud, kichikroq hikoya, she'r yoki insholarida oʻzini bezovta qilayotgan tuyg'ularni o'zgalarga ham yuqadigan tarzda ifodalashga harakat qilishadi. Shu tariqa so'zning qudrati, ijodning mashaqqat va lazzatini his qiladilar. Adabiyot o'quvchini odamlar dunyosiga olib kiradi, unda shu olamga mansublik jihatlarini kuchaytiradi. Bu, o'z navbatida, unga o'zligini anglatadi. O'quvchi ijod jarayonida hayotda mavjud narsani oʻzi uchun oʻzi qayta kashf etishi va buning lazzatini tuyishi kerak. Yuk
